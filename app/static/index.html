  {h:"Isnad/matn split and recovery — app/parsing/isnad_matn.py", p:[
    "split_isnad_matn(text) → (isnad, matn, confidence). Strategies in order: the first SPEECH-introduced quoted span (extended over one story's dialogue, stopping at an editorial/takhrīj tail); the last «قال…:» introducer; «قال» without a colon (anchored to a word-END so it never splits at the dual «قالا:» of «حدّثنا A وB قالا: حدّثنا [route]»); «أنّ النبيّ ﷺ…». Then two LATE fallbacks that only fill an otherwise-EMPTY matn (so they can never re-cut a working split): a post-isnad «أنّ فلان [حدثٌ]» report (skipping a sub-narrator «أنّ فلان أخبره»), else the matn after the terminal authority «النبيّ ﷺ:». The wrapper also peels a secondary route (تحويل ح) leaked into the matn head back into the isnad, and trims a trailing grade/takhrīj tail.",
    "hadith_extract._inherit_rimandi: in a book reading order, an empty-matn reference entry («…مثله / …نحوه / بهذا الإسناد / …بذلك») inherits the previous hadith matn (marked confidence «ref»), so the parallel narration is searchable by its text instead of showing blank.",
    "Together these recover the matn for entries (common in ʿilal works) where the splitter had left it inside the isnad field — restoring it to search, to the narrator graph (the matn no longer pollutes the chain), and to takhrij."]},
  {h:"Rijal database — app/rijal/index.py", p:[
    "RijalEntry: name, aliases, kunya, grade_text, category, rank, death_year, source, opinions, appraisals. Matched on name + aliases + kunya. opinions = the book-level double opinion {source, grade} (ابن حجر via تقريب / الذهبي via الكاشف); appraisals = the NAMED أقوال الأئمة {critic, verdict, book} pulled from the PROSE sources by app.parsing.appraisals (a curated نقّاد list + a grade-word filter) and attached to the man by an unambiguous name match in build_rijal.merge_appraisals, each tagged with the BOOK that reports it (تهذيب الكمال/الجرح والتعديل/الثقات/لسان الميزان) — shown in the «راوٍ» card under «أقوال الأئمة» as «ثقة — ابن معين · تهذيب الكمال».",
    "lookup(name): containment-only — a match needs the entry's name inside the query (most specific wins, keeping a man distinct from his longer-named son), or the cited name to be a partial of the entry. Among partials a PREFIX form wins (the cited ism+nasab): «عدي بن حاتم» is عدي بن حاتم الطائي (صحابي), not عدي بن الفضل … أبو حاتم (where حاتم only appears later, in a kunya); equally-good readings (سعيد ↦ المسيب/جبير) are flagged مشترك, never guessed by the shortest. Names that merely SHARE a token are not a match; teknonyms (أبو/أم + one name) match reverse-only and only when the man is cited BY the kunya. An entry «الليث» also carries an «ال»-stripped matching form so a chain citing «ليث» finds it, but the query is not folded — a citation that keeps the article («الحسن») stays the specific man and is never broadened into the «حسن» pool; the divine names («عبد الله»/«عبد الرحمن») stay whole. Extraction also drops truncated/generic entries («عبد الله ابن…») so they can't contain-match every «عبد الله بن فلان». And a tied group prefers the REAL narrators: an add-only COVERAGE man (الإصابة/الثقات — outside the Six Books, barely narrates) is dropped from a tied candidate group when a non-coverage man is present, so an obscure namesake never makes a famous narrator «مشترك» («أبي هريرة» is the Companion الدوسي, not a محمد who merely carries the kunya); coverage men resolve only when they are the sole option. Finally a PROMINENCE prior breaks a remaining tie toward the prolific narrator (each name's corpus narration frequency, from the graph via RijalIndex.set_prominence): «ابن عمر» is the much-narrated عبد الله بن عمر, not an obscure same-father namesake; but two comparably-prolific men (سفيان ↦ عيينة/الثوري) stay مشترك — the floor only context (شيوخ/تلاميذ) can split. A bare shuhra-by-ancestor citation — a man universally cited by a DEEP ancestor's name with «ابن» (ابن جريج = عبد الملك بن عبد العزيز بن جريج, known by his GRANDFATHER) — is redirected to his full canonical name by a CLOSED, documentary _SHUHRA map before matching, so he resolves uniquely instead of tying «مشترك» among everyone carrying جريج (his father عبد العزيز, the literal «X بن جريج» sons); the EXACT bare shuhra only, so a different «X بن جريج» son falls through to normal matching (the closed map covers ابن جريج · ابن أبي ذئب — not his خال «الحارث» — · ابن أبي مليكة the قاضي · ابن أبي هلال the صدوق سعيد، not the كذاب يعقوب whose great-grandfather was أبو هلال · ابن أبي عمر = محمد بن يحيى العدني شيخ مسلم (also «ابن أبي عمر المكي», the nisba variant) · ابن أبي خلف = محمد بن أحمد القطيعي شيخ مسلم؛ also the bare-name shuhras أبو سعيد الأشج = عبد الله بن سعيد الأشج · أبو معاوية = محمد بن خازم الضرير · أبو نعيم = الفضل بن دكين). The same closed redirect resolves a bare famous-Companion KUNYA (a _KUNYA_COMPANION map, keyed kunya-folded so أبو/أبا/أبي match): a chain citing «أبو هريرة» means the Companion عبد الرحمن بن صخر الدوسي (صحابي), not an obscure late namesake who merely carries the kunya (محمد بن أيوب الواسطي صدوق) nor a duplicate of him graded ثقة — the EXACT bare kunya only, so «أبو هريرة الواسطي» (with a nisba) falls through. Likewise «أبو ذر» → جندب بن جنادة الغفاري and «أبو الدرداء» → عويمر بن زيد الأنصاري (not the تابعي عمر بن ذر nor the late عبد العزيز بن منيب). Only kunyas that are UNAMBIGUOUSLY one Companion are mapped: «أبو سعيد» (111 men incl. الحسن البصري) and «أبو موسى» (position-dependent: the شيخ محمد بن المثنى الزمن at chain-head vs الأشعري terminal) are left to normal matching. And a known major تابعي (الشعبي · قيس بن أبي حازم · عبيد الله بن عبد الله بن عتبة) can never be a «صحابي»: a mis-extracted صحابي grade (a Companion-description leaked onto a truncated entry) is corrected to ثقة at load, so the bad entry no longer shadows the real man and reads «صحابي» mid-chain.",
    "candidates(name): the FULL homonym set (all top contained + top-covering partials) rather than one best answer — so the chain can choose. This is «the chain before the name»: a متروك/Companion namesake never wins on the bare name when the company points to a different known man.",
    "Guards: _order_ok (shared tokens in the same order: «يزيد بن جابر» ≠ «جابر بن يزيد»), and rejecting a bulky non-identifying query (Abu/Abi/Umm/Abd alone).",
    "classify (grades.py): maps a verdict phrase to a rank on the RANKS scale (Companion 10 … liar 0)."]},
  {h:"Unification — app/rijal/canon.py", p:[
    "Canonicalizer: a memoized wrapper over lookup. canonical(surface, context): the chain decides FIRST — when several known men share the surface (index.candidates), the one whose company best fits the chain wins, even over a confident bare-name match; only then a confident unique hit → its canonical name; ambiguous → candidates weighted by context; otherwise the surface is kept as-is.",
    "associations (context cues) = each narrator «companions» profile gathered in the first build pass — see the Methodology page «how the network is built».",
    "The verdict reuses this (تمييز المهمل): /verify-isnad builds the company profiles from the live network (graph.adjacency()) and passes the Canonicalizer to analyze_isnad, so a shared name in a chain — «جعفر بن محمد» beside محمد الباقر/جابر → الصادق — is identified from its links before grading, not from the bare name.",
    "تمييز المهمل بالشيخ والتلميذ (app/rijal/resolve.py): when the surface name and its raw company both leave a link ambiguous, a chain-level joint resolver anchors the links we are sure of (a unique-name match) and fixes an ambiguous link to the homonym DOCUMENTED — in the directional network (documented_network.json from تهذيب/الجرح/الثقات) — as a تلميذ of its resolved شيخ (or شيخ of its resolved تلميذ), propagating from the anchors to a fixpoint. Positive-evidence only: it never overrides a confident match and a non-unique link stays held — so «سفيان» above الأعمش is الثوري (the documented student), but a name flanked only by ambiguous company is left مشترك. Inert when the network file is absent. Before these graph levers runs قواعد التمييز (app/rijal/qaida.py): the classical, CURATED disambiguations a محدّث applies — a bare «سفيان» is الثوريُّ عن الأعمش/منصور، ابنُ عيينة عن عمرِو بن دينار/الزهري؛ «حماد» ابنُ زيد عن أيوب، ابنُ سلمة عن ثابت/حميد؛ «هشام» ابنُ عروة عن أبيه، الدستوائيُّ عن قتادة؛ «يونس» ابنُ يزيد الأيليُّ عن الزهري، ابنُ عبيد عن الحسن؛ «حجاج» ابنُ محمد المصيصيُّ عن ابن جريج — deterministic and high-confidence (a rule of the science, not a corpus heuristic), so it identifies the famous «مشترك» before the network/company; a شيخ that doesn't discriminate leaves the man honestly held (لا نختلق). It fires on the شيخ link alone (i → i+1), so a waw co-narrator «شعبة عن عبد الله بن أبي السفر وإسماعيل عن الشعبي» — where إسماعيل begins a new route (its tie to عبد الله is sibling, not شيخ) — is still resolved «إسماعيل عن الشعبي = ابن أبي خالد» (it was held «مجهول» on صحيح البخاري #10). These rules can also be MINED from the books: scripts.derive_qaida reads each homonym's شيوخ from the documented network and proposes «‹ism› عن ‹distinctive شيخ› = ‹that man›» (the marker = a token of the شيخ RARE in the base — «دينار», not «عمرو»), a شيخ shared by two namesakes dropped → data/qaida.json (a reviewed proposal, not auto-loaded). A purely editorial node — «واللفظ له» / a leading «الشيخ» — is dropped at segmentation (not a narrator), cleaning the network."]},
  {h:"Narrator network — app/rijal/graph.py", p:[
    "NarratorGraph: SQLite with two tables — narrator(id, norm, name, freq) and link(teacher, student, weight). A node identity = its sorted folded name-token set (norm).",
    "add_chain(names, canon): records adjacent links (student→teacher); collapses the Prophet ﷺ into one node, resolves shared names, calls canon, and handles kinship.",
    "Kinship: «أبيه/جده/أمه/أخيه…» resolves to the actual person (an explicit name, or the neighbour nasab) or to a labelled, linked node «father/grandfather… of X» (is_unnamed_kin); a suffix guard prevents promoting it to the son. When the chain gives only a bare father «معاوية بن قرة عن أبيه» (so «قرة» ties قرة بن خالد / قرة بن إياس), analyze_isnad EXPANDS the son to his full رجال nasab «معاوية بن قرة بن إياس المزني» and names the father «قرة بن إياس» (ism + grandfather — a leading run of the father's entry, not the buried son) → resolved uniquely instead of held «مشترك».",
    "resolve(name): exact match, then containment by highest frequency. teachers/students/link_weight/adjacency for querying."]},
  {h:"Isnad analysis — app/qa/isnad.py", p:[
    "analyze_isnad: splits the chain on transmission verbs (haddathana/akhbarana/an/sami'tu…, including the object-pronoun forms «أخبره/حدثه/أنبأه» that close a fronted شيخ in «أنّ الزهري أخبره», the قراءة/عرض verbs «قرأت/عُرض على فلان» with their «على» preposition skipped, and the 1st/3rd-person/plural forms «حدّثتني/حدّثكم/سمعوا»), stops at the matn (incl. the dual/plural «أنّهما/أنّهم», the scene opener «كان …», the back-reference «فذكره», the feminine/plural «فقالت/فقالوا», and a narrated scene «سمعتُ رجلاً قرأ» — a سماع of an INDEFINITE مبهم doing a plain action is the matn, not a راوٍ مبهم, so a Companion's story «قال: سمعتُ رجلاً قرأ، وسمعتُ النبيﷺ …» no longer adds a false جهالة that graded a Bukhārī chain «ضعيف»; a real «حدّثني رجلٌ عن/قال» is still kept), strips footnote-superscript digits glued onto a token, and detects sama'/'an'ana, tahwil (ح) and whether it reaches the Prophet ﷺ. (The full set of leak classes was enumerated by scripts.audit_nodes.) A صحابي whose grade rests ONLY on an obscure-Companion dictionary (الإصابة) is usable at the chain's END (and the penultimate صحابيٌّ عن صحابيّ), never to grade a DEEPER narrator whose bare ism+father it would over-match.",
    "Grading: the Prophet ﷺ is excluded (he's the source, not a graded narrator); given a Canonicalizer, each shared name is first resolved from the chain's company (تمييز المهمل), then graded.",
    "Grading excludes both the Prophet (the source) and the مبهم: _is_mubham flags an unnamed narrator («رجل»، «شيخ له»، «عمّن حدّثه»، «بعض أصحابه»), excepting an unnamed Companion («من أصحاب النبي ﷺ»); such a chain is weakened to «ضعيف» (جهالة), distinct from the paused «يُتوقَّف» of a mere DB gap.",
    "overall_ruling: a concise verdict (weakest narrator + transmission modes), held back conservatively. A missing network link is a CAUTION, not a downgrade — the graph is built from the same corpus with canonical names, so a gap is usually a name-form difference, and must not turn a صحيح البخاري chain of ثقات into «ضعيف». This is the «الحكم على الإسناد» every hadith card loads on demand.",
    "An ambiguous match is held ONLY when its tied candidates disagree on the grade: usable = (not ambiguous) OR grade_agreed. «عدي بن حاتم» (both candidates صحابي) and «الليث بن سعد» (الكاشف+تقريب, both ثقة) keep the grade; «عثمان بن أبي شيبة» (ثقة vs a متروك namesake) is held «يُتوقَّف» — so a disagreeing namesake never drives a confident weak verdict.",
    "The honest-doubt node (②b): when the شيخ/التلميذ company cannot split a homonym, the node is not guessed — _doubt_candidates attaches the few possible identities + each درجة to record.rijal.candidates, and the «الإسناد»/«التحقق» card documents them: «مشترك · محسوم» (the candidates AGREE on the grade → the حكم is unchanged) vs «يُتوقَّف» (they DISAGREE → held, shown in g-other, the disagreeing namesake never counted); a node fixed by a قاعدة/الشبكة/الرفقة instead shows «↜ مُيِّز بالقرينة → <the resolved man>». Each possible identity is clickable to its راوٍ card. This is «لا نختلق»: a genuine doubt is presented as its closed set of possibilities, not collapsed to one.",
    "الرأي الثاني (double opinion) — ADJUDICATED: when the critics differ on ONE man (ثقة عند ابن حجر · ضعيف عند الذهبي, his RijalEntry.opinions spanning ≥2 grades), isnad._effective_rank grades him by his WEAKEST opinion (أنزل القولين عند الاختلاف), so a مختلف فيه narrator drags the chain down, not up; _chain_assessment returns the disputed list, analyze_isnad adds a «اختُلف فيه … أُخذ بأنزل القولين» note, and the card flags «⚠ اختلفوا». A man with one opinion (the common case) is unchanged."]},
  {h:"Self-audit — scripts/audit_isnad.py", p:[
    "A bulk quality report (the «التدقيق» tab), NOT a religious ruling: it re-runs analyze_isnad over EVERY isnad in the corpus — with the live رجال DB and a Canonicalizer built from graph.adjacency() — and flags each narrator whose grading looks wrong, so a human can review it. Rebuilt from scratch as the last step of update.bat, so it tracks the data as it improves.",
    "_flag_chain emits four codes per chain. P — the Prophet ﷺ was graded as a narrator (he is the source; should be 0). S — a «صحابي» grading away from the chain's end (a Companion belongs last, having heard the Prophet ﷺ; mid-chain ⇒ likely a same-name mix, e.g. «أبي إسحاق» the ثقة ↦ the Companion سعد who shares the kunya). W — a full name (≥3 tokens) graded متروك/كذاب (rare in the Ṣaḥīḥs ⇒ likely confusion with a weak namesake, e.g. «عثمان بن أبي شيبة» the ثقة ↦ his متروك brother). A — an ambiguous (مشترك) match the tool will not guess.",
    "certain = (not ambiguous) OR grade_agreed — the W and S flags fire only on a confident grade. A مشترك match whose tied candidates DISAGREE (ثقة vs متروك) is undecided ⇒ it goes to A, never to a confident متروك/صحابي; when they AGREE it keeps the grade. This mirrors analyze_isnad exactly, so the audit and the per-chain verdict never contradict each other.",
    "Output: data/audit.json {generated, rijal_entries, scanned, counts:{P,W,S,A}, labels, cases (capped per code)}, served by GET /audit and rendered as the clickable, selectable «التدقيق» review tab (each case expands its matn + book + chain + verdict in place). The codes are review prompts, not closed rulings — and the metric we measure every identification/تمييز improvement against.",

// Audit (التدقيق): the prebuilt list of chains whose narrator grading is likely wrong —
// for manual review. Each case opens its isnad on click. Built by scripts.audit_isnad.
let auditData = null;   // last /audit report (for the «نسخ القائمة» copy button)
async function renderAudit(){
  results.innerHTML = `<div class="state">… جارٍ تحميل تقرير التدقيق</div>`;
  let d;
  try { d = await getJSON("/audit"); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر التحميل")}</div>`; return; }
  if(!d.available){
    results.innerHTML =
      `<div class="note">لم يُبْنَ تقريرُ التدقيق بعد. انقر نقرًا مزدوجًا على <b>audit.bat</b>، أو شغّل الأمر التالي بِبيئة المشروع (نفس بايثون الذي يستعمله update.bat)، ثم أعد فتح هذه الصفحة:</div>`
      + `<div class="card"><div class="answer">.venv\\Scripts\\python.exe -m scripts.audit_isnad</div></div>`
      + `<div class="note">يفحص كلَّ الأسانيد ويجمع الحالات المشتبهة لمراجعتها يدويًّا (ويتجدّد تلقائيًّا مع update.bat).</div>`;
    return;
  }
  auditData = d;
  let html = `<div class="note">تقريرُ التدقيق — فُحص <b>${d.scanned}</b> إسنادًا · قاعدةُ رجالٍ ${d.rijal_entries} · ${esc(d.generated)} `
    + `<button class="tool audit-copy">⧉ نسخ القائمة</button></div>`
    + `<div class="note">حالاتٌ يُنصح بمراجعتها يدويًّا (قرائنُ اشتباهٍ لا أحكام). اضغط أيّ حالةٍ لفتح إسنادها وحكمِه؛ والقائمةُ الكاملةُ في الملف data/audit.json.</div>`;
  ["P", "W", "S", "A"].forEach(code => {
    const total = (d.counts || {})[code] || 0;
    if(!total) return;
    const cases = (d.cases || {})[code] || [];
    html += `<div class="comp-head">${esc((d.labels || {})[code] || code)} <span class="simbadge">(${total})</span></div>`;
    if(code === "A" && (d.a_ranked || []).length){
      html += `<div class="note">الأسماءُ «المشتركة» مرتّبةً بعددِ مرّاتِ التباسِها: عددٌ كبيرٌ على اسمٍ بعينه يكشفُ خطأَ مطابقة (اسمٌ مشهورٌ مُلتبسٌ بين عشرات)، بينما اسمٌ بين قِلّةٍ = تشابهٌ حقيقيّ. «قارن» يفتحُ تبويبَ «راوٍ» لتمييزِهم جنبًا إلى جنب (بالدرجة والوفاة والنسبة).</div>`;
      d.a_ranked.forEach(r => {
        html += `<div class="rawi-item audit-head">`
          + `<span>«${esc(r.name)}» <span class="r-era">${esc(r.candidates)}</span></span>`
          + `<span class="simbadge">×${r.count}&nbsp; <button class="tool go-narrator" data-q="${esc(r.name)}">قارن ⟶</button></span>`
          + `</div>`;
      });
      html += `<div class="comp-head" style="font-size:.92em;opacity:.85">الحالاتُ في سياقها <span class="simbadge">(انقر أيًّا لفتح إسنادِها)</span></div>`;
    }
    cases.forEach(c => {
      const cite = [c.collection, (c.number != null ? "رقم " + c.number : null)].filter(Boolean).join("  ·  ");
      html += `<div class="audit-case" data-id="${c.id}">`
        + `<div class="rawi-item audit-head"><span>${esc(c.detail)}</span>`
        + `<span class="simbadge">${esc(cite)} ▾</span></div>`
        + `<div class="case-box"></div></div>`;
    });
    if(cases.length < total) html += `<div class="note">… و${total - cases.length} حالةً أخرى في التقرير</div>`;
  });
  results.innerHTML = html;
}

  let d;
  try { d = await getJSON("/conflicts"); }

      + `<div class="card"><div class="answer">.venv\\Scripts\\python.exe -m scripts.audit_conflicts</div></div>`
      + `<div class="note">يَفحص كلَّ الرواة المتشاركين في «الاسم + الأب» ويرصد تصادُمَ جرحٍ شديدٍ مع ثقةٍ (ويتجدّد تلقائيًّا مع update.bat).</div>`;

    + `<div class="note">يَرصد تصادُمَ الأسماء حيث يتشارك «متروكٌ/كذّابٌ» الاسمَ (الاسم + الأب) مع «ثقةٍ/صدوقٍ/صحابيّ»، فقد يُحكَم على إسنادٍ سليمٍ بحكم الرجل الخطأ. الكاملُ في data/conflicts.json.</div>`
    + `<div class="comp-head">إجماليُّ التصادمات <span class="simbadge">(${d.collisions || 0})</span></div>`
    + `<div class="rawi-item"><span>✅ مُعلَّقٌ «مشترك» (صحيحٌ — لا يُخمَّن)</span><span class="simbadge">${c.held || 0}</span></div>`
    + `<div class="rawi-item"><span>↩︎ يُحَلُّ إلى الثقة / بلا مطابقة</span><span class="simbadge">${c.ok || 0}</span></div>`
    + `<div class="comp-head" style="color:#b03030">⚠️ خطِرٌ — الجرحُ يَغلِب فيَهدِم إسنادًا سليمًا <span class="simbadge">(${danger.length})</span></div>`;
  if(!danger.length){
    html += `<div class="note">لا حالاتٍ خطِرة — كلُّ تصادمٍ بين جرحٍ وثقةٍ مُعلَّقٌ «مشترك». 👍</div>`;
  } else {
    danger.forEach(x => {
      html += `<div class="rawi-item audit-head"><span>«${esc(x.name)}» ← [${esc(x.grade)}] ${esc(x.grave)}</span>`
        + `<span class="simbadge">الثقة: ${esc((x.trustworthy || []).join("، "))}</span></div>`;
    });
  }
  results.innerHTML = html;
}

// «تدقيق المتون» — the matn-audit report (scripts.audit_matn): every matn flagged V (empty/fragment) ·

let matnData = null;       // last /matn-audit report (for the V/I/G/Q filter + «نسخ القائمة»)
let matnFilter = "all";    // active flag filter: all | V | I | G | Q
const _MATN_CHIP = {V: "ناقص", I: "إسناد", G: "تخريج", Q: "آية/عنوان"};   // short filter labels
async function renderMatnAudit(){
  results.innerHTML = `<div class="state">… جارٍ تحميل تقرير تدقيق المتون</div>`;
  let d;

      + `<div class="card"><div class="answer">.venv\\Scripts\\python.exe -m scripts.audit_matn</div></div>`
      + `<div class="note">يفحص كلَّ متنٍ ويجمع المشتبهة (مبتورًا / تسرَّب إليه الإسناد / حكمًا أو تخريجًا / ليس متنًا) — ويتجدّد تلقائيًّا مع update.bat.</div>`;

// Draw (or re-draw on a filter click) the matn-audit list — only the selected flag's section.
function drawMatnAudit(){
  const d = matnData; if(!d) return;
  const CODES = ["V", "I", "G", "Q"];
  const totalAll = CODES.reduce((a, c) => a + ((d.counts || {})[c] || 0), 0);
  const chip = (code, label, n) =>
    `<button class="tool matn-filter${matnFilter === code ? " done" : ""}" data-code="${code}">`
    + `${esc(label)} <span class="simbadge">${n}</span></button>`;
  let html = `<div class="note">تدقيقُ المتون — فُحص <b>${d.scanned}</b> متنًا · ${esc(d.generated)} · المتونُ الفارغة: ${d.empty_matn || 0} `
    + `<button class="tool matn-copy">⧉ نسخ القائمة</button></div>`
    + `<div class="note">حالاتٌ يُنصح بمراجعتها يدويًّا (قرائنُ اشتباهٍ لا أحكام): المتنُ كما استُخرج، مع سببِ الاشتباه. القائمةُ الكاملةُ في data/matn_audit.json.</div>`
    + `<div class="actions">${chip("all", "الكل", totalAll)}`
    + CODES.map(c => chip(c, _MATN_CHIP[c] || c, (d.counts || {})[c] || 0)).join("") + `</div>`;
  CODES.forEach(code => {
    if(matnFilter !== "all" && matnFilter !== code) return;
    const total = (d.counts || {})[code] || 0;
    if(!total) return;
    const cases = (d.cases || {})[code] || [];
    html += `<div class="comp-head">${esc((d.labels || {})[code] || code)} <span class="simbadge">(${total})</span></div>`;
    cases.forEach(c => {
      const cite = [c.collection, (c.number != null ? "رقم " + c.number : null)].filter(Boolean).join("  ·  ");
      html += `<div class="rawi-item audit-head">`
        + `<span>${esc(c.matn || "")}<span class="r-era"> — ${esc(c.detail || "")}</span></span>`
        + `<span class="simbadge">${esc(cite)}</span></div>`;
    });
    if(cases.length < total) html += `<div class="note">… و${total - cases.length} حالةً أخرى في التقرير</div>`;
  });
  if(matnFilter !== "all" && !((d.counts || {})[matnFilter] || 0))
    html += `<div class="note">لا حالاتٍ في هذا التصنيف. 👍</div>`;
  results.innerHTML = html;
}

// Build the audit report as plain text (for copying).
function auditText(d){
  let t = `تقرير التدقيق — ${d.scanned} إسناد · ${d.rijal_entries} رجال · ${d.generated}\n`;
  ["P", "W", "S", "A"].forEach(code => {
    const total = (d.counts || {})[code] || 0;
    if(!total) return;
    const cases = (d.cases || {})[code] || [];
    t += `\n## ${(d.labels || {})[code] || code} (${total})\n`;
    cases.forEach(c => {
      const cite = [c.collection, (c.number != null ? "رقم " + c.number : null)].filter(Boolean).join(" · ");
      t += `- [${cite}] ${c.detail}\n`;
    });
    if(cases.length < total) t += `… و${total - cases.length} حالة أخرى (الكاملة في data/audit.json)\n`;
  });
  return t;
}

// Build the (optionally filtered) matn-audit report as plain text (for «نسخ القائمة»).
function matnText(d, filter){
  let t = `تدقيق المتون — ${d.scanned} متن · ${d.generated} · فارغة: ${d.empty_matn || 0}\n`;
  ["V", "I", "G", "Q"].forEach(code => {
    if(filter && filter !== "all" && filter !== code) return;
    const total = (d.counts || {})[code] || 0;
    if(!total) return;
    const cases = (d.cases || {})[code] || [];
    t += `\n## ${(d.labels || {})[code] || code} (${total})\n`;
    cases.forEach(c => {
      const cite = [c.collection, (c.number != null ? "رقم " + c.number : null)].filter(Boolean).join(" · ");
      t += `- [${cite}] ${c.matn || ""}${c.detail ? "  — " + c.detail : ""}\n`;
    });
    if(cases.length < total) t += `… و${total - cases.length} حالة أخرى (الكاملة في data/matn_audit.json)\n`;
  });
  return t;
}

// «نسخ القائمة» — copy the whole audit report to the clipboard.
results.addEventListener("click", async e => {
  const btn = e.target.closest(".audit-copy");
  if(!btn || !auditData) return;
  const text = auditText(auditData);
  try { await navigator.clipboard.writeText(text); }
  catch(_){
    const ta = document.createElement("textarea"); ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  const o = btn.textContent; btn.textContent = "✓ نُسخت"; btn.classList.add("done");
  setTimeout(() => { btn.textContent = o; btn.classList.remove("done"); }, 1200);
});

// «تدقيق المتون» — V/I/G/Q filter chips: redraw the selected flag's section without refetching.

  const btn = e.target.closest(".matn-filter");
  if(!btn || !matnData) return;
  matnFilter = btn.dataset.code || "all";
  drawMatnAudit();
});

  try { await navigator.clipboard.writeText(text); }
  catch(_){
    const ta = document.createElement("textarea"); ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  const o = btn.textContent; btn.textContent = "✓ نُسخت"; btn.classList.add("done");
  setTimeout(() => { btn.textContent = o; btn.classList.remove("done"); }, 1200);
});

// «نسخ الكل» — copy the whole search result list (all hits, numbered).
results.addEventListener("click", async e => {
  const btn = e.target.closest(".search-copy");
  if(!btn) return;
  const text = searchText();
  if(!text) return;
  try { await navigator.clipboard.writeText(text); }
  catch(_){
    const ta = document.createElement("textarea"); ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  const o = btn.textContent; btn.textContent = "✓ نُسخت"; btn.classList.add("done");
  setTimeout(() => { btn.textContent = o; btn.classList.remove("done"); }, 1200);
});

// Toggle the isnad, and on first open lazily load its chain verdict («الحكم على الإسناد»).
results.addEventListener("click", async e => {
  if(!e.target.classList.contains("toggle")) return;
  const t = e.target, box = t.nextElementSibling;
  const open = box.classList.toggle("show");
  t.textContent = open ? (t.dataset.open || "إخفاء الإسناد والحكم ▴")
                       : (t.dataset.closed || "عرض الإسناد والحكم عليه ▾");
  if(!open) return;
  const vbox = box.querySelector(".chain-verdict"), id = t.dataset.id;
  if(vbox && id && !vbox.dataset.loaded){
    vbox.dataset.loaded = "1";
    vbox.innerHTML = `<div class="note">… جارٍ الحكم على الإسناد</div>`;
    try { vbox.innerHTML = chainVerdictHtml(await getJSON(`/verify-isnad?hadith_id=${encodeURIComponent(id)}`)); }
    catch(_){ vbox.innerHTML = `<div class="note">تعذّر تحليل الإسناد</div>`; vbox.dataset.loaded = ""; }
  }
});

// Network (الشبكة): click a node to re-centre on that narrator, «رجوع» to step back.
results.addEventListener("click", e => {
  if(e.target.closest(".net-back")){ netBack(); return; }
  const node = e.target.closest("[data-nav]");
  if(node) navigateNet(node.getAttribute("data-nav"));
});

// A candidate row in a «مشترك» disambiguation list → re-run on that specific narrator (same tab),
// remembering the list so «رجوع» steps back to it (and restores any outer back, e.g. the browse list).
results.addEventListener("click", e => {
  const pick = e.target.closest(".rawi-pick");
  if(!pick) return;
  const dCand = lastCand;
  q.value = pick.getAttribute("data-pick");
  navStack.push(() => { if(dCand) results.innerHTML = renderCandidates(dCand); });  // «رجوع» → the list
  run();
});

// A narrator name inside a chain (search verdict / الإسناد / التدقيق) → open his راوٍ card.
results.addEventListener("click", e => {
  const rl = e.target.closest(".rawi-link");
  if(rl) openRawiFromChain(rl.getAttribute("data-pick"));
});

// The global «◀ رجوع» (راوٍ / candidate / network cards): pop one step off the back-stack.
results.addEventListener("click", e => {
  if(!e.target.closest(".gbl-back")) return;
  const f = navStack.pop(); if(f) f();
});
// A «🕸 الشبكة» button (on a راوٍ card) → open that narrator's graph.
results.addEventListener("click", e => {
  const nj = e.target.closest(".net-jump");
  if(nj) openNetFromChain(nj.getAttribute("data-nav"));
});

// «تتبّع تخريجه ⟶» on a hadith card → jump to the تخريج tab and trace that matn.
results.addEventListener("click", e => {
  const t = e.target.closest(".go-takhrij");
  if(!t) return;
  q.value = t.getAttribute("data-q");
  document.querySelector('.modes button[data-mode="takhrij"]').click();  // switch tab (clears view)
  run();                                                                 // then run the takhrij
});

// «قارن ⟶» on a ranked «مشترك» name (التدقيق) → jump to the راوٍ tab to compare its candidates
// side by side (grade · death · nisba), so the user distinguishes the homonyms or spots an over-match.
results.addEventListener("click", e => {
  const t = e.target.closest(".go-narrator");
  if(!t) return;
  q.value = t.getAttribute("data-q");
  document.querySelector('.modes button[data-mode="narrator"]').click();
  run();
});

// Audit (التدقيق): click a case to expand its hadith + chain + verdict IN PLACE (no
// navigation, so you keep your spot in the list; the panel's text is freely selectable).
results.addEventListener("click", async e => {
  const head = e.target.closest(".audit-head");
  if(!head) return;
  const wrap = head.parentElement, box = wrap.querySelector(".case-box");
  const open = box.classList.toggle("show");
  const arrow = head.querySelector(".simbadge");
  if(arrow) arrow.textContent = arrow.textContent.replace(/[▾▴]\s*$/, open ? "▴" : "▾");
  if(!open || box.dataset.loaded) return;
  box.dataset.loaded = "1";
  box.innerHTML = `<div class="note">… جارٍ التحميل</div>`;
  try { box.innerHTML = caseDetailHtml(await getJSON(`/verify-isnad?hadith_id=${encodeURIComponent(wrap.dataset.id)}`)); }
  catch(_){ box.innerHTML = `<div class="note">تعذّر التحميل</div>`; box.dataset.loaded = ""; }
});

// Search controls (mode/field/group/sort): re-sort in place, or refetch with the new state.
results.addEventListener("change", e => {
  const sel = e.target.closest(".s-ctrl");
  if(!sel) return;
  searchState[sel.dataset.k] = sel.value;
  if(!q.value.trim()){ renderSearchIntro(); return; }      // pre-search: keep the panel, save the choice
  if(sel.dataset.k === "sort") renderSearch(searchData);   // client-side reorder, no refetch
  else reSearch();                                          // mode/field/group change the query
});

// Facet chips (filter by book / grade, toggle off when re-clicked) · «إزالة» clears ·
// «عرض رواياته الأخرى» unfolds a report's other narrations.
results.addEventListener("click", e => {
  if(e.target.closest(".clear-filters")){
    searchState.collection = null; searchState.grade = null; reSearch(); return;
  }
  const f = e.target.closest(".facet");
  if(f){
    if(f.dataset.col != null){
      const id = +f.dataset.col;
      searchState.collection = (searchState.collection == id) ? null : id;
    } else if(f.dataset.grade != null){
      searchState.grade = (searchState.grade === f.dataset.grade) ? null : f.dataset.grade;
    }
    reSearch();
    return;
  }
  const vt = e.target.closest(".var-toggle");
  if(vt){
    const box = vt.nextElementSibling;
    if(box){ const open = box.classList.toggle("show");
      vt.textContent = vt.textContent.replace(/[▾▴]\s*$/, open ? "▴" : "▾"); }
  }
});

// Copy / share a hadith (matn + citation). Works offline; share falls back to copy,
// copy falls back to a temporary textarea where the Clipboard API is unavailable (file://).
results.addEventListener("click", async e => {
  const btn = e.target.closest(".copy-btn, .share-btn");
  if(!btn) return;
  const text = btn.dataset.text || "";
  const flash = ok => { const t = btn.dataset.label || btn.textContent;
    btn.dataset.label = t; btn.classList.add("done");
    btn.textContent = ok ? "✓ تمّ" : "✗ تعذّر";
    setTimeout(() => { btn.textContent = t; btn.classList.remove("done"); }, 1200); };
  if(btn.classList.contains("share-btn") && navigator.share){
    try{ await navigator.share({text}); }catch(_){}   // user-cancel is not an error
    return;
  }
  try{ await navigator.clipboard.writeText(text); flash(true); }
  catch(_){
    try{ const ta = document.createElement("textarea"); ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); document.body.removeChild(ta); flash(true); }
    catch(_){ flash(false); }
  }
});

// Save (★) / edit a note / delete — all the notebook actions (event delegation, async).
results.addEventListener("click", async e => {
  const star = e.target.closest(".save-btn");
  if(star){
    const payload = SAVEABLE[star.dataset.k];
    if(!payload || star.classList.contains("saved")) return;
    try{
      const r = await fetch("/notebook", {method:"POST",
        headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
      if(r.ok){ star.classList.add("saved"); star.textContent = "✓"; star.title = "حُفظ في الدفتر"; }
    }catch(_){}
    return;
  }
  const card = e.target.closest(".card.nb");
  if(!card) return;
  const id = card.dataset.id;
  if(e.target.classList.contains("nb-del")){
    try{
      if((await fetch(`/notebook/${id}`, {method:"DELETE"})).ok){
        card.remove();
        const left = results.querySelectorAll(".card.nb").length;
        const note = results.querySelector(".note");
        if(!left) results.innerHTML = NB_EMPTY;
        else if(note) note.textContent = `${left} محفوظًا في دفترك`;
      }
    }catch(_){}
  } else if(e.target.classList.contains("nb-save")){
    const btn = e.target, val = card.querySelector(".nb-input").value;
    try{
      const r = await fetch(`/notebook/${id}`, {method:"PATCH",
        headers:{"Content-Type":"application/json"}, body:JSON.stringify({note: val})});
      if(r.ok){ const t = btn.textContent; btn.textContent = "✓ حُفظت";
        setTimeout(() => btn.textContent = t, 1200); }
    }catch(_){}
  }
});

// On first load the search tab is active — show its filters up front, before any query.
renderSearchIntro();
</script>
</body>
</html>
