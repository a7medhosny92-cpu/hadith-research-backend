<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بحث وتحقيق الحديث</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&display=swap');
  :root{
    --bg:#f7f3ea; --card:#ffffff; --ink:#2b2620; --text:#2b2620;
    --accent:#1f7a52; --accent2:#155c3d; --gold:#a87d27; --gold2:#876516;
    --muted:#8a7f6c; --line:#e7dec9;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Amiri","Scheherazade New","Traditional Arabic","Segoe UI",serif;
    font-size:17px;line-height:1.9;
    background-image:radial-gradient(circle at 1px 1px, rgba(168,125,39,.055) 1px, transparent 0);
    background-size:22px 22px;}
  header{padding:22px 24px 18px;border-bottom:2px solid var(--gold);
    background:linear-gradient(180deg,#fbf8f1,#f2ebdb)}
  header h1{margin:0;font-size:1.95rem;font-weight:700;color:var(--accent2);letter-spacing:.3px}
  header p{margin:8px 0 0;color:var(--gold2);font-size:1.02rem}
  .bar{display:flex;gap:8px;padding:14px 24px;flex-wrap:wrap;align-items:center;
    position:sticky;top:0;background:rgba(247,243,234,.96);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);z-index:5}
  .modes{display:flex;gap:5px;flex-wrap:wrap}
  .modes button{background:var(--card);color:var(--accent2);border:1px solid var(--line);
    padding:9px 16px;border-radius:10px;cursor:pointer;font-size:1rem;font-family:inherit;transition:all .15s}
  .modes button:hover{border-color:var(--accent);background:#f0f7f3}
  .modes button.active{background:var(--accent);border-color:var(--accent);color:#fff;
    box-shadow:0 2px 8px rgba(31,122,82,.25)}
  #q{flex:1;min-width:240px;background:var(--card);color:var(--text);font-family:inherit;
    border:1px solid var(--line);border-radius:10px;padding:12px 16px;font-size:1.15rem}
  #q:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,82,.12)}
  #go{background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;
    padding:12px 26px;font-size:1.05rem;font-weight:700;cursor:pointer}
  #go:hover{background:var(--accent2)}
  #results{padding:10px 24px 56px;max-width:980px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin:15px 0;box-shadow:0 1px 4px rgba(80,60,20,.06)}
  .matn{font-size:1.45rem;line-height:2.2;color:#221d16;
    font-family:"Scheherazade New","Amiri",serif}
  .answer{white-space:pre-wrap;font-size:1.22rem;line-height:2.15}
  .cite{color:var(--muted);margin-top:14px;font-size:.95rem;
    display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .grade{padding:4px 13px;border-radius:999px;font-size:.85rem;font-weight:700}
  .g-sahih{background:#dcefe1;color:#15643f}
  .g-hasan{background:#f6eccf;color:#876413}
  .g-daif{background:#f6ddd5;color:#a5381f}
  .g-other{background:#ebe4d4;color:#6c6149}
  .toggle{color:var(--accent);cursor:pointer;font-size:.9rem;margin-top:10px;user-select:none;font-weight:700}
  .isnad{margin-top:8px;color:#4a5a52;font-size:1rem;line-height:2;display:none;
    border-top:1px dashed var(--line);padding-top:10px}
  .isnad.show{display:block}
  .sharh{border-inline-start:4px solid var(--accent);background:#f1f8f4}
  .sharh b{color:var(--accent2)}
  .sharh .ex{margin-top:6px;line-height:2.05;color:#33453c}
  .note{color:var(--muted);margin:8px 2px;font-size:.98rem}
  .state{text-align:center;padding:46px;color:var(--muted);font-size:1.1rem}
  .more{display:block;margin:22px auto;background:var(--card);color:var(--accent);font-family:inherit;
    border:1px solid var(--accent);border-radius:10px;padding:11px 28px;font-size:1rem;cursor:pointer}
  .more:hover{background:var(--accent);color:#fff}
  #engine,#model{background:var(--card);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;font-size:.98rem;font-family:inherit}
  #engine{cursor:pointer}
  #model{min-width:200px}
  #engine[hidden],#model[hidden]{display:none}
  #compare-lbl{display:flex;gap:6px;align-items:center;color:var(--muted);
    font-size:.92rem;cursor:pointer}
  #compare-lbl[hidden]{display:none}
  .cmp-cols{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
  .cmp-col{flex:1 1 300px;min-width:280px}
  .cmp-head{font-weight:700;color:var(--accent2);margin:6px 2px;font-size:1rem}
  .cmp-time{color:var(--muted);font-size:.85rem}
  .warn{background:#fbf0d8;color:#8a5a16;border:1px solid #e8cf94;border-radius:10px;
    padding:11px 15px;margin:8px 2px;font-size:.96rem;line-height:1.8}
  .engine-tag{color:var(--accent);font-size:.88rem;margin:2px 2px 8px;font-weight:700}
  .group-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    margin:24px 2px 8px;padding-top:12px;border-top:1px solid var(--line)}
  .vlabel{padding:4px 14px;border-radius:999px;font-size:.9rem;font-weight:700}
  .v-lafz{background:#dcefe1;color:#15643f}
  .v-nahw{background:#f6eccf;color:#876413}
  .v-maana{background:#dde8f5;color:#2a5a8a}
  .simbadge{color:var(--muted);font-size:.85rem}
  .comp-head{font-size:1.3rem;font-weight:700;color:var(--accent2);
    margin:28px 2px 4px;padding-top:16px;border-top:2px solid var(--gold)}
  .takhrij-line{color:var(--gold2);font-size:.95rem;margin:2px 2px 8px;line-height:1.9}
  .chain{margin-top:8px;color:#4a5a52;font-size:1rem;line-height:2;
    border-top:1px dashed var(--line);padding-top:8px}
  .chain-lbl{color:var(--accent);font-weight:700}
  .rawi-name{font-size:1.5rem;font-weight:700;color:#221d16;
    display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .rawi-cols{display:flex;gap:16px;flex-wrap:wrap}
  .rawi-col{flex:1;min-width:280px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;margin:14px 0;box-shadow:0 1px 4px rgba(80,60,20,.06)}
  .rawi-col h3{margin:0 0 12px;color:var(--accent2);font-size:1.15rem;
    border-bottom:2px solid var(--gold);padding-bottom:8px}
  .rawi-item{display:flex;justify-content:space-between;gap:10px;align-items:center;
    padding:8px 4px;border-bottom:1px solid var(--line);font-size:1.08rem}
  .rawi-summary{margin-top:10px;color:#3a3328;line-height:2.1;font-size:1.08rem}
  .sources{margin:16px 2px;color:var(--muted);font-size:.92rem;line-height:1.9;
    border-top:1px dashed var(--line);padding-top:10px}
  .rulings{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    display:flex;flex-wrap:wrap;gap:6px;align-items:center;line-height:2}
  .r-lbl{color:var(--accent);font-weight:700;font-size:.92rem}
  .ruling{padding:3px 11px;border-radius:999px;font-size:.85rem}
  .r-era{opacity:.7;font-size:.78rem}
  .r-basis{opacity:.65;font-size:.76rem}
  .r-diverge{color:#b5701a;font-weight:700;font-size:.85rem}
  .r-info{cursor:help;opacity:.85}
  /* ★ save-to-notebook chip + the notebook cards */
  .save-btn{margin-inline-start:auto;background:transparent;border:1px solid var(--line);
    color:var(--gold);border-radius:9px;padding:3px 11px;font-size:1.1rem;cursor:pointer;line-height:1}
  .save-btn:hover{border-color:var(--gold);background:#fbf4e2}
  .save-btn.saved{color:var(--accent);border-color:var(--accent);background:#eaf5ef;cursor:default}
  .card.nb .cite{margin-top:0}
  .nb-kind{background:#eef6f1;color:var(--accent2);padding:3px 12px;border-radius:999px;
    font-size:.82rem;font-weight:700}
  .nb-title{color:var(--ink);font-weight:700}
  .nb-body{font-size:1.15rem;line-height:2.05;margin-top:8px;white-space:pre-wrap;color:#2b2620}
  .nb-row{display:flex;gap:8px;margin-top:12px;align-items:center}
  .nb-input{flex:1;background:#fcfaf4;color:var(--text);border:1px solid var(--line);
    border-radius:9px;padding:9px 13px;font-size:1rem;font-family:inherit}
  .nb-input:focus{outline:none;border-color:var(--accent)}
  .nb-save,.nb-del{background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:8px 15px;font-size:.9rem;cursor:pointer;white-space:nowrap;font-family:inherit}
  .nb-save:hover{border-color:var(--accent);color:var(--accent2);background:#f0f7f3}
  .nb-del{color:#b04a3a}.nb-del:hover{border-color:#e0b0a8;background:#fbeae6}
  /* isnad: transmission-mode chip on each narrator */
  .via{font-size:.78rem;padding:2px 10px;border-radius:999px;margin-inline-start:6px;font-weight:700}
  .via-sama{background:#dcefe1;color:#15643f}
  .via-anana{background:#f6eccf;color:#876413}
  /* methodology (المنهجية): the «where does each datum come from» page */
  .m-h{color:var(--accent2);font-size:1.3rem;margin:0 0 12px;font-weight:700;
    border-bottom:2px solid var(--gold);padding-bottom:8px}
  .m-p{line-height:2.1;color:#3a3328;margin:8px 0;font-size:1.08rem}
  .m-row{display:flex;gap:10px;margin:9px 0;line-height:2;font-size:1.05rem;align-items:flex-start}
  .m-row span:last-child{flex:1;color:#3a3328}
  .m-lbl{flex:0 0 92px;font-weight:700;font-size:.92rem;padding-top:2px}
  .m-src{color:#2a5a8a}.m-how{color:var(--accent)}.m-pros{color:#2f7d4f}.m-cons{color:#b5701a}
</style>
</head>
<body>
<header>
  <h1>بحث وتحقيق الحديث</h1>
  <p>ابحث في كتب السنة، اسأل، وتتبّع التخريج — مع شروح العلماء، بالعربية الفصحى</p>
</header>

<div class="bar">
  <div class="modes">
    <button data-mode="search" class="active">بحث</button>
    <button data-mode="ask">سؤال</button>
    <button data-mode="takhrij">تخريج</button>
    <button data-mode="narrator">راوٍ</button>
    <button data-mode="isnad">الإسناد</button>
    <button data-mode="notebook">دفتري</button>
    <button data-mode="method">المنهجية</button>
  </div>
  <input id="q" placeholder="اكتب الحديث أو السؤال…" autofocus>
  <button id="go">ابحث</button>
  <select id="engine" title="محرّك الإجابة" hidden>
    <option value="off">بدون ذكاء اصطناعي · سريع</option>
    <option value="local">محلي · Ollama</option>
    <option value="remote">سحابي · أي مزوّد</option>
  </select>
  <input id="model" list="models" placeholder="النموذج (اختياري)" title="أي نموذج litellm" hidden>
  <datalist id="models">
    <option value="ollama/qwen2.5:3b"></option>
    <option value="ollama/qwen2.5:7b"></option>
    <option value="ollama/qwen2.5:14b"></option>
    <option value="dashscope/qwen-max"></option>
    <option value="dashscope/qwen-plus"></option>
    <option value="anthropic/claude-sonnet-4-6"></option>
    <option value="anthropic/claude-opus-4-8"></option>
    <option value="openai/gpt-4o"></option>
    <option value="gemini/gemini-2.0-flash"></option>
    <option value="groq/llama-3.3-70b-versatile"></option>
    <option value="mistral/mistral-large-latest"></option>
    <option value="ollama/llama3"></option>
  </datalist>
  <label id="compare-lbl" title="قارن أحجام Qwen المحلية الثلاثة" hidden>
    <input type="checkbox" id="compare"> قارن النماذج
  </label>
</div>

<div id="results">
  <div class="state">اكتب نصًّا في الأعلى واضغط Enter</div>
</div>

<script>
const LABELS = {search:"ابحث", ask:"اسأل", takhrij:"خرّج", narrator:"اعرض",
  isnad:"حقّق", notebook:"ابحث", method:"اعرض"};
const PLACEHOLDER = {search:"اكتب الحديث أو السؤال…", ask:"اكتب سؤالك…",
  takhrij:"اكتب متن الحديث…", narrator:"اكتب اسم الراوي…",
  isnad:"الصق الإسناد… أو رقم حديثٍ مفهرس", notebook:"ابحث في دفترك… (فارغ = الكل)",
  method:""};
const ENGINE_AR = {
  off: "إجابة استخراجية من المصادر (بدون ذكاء اصطناعي)",
  local: "أُجيب عبر محرّك محلي (Ollama)",
  remote: "أُجيب عبر محرّك سحابي",
};
let mode = "search";
const results = document.getElementById("results");
const q  = document.getElementById("q");
const go = document.getElementById("go");
const engineSel = document.getElementById("engine");
const modelInput = document.getElementById("model");
const compareLbl = document.getElementById("compare-lbl");
const compareBox = document.getElementById("compare");
// Local Qwen sizes to put head-to-head when «قارن النماذج» is on.
const COMPARE_MODELS = ["ollama/qwen2.5:3b", "ollama/qwen2.5:7b", "ollama/qwen2.5:14b"];

// The LLM switch shows only in «سؤال»; the model box when an engine is on; the
// compare toggle only for the local engine (pit the local sizes against each other).
function syncEngineUI(){
  engineSel.hidden = mode !== "ask";
  modelInput.hidden = mode !== "ask" || engineSel.value === "off";
  compareLbl.hidden = !(mode === "ask" && engineSel.value === "local");
}
engineSel.addEventListener("change", syncEngineUI);

document.querySelectorAll(".modes button").forEach(b => b.onclick = () => {
  mode = b.dataset.mode;
  document.querySelectorAll(".modes button").forEach(x => x.classList.toggle("active", x === b));
  go.textContent = LABELS[mode];
  q.placeholder = PLACEHOLDER[mode];
  syncEngineUI();
  // «المنهجية» is a reading page with no query — hide the search box for it.
  const info = mode === "method";
  q.style.display = info ? "none" : "";
  go.style.display = info ? "none" : "";
  if(mode === "notebook" || mode === "method") run();   // open immediately
});
go.onclick = run;
q.addEventListener("keydown", e => { if (e.key === "Enter") run(); });

function esc(s){ const d = document.createElement("div"); d.textContent = (s==null?"":s); return d.innerHTML; }

// «★ احفظ» button: register the payload, render a star; a delegated handler POSTs it.
let _saveSeq = 0; const SAVEABLE = {};
function saveChip(payload){
  const k = ++_saveSeq; SAVEABLE[k] = payload;
  return `<button class="save-btn" data-k="${k}" title="احفظ في الدفتر">★</button>`;
}
function gradeClass(g){
  if(!g) return "g-other";
  if(g.includes("صحيح")) return "g-sahih";
  if(g.includes("حسن"))  return "g-hasan";
  if(g.includes("ضعيف")||g.includes("موضوع")||g.includes("منكر")||g.includes("باطل")) return "g-daif";
  return "g-other";
}
// Scholars' rulings (أحكام), ordered by era; هـ after each hijri year, divergence flagged.
function rulingsHtml(rulings){
  if(!rulings || !rulings.length) return "";
  const items = rulings.map(r => {
    const basis = (r.basis && r.basis !== "نصّ") ? ` <span class="r-basis">(${esc(r.basis)})</span>` : "";
    const info = r.note ? ` <span class="r-info" title="${esc(r.note)}">ⓘ</span>` : "";
    const tip = r.note ? ` title="${esc(r.note)}"` : "";
    return `<span class="ruling ${gradeClass(r.verdict)}"${tip}>${esc(r.scholar)} `
      + `<span class="r-era">${esc(r.era)}</span>: ${esc(r.verdict)}${basis}${info}</span>`;
  }).join("");
  const diverge = new Set(rulings.map(r => r.verdict)).size > 1
    ? ` <span class="r-diverge">⚠ اختلف العلماء</span>` : "";
  return `<div class="rulings"><span class="r-lbl">أحكام العلماء:</span>${items}${diverge}</div>`;
}
function hadithCard(h){
  const cite = [h.collection, (h.number!=null?"رقم "+h.number:null), (h.page!=null?"ص "+h.page:null)]
    .filter(Boolean).join("  ·  ");
  const grade = h.grade ? `<span class="grade ${gradeClass(h.grade)}">${esc(h.grade)}</span>` : "";
  const isnad = h.isnad
    ? `<div class="toggle">عرض الإسناد ▾</div><div class="isnad">${esc(h.isnad)}</div>` : "";
  const save = saveChip({kind:"hadith", title:cite, body:h.matn,
    meta:{collection:h.collection, number:h.number, page:h.page, grade:h.grade,
          isnad:h.isnad, rulings:h.rulings}});
  return `<div class="card"><div class="matn">${esc(h.matn)}</div>
    <div class="cite">${grade}<span>${esc(cite)}</span>${save}</div>${rulingsHtml(h.rulings)}${isnad}</div>`;
}

// Reveal long result lists in batches so the window stays responsive even with
// thousands of hits — all results are fetched, "تحميل المزيد" shows the rest.
const PAGE = 50;
let listState = null;   // {hits, shown, unit}

function renderList(hits, unit, empty){
  if(!hits.length){ results.innerHTML = `<div class="state">${empty}</div>`; return; }
  listState = { hits, shown: 0, unit };
  results.innerHTML =
    `<div class="note" id="count"></div><div id="list"></div><div id="more-wrap"></div>`;
  revealMore();
}
function revealMore(){
  const { hits, shown, unit } = listState;
  const next = hits.slice(shown, shown + PAGE);
  document.getElementById("list").insertAdjacentHTML("beforeend", next.map(hadithCard).join(""));
  listState.shown += next.length;
  document.getElementById("count").textContent = `${listState.shown} من ${hits.length} ${unit}`;
  const left = hits.length - listState.shown;
  const wrap = document.getElementById("more-wrap");
  wrap.innerHTML = left > 0 ? `<button class="more">تحميل المزيد (${left})</button>` : "";
  if(left > 0) wrap.firstChild.onclick = revealMore;
}

async function run(){
  const query = q.value.trim();
  if(mode === "method"){ renderMethodology(); return; }   // a static reading page
  if(!query && mode !== "notebook") return;   // notebook lists everything when empty
  results.innerHTML = `<div class="state">… جارٍ التنفيذ</div>`;
  try{
    if(mode === "search"){
      const d = await (await fetch(`/search?q=${encodeURIComponent(query)}`)).json();
      renderList(d.results || [], "نتيجة", "لا توجد نتائج");
    } else if(mode === "ask"){
      if(engineSel.value === "local" && compareBox.checked){ await runCompare(query); return; }
      const eng = engineSel.value;
      const mdl = modelInput.value.trim();
      let url = `/ask?q=${encodeURIComponent(query)}&engine=${eng}`;
      if(mdl && eng !== "off") url += `&model=${encodeURIComponent(mdl)}`;
      const d = await (await fetch(url)).json();
      let html = "";
      if(d.warning) html += `<div class="warn">${esc(d.warning)}</div>`;
      if(d.engine){
        const tag = (ENGINE_AR[d.engine] || esc(d.engine)) + (d.model ? ` · ${esc(d.model)}` : "");
        html += `<div class="engine-tag">${tag}</div>`;
      }
      html += `<div class="card"><div class="answer">${esc(d.answer)}</div>`
        + saveChip({kind:"answer", title:query, body:d.answer,
            meta:{engine:d.engine, model:d.model, rulings:d.rulings}}) + `</div>`;
      if(d.rulings && d.rulings.length) html += `<div class="card">${rulingsHtml(d.rulings)}</div>`;
      (d.sharh || []).forEach(s => {
        const ref = s.sharh + (s.hadith_number!=null ? ` (عند الحديث ${s.hadith_number})` : "");
        const body = s.text || s.excerpt || "";
        html += `<div class="card sharh"><b>${esc(ref)}</b><div class="ex">${esc(body)}</div></div>`;
      });
      results.innerHTML = html;
    } else if(mode === "takhrij"){
      const d = await (await fetch(`/takhrij?q=${encodeURIComponent(query)}`)).json();
      renderTakhrij(d);
    } else if(mode === "narrator"){
      const r = await fetch(`/narrator?name=${encodeURIComponent(query)}`);
      const d = await r.json();
      if(!r.ok){ results.innerHTML = `<div class="state">${esc(d.detail || "تعذّر العرض")}</div>`; return; }
      renderNarrator(d);
    } else if(mode === "isnad"){
      // digits → a hadith number to look up; anything else → a pasted chain.
      const param = /^\d+$/.test(query) ? `hadith_id=${query}` : `isnad=${encodeURIComponent(query)}`;
      const r = await fetch(`/verify-isnad?${param}`);
      const d = await r.json();
      if(!r.ok){ results.innerHTML = `<div class="state">${esc(d.detail || "تعذّر التحقّق")}</div>`; return; }
      renderIsnad(d);
    } else {
      const d = await (await fetch(`/notebook?q=${encodeURIComponent(query)}`)).json();
      renderNotebook(d.items || []);
    }
  } catch(e){
    results.innerHTML = `<div class="state">تعذّر الاتصال بالخادم. تأكّد أنّ التطبيق يعمل.</div>`;
  }
}

// Run the same question across the local Qwen sizes, side by side, each with the time
// it took — so you can compare quality vs speed and decide which size is best for you.
async function runCompare(query){
  results.innerHTML = `<div class="note">مقارنة النماذج المحلية على نفس السؤال</div>`
    + `<div class="cmp-cols" id="cmp"></div>`;
  const cmp = document.getElementById("cmp");
  COMPARE_MODELS.forEach((m, i) => cmp.insertAdjacentHTML("beforeend",
    `<div class="cmp-col"><div class="cmp-head" id="h${i}">${esc(m)} <span class="cmp-time">… جارٍ</span></div>`
    + `<div class="card"><div class="answer" id="a${i}">…</div></div></div>`));
  for(let i = 0; i < COMPARE_MODELS.length; i++){
    const t0 = performance.now();
    try{
      const url = `/ask?q=${encodeURIComponent(query)}&engine=local&model=${encodeURIComponent(COMPARE_MODELS[i])}`;
      const d = await (await fetch(url)).json();
      const secs = ((performance.now() - t0) / 1000).toFixed(1);
      document.getElementById("h"+i).innerHTML = `${esc(COMPARE_MODELS[i])} <span class="cmp-time">· ${secs}ث</span>`;
      const warn = d.warning ? `<div class="warn">${esc(d.warning)}</div>` : "";
      document.getElementById("a"+i).innerHTML = warn + esc(d.answer || "");
    }catch(e){
      document.getElementById("a"+i).textContent = "تعذّر الاتصال";
    }
  }
}

// Takhrij: show every narration of the same report, grouped into distinct wordings
// (صيغ) and labelled by closeness to the source (بلفظه / بنحوه / بمعناه).
function vlabelClass(l){ return l === "بلفظه" ? "v-lafz" : l === "بنحوه" ? "v-nahw" : "v-maana"; }
function narrationCard(n){
  const cite = [n.collection, (n.number!=null?"رقم "+n.number:null), (n.page!=null?"ص "+n.page:null)]
    .filter(Boolean).join("  ·  ");
  const grade = n.grade ? `<span class="grade ${gradeClass(n.grade)}">${esc(n.grade)}</span>` : "";
  const sim = `<span class="simbadge">${Math.round((n.overlap||0)*100)}% تطابق</span>`;
  // The chain is always shown here — «who carried it» is the point of takhrij.
  const chain = n.isnad
    ? `<div class="chain"><span class="chain-lbl">الإسناد:</span> ${esc(n.isnad)}</div>` : "";
  const save = saveChip({kind:"hadith", title:cite, body:n.matn,
    meta:{collection:n.collection, number:n.number, page:n.page, grade:n.grade,
          isnad:n.isnad, companion:n.companion, rulings:n.rulings}});
  return `<div class="card"><div class="matn">${esc(n.matn)}</div>
    <div class="cite">${grade}<span>${esc(cite)}</span>${sim}${save}</div>${chain}${rulingsHtml(n.rulings)}</div>`;
}
function renderTakhrij(d){
  const groups = d.groups || [];
  if(!groups.length){ results.innerHTML = `<div class="state">لا توجد روايات</div>`; return; }
  const sources = Object.keys(d.by_collection || {}).length;
  let html = `<div class="note">${d.count} روايةً · عن ${d.companions} صحابيًّا · `
    + `في ${d.variants} صيغة · عبر ${sources} مصدرًا</div>`;
  groups.forEach(g => {
    const who = g.companion ? `من حديث: ${esc(g.companion)}` : "صحابيّ غير محدَّد";
    html += `<div class="comp-head">${who} <span class="simbadge">(${g.count} رواية)</span></div>`;
    if(g.takhrij) html += `<div class="takhrij-line">${esc(g.takhrij)}</div>`;
    (g.variants || []).forEach(v => {
      html += `<div class="group-head"><span class="vlabel ${vlabelClass(v.label)}">${esc(v.label)}</span>`
        + `<span class="simbadge">${v.count} رواية · ${Math.round((v.closeness||0)*100)}% تطابق مع الأصل</span></div>`;
      html += v.narrations.map(narrationCard).join("");
    });
  });
  results.innerHTML = html;
}

// Narrator (راوٍ): the narrator's place in the network — his شيوخ and تلاميذ, and grade.
function rijalClass(v){
  if(!v) return "g-other";
  if(/ثقة|صحاب|حافظ|إمام|ثبت/.test(v)) return "g-sahih";
  if(/صدوق|لا بأس|حسن/.test(v)) return "g-hasan";
  if(/ضعيف|متروك|منكر|كذاب|واهٍ/.test(v)) return "g-daif";
  return "g-other";
}
function rawiList(title, arr){
  if(!arr || !arr.length) return `<div class="rawi-col"><h3>${title}</h3><div class="note">—</div></div>`;
  const rows = arr.map(x =>
    `<div class="rawi-item"><span>${esc(x.name)}</span><span class="simbadge">${x.count} حديثًا</span></div>`
  ).join("");
  return `<div class="rawi-col"><h3>${title} (${arr.length})</h3>${rows}</div>`;
}
function renderNarrator(d){
  const v = d.grade && (d.grade.verdict || d.grade.grade);
  const badge = v ? `<span class="grade ${rijalClass(v)}">${esc(v)}</span>` : "";
  const save = saveChip({kind:"narrator", title:d.name, body:d.summary || "",
    meta:{grade:d.grade, sources:d.sources}});
  let html = `<div class="card"><div class="rawi-name">${esc(d.name)} ${badge} ${save}</div>`;
  if(d.summary) html += `<div class="rawi-summary">${esc(d.summary)}</div>`;
  html += `</div>`;
  html += `<div class="rawi-cols">`
    + rawiList("شيوخه — يروي عنهم", d.teachers)
    + rawiList("تلاميذه — يروون عنه", d.students)
    + `</div>`;
  if(d.sources && d.sources.length){
    html += `<div class="sources"><span class="r-lbl">المصادر:</span> `
      + d.sources.map(s => `${esc(s.what)} — ${esc(s.from)}`).join("  ·  ") + `</div>`;
  }
  results.innerHTML = html;
}

// Isnad (الإسناد): the chain's bottom-line verdict, narrator by narrator, plus اتصال.
const TONE = {sahih:"g-sahih", hasan:"g-hasan", daif:"g-daif", other:"g-other"};
function isnadVia(v){
  if(v === "سماع")  return `<span class="via via-sama">سماع</span>`;
  if(v === "عنعنة") return `<span class="via via-anana">عنعنة</span>`;
  return "";
}
function renderIsnad(d){
  const a = d.analysis || {}, r = d.ruling, cont = d.continuity;
  let html = "";
  // 1) the bottom-line verdict «الحكم على الإسناد»
  if(r){
    const cls = TONE[r.tone] || "g-other";
    const save = saveChip({kind:"isnad", title:`الحكم على الإسناد: ${r.grade}`,
      body:(d.source && d.source.isnad) || "", meta:{grade:r.grade, ruling:r, source:d.source}});
    html += `<div class="card"><div class="rawi-name"><span>الحكم على الإسناد</span>`
      + `<span class="grade ${cls}">${esc(r.grade)}</span>${save}</div>`
      + `<div class="rawi-summary">${esc(r.reason)}</div>`
      + `<div class="note" style="margin-top:8px">${esc(r.disclaimer)}</div></div>`;
  }
  // 2) chain features at a glance
  const feats = [`${a.length || 0} راوٍ`];
  if(a.modes){ if(a.modes["سماع"]) feats.push(`سماع: ${a.modes["سماع"]}`);
               if(a.modes["عنعنة"]) feats.push(`عنعنة: ${a.modes["عنعنة"]}`); }
  if(a.has_tahwil) feats.push("فيه تحويل (ح)");
  feats.push(a.reaches_prophet ? "يصل إلى النبي ﷺ (مرفوع)" : "لا يبلغ النبي ﷺ في النصّ");
  html += `<div class="note">${feats.map(esc).join("  ·  ")}</div>`;
  // 3) the narrators, each with his grade
  html += `<div class="rawi-col"><h3>سلسلة الرواة (${(a.narrators || []).length})</h3>`;
  (a.narrators || []).forEach((n, i) => {
    const rij = n.rijal;
    const g = rij && rij.grade;
    const amb = rij && rij.ambiguous ? ` <span class="simbadge" title="${esc((rij.alternatives||[]).join(' / '))}">مشترك</span>` : "";
    const badge = g
      ? `<span class="grade ${rijalClass(g)}" title="${esc(rij.verdict || '')}">${esc(g)}</span>${amb}`
      : `<span class="simbadge">غير معروف في القاعدة</span>`;
    html += `<div class="rawi-item"><span>${i + 1}. ${esc(n.name)} ${isnadVia(n.via)}</span>${badge}</div>`;
  });
  html += `</div>`;
  // 4) continuity, link by link
  if(cont){
    html += `<div class="rawi-col"><h3>اتصال السند</h3>`;
    (cont.links || []).forEach(l => {
      const ok = l.seen
        ? `<span class="grade g-sahih">معروف (${l.count})</span>`
        : `<span class="grade g-daif">لم يُعرف</span>`;
      html += `<div class="rawi-item"><span>${esc(l.from)} ← ${esc(l.to)}</span>${ok}</div>`;
    });
    html += `<div class="rawi-summary">${esc(cont.note)}</div></div>`;
  }
  // 5) the structural notes
  if(a.notes && a.notes.length){
    html += `<div class="sources"><span class="r-lbl">ملاحظات:</span> `
      + a.notes.map(esc).join("  ·  ") + `</div>`;
  }
  results.innerHTML = html;
}

// Study notebook (دفتري): the items you saved with the ★ star, each with your own note.
const NB_KIND = {hadith:"حديث", narrator:"راوٍ", answer:"جواب", isnad:"إسناد", note:"ملاحظة"};
const NB_EMPTY = `<div class="state">دفترك فارغ — احفظ حديثًا أو راويًا أو جوابًا بالنجمة ★</div>`;
function nbGrade(it){
  const g = it.meta && it.meta.grade;
  if(!g) return "";
  const v = typeof g === "string" ? g : (g.verdict || g.grade);
  return v ? `<span class="grade ${gradeClass(v)}">${esc(v)}</span>` : "";
}
function nbCard(it){
  const kind  = `<span class="nb-kind">${NB_KIND[it.kind] || esc(it.kind)}</span>`;
  const title = it.title ? `<span class="nb-title">${esc(it.title)}</span>` : "";
  const body  = it.body  ? `<div class="nb-body">${esc(it.body)}</div>` : "";
  return `<div class="card nb" data-id="${it.id}">
    <div class="cite">${kind}${nbGrade(it)}${title}
      <button class="nb-del" title="احذف من الدفتر">حذف ✕</button></div>
    ${body}
    <div class="nb-row">
      <input class="nb-input" placeholder="اكتب ملاحظتك…" value="${esc(it.note || "")}">
      <button class="nb-save">حفظ الملاحظة</button>
    </div></div>`;
}
function renderNotebook(items){
  if(!items.length){ results.innerHTML = NB_EMPTY; return; }
  results.innerHTML = `<div class="note">${items.length} محفوظًا في دفترك</div>`
    + items.map(nbCard).join("");
}

    cons:"الربطُ بالرقم قد يخطئ إن اختلف ترقيمُ الشرح عن ترقيم الأصل."},
  {h:"دفتر الدراسة (الحفظ)", src:"ما تحفظه أنت بالنجمة ★.",
    how:"يُخزَّن محليًّا في ملفٍّ مستقلٍّ (notebook.db) مع ملاحظتك ووسومك، منفصلًا عن الفهارس فلا يُمَسّ عند إعادة البناء.",
    pros:"بحثُك لا يضيع بين التحديثات، وكلُّه على جهازك.",
    cons:"محليٌّ على هذا الجهاز؛ لا يُزامَن تلقائيًّا بين أجهزة."},
  {h:"حدودٌ عامّة وإخلاءُ مسؤولية", p:[
    "هذه أداةُ دراسةٍ وبحثٍ تُعينك على الوصول إلى النصوص وطرقها وأحكام أهل العلم عليها، وليست مرجعًا للفتوى ولا بديلًا عن أهل العلم.",
    "جودةُ المعطيات تابعةٌ لاستخراجٍ اجتهاديٍّ من النصّ ولتغطية قواعد الرجال؛ فما كان حاسمًا (كنصّ المصدر ونسبته) فهو منقول، وما كان تحليليًّا (كالفصل والمطابقة والحكم) فيُراجَع.",
    "عند الاعتماد في تحقيقٍ أو نقل: ارجع دائمًا إلى المطبوع الموثوق وقابِل عليه."]},
];
function methodCard(s){
  let body = (s.p || []).map(t => `<p class="m-p">${esc(t)}</p>`).join("");
  const row = (lbl, val, cls) =>
    val ? `<div class="m-row"><span class="m-lbl ${cls}">${lbl}</span><span>${esc(val)}</span></div>` : "";
  body += row("المصدر", s.src, "m-src") + row("كيف يُستخرج", s.how, "m-how")
        + row("المزايا", s.pros, "m-pros") + row("الحدود", s.cons, "m-cons");
  return `<div class="card m-card"><h3 class="m-h">${esc(s.h)}</h3>${body}</div>`;
}
function renderMethodology(){
  results.innerHTML =
    `<div class="note">منهجية التطبيق: من أين يأتي كلُّ معطًى، وكيف يُستخرج، وما مزاياه وحدوده</div>`
    + METHODOLOGY.map(methodCard).join("");
}

// Toggle the isnad (event delegation).
results.addEventListener("click", e => {
  if(!e.target.classList.contains("toggle")) return;
  const isnad = e.target.nextElementSibling;
  const open = isnad.classList.toggle("show");
  e.target.textContent = open ? "إخفاء الإسناد ▴" : "عرض الإسناد ▾";
});

// Save (★) / edit a note / delete — all the notebook actions (event delegation, async).
results.addEventListener("click", async e => {
  const star = e.target.closest(".save-btn");
  if(star){
    const payload = SAVEABLE[star.dataset.k];
    if(!payload || star.classList.contains("saved")) return;
    try{
      const r = await fetch("/notebook", {method:"POST",
        headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
      if(r.ok){ star.classList.add("saved"); star.textContent = "✓"; star.title = "حُفظ في الدفتر"; }
    }catch(_){}
    return;
  }
  const card = e.target.closest(".card.nb");
  if(!card) return;
  const id = card.dataset.id;
  if(e.target.classList.contains("nb-del")){
    try{
      if((await fetch(`/notebook/${id}`, {method:"DELETE"})).ok){
        card.remove();
        const left = results.querySelectorAll(".card.nb").length;
        const note = results.querySelector(".note");
        if(!left) results.innerHTML = NB_EMPTY;
        else if(note) note.textContent = `${left} محفوظًا في دفترك`;
      }
    }catch(_){}
  } else if(e.target.classList.contains("nb-save")){
    const btn = e.target, val = card.querySelector(".nb-input").value;
    try{
      const r = await fetch(`/notebook/${id}`, {method:"PATCH",
        headers:{"Content-Type":"application/json"}, body:JSON.stringify({note: val})});
      if(r.ok){ const t = btn.textContent; btn.textContent = "✓ حُفظت";
        setTimeout(() => btn.textContent = t, 1200); }
    }catch(_){}
  }
});
</script>
</body>
</html>
