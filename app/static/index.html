<figcaption style="text-align:center;color:#666;font-size:.85rem;margin-top:.4rem;line-height:1.6">المسار: الكتب (المصادر) ← البناء (الغراف ⭐) ← التمييز ← النتيجة. الخيطُ الذهبيّ = شبكةُ الرجال (تهذيب الكمال والجرح والتعديل) التي تَحُلّ «المشترك» بالرفقة.</figcaption></figure></div>
<script>
const LABELS = {search:"ابحث", ask:"اسأل", takhrij:"خرّج", narrator:"اعرض", browse:"اعرض",
  network:"تنقّل", isnad:"حقّق", notebook:"ابحث", method:"اعرض", arch:"اعرض", tech:"اعرض", audit:"اعرض", conflicts:"اعرض", matn:"اعرض"};
const PLACEHOLDER = {search:"اكتب الحديث أو السؤال…", ask:"اكتب سؤالك…",
  takhrij:"اكتب متن الحديث…", narrator:"اكتب اسم الراوي…", browse:"",
  network:"اكتب اسم الراوي للتنقّل في شبكته…",
  isnad:"الصق الإسناد… أو رقم حديثٍ مفهرس", notebook:"ابحث في دفترك… (فارغ = الكل)",
  method:"", arch:"", tech:"", audit:"", conflicts:"", matn:""};
const ENGINE_AR = {
  off: "إجابة استخراجية من المصادر (بدون ذكاء اصطناعي)",
  local: "أُجيب عبر محرّك محلي (Ollama)",
  remote: "أُجيب عبر محرّك سحابي",
};
let mode = "search";
const results = document.getElementById("results");
const q  = document.getElementById("q");
const go = document.getElementById("go");
const engineSel = document.getElementById("engine");
const modelInput = document.getElementById("model");
const compareLbl = document.getElementById("compare-lbl");
const compareBox = document.getElementById("compare");
// Local Qwen sizes to put head-to-head when «قارن النماذج» is on.
const COMPARE_MODELS = ["ollama/qwen2.5:3b", "ollama/qwen2.5:7b", "ollama/qwen2.5:14b"];

// The LLM switch shows only in «سؤال»; the model box when an engine is on; the
// compare toggle only for the local engine (pit the local sizes against each other).
function syncEngineUI(){
  engineSel.hidden = mode !== "ask";
  modelInput.hidden = mode !== "ask" || engineSel.value === "off";
  compareLbl.hidden = !(mode === "ask" && engineSel.value === "local");
}
engineSel.addEventListener("change", syncEngineUI);

document.querySelectorAll(".modes button").forEach(b => b.onclick = () => {
  mode = b.dataset.mode;
  navStack = [];                            // switching tabs starts a fresh view → no «رجوع» trail
  document.querySelectorAll(".modes button").forEach(x => x.classList.toggle("active", x === b));
  go.textContent = LABELS[mode];
  q.placeholder = PLACEHOLDER[mode];
  syncEngineUI();
  // «المنهجية» / «البنية» / «التقنية» / «التدقيق» / «الرواة» are self-contained pages with no top
  // query box — they open immediately and carry their own controls.
  const info = mode === "method" || mode === "arch" || mode === "tech" || mode === "audit" || mode === "conflicts" || mode === "matn" || mode === "browse" || mode === "books";
  q.style.display = info ? "none" : "";
  go.style.display = info ? "none" : "";
  if(mode === "notebook" || info){
    run();                                  // these open immediately
  } else if(mode === "search"){
    renderSearchIntro();                    // show the filters up front, before any query
    q.focus();
  } else {
    // a query-based tab: clear the previous tab's output and show this tab's prompt,
    // so switching never leaves stale content on screen (no need to search first).
    results.innerHTML = `<div class="state">${esc(PLACEHOLDER[mode] || "اكتب نصًّا في الأعلى واضغط Enter")}</div>`;
    q.focus();
  }
});
go.onclick = () => { navStack = []; run(); };            // an explicit search starts a fresh view
q.addEventListener("keydown", e => { if (e.key === "Enter"){ navStack = []; run(); } });

function esc(s){ const d = document.createElement("div"); d.textContent = (s==null?"":s);
  return d.innerHTML.replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }   // also safe in attributes
// Arabic-Indic (٠-٩) / Eastern-Arabic (۰-۹) digits → ASCII, so a hadith number typed in
// native digits is recognised.
function toAscii(s){
  return (s||"").replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d))
                .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
}
// fetch JSON and surface a server error (detail) instead of treating it as «no results».
async function getJSON(url, opts){
  const r = await fetch(url, opts);
  const d = await r.json().catch(() => ({}));
  if(!r.ok) throw new Error(d.detail || `HTTP ${r.status}`);
  return d;
}

// «★ احفظ» button: register the payload, render a star; a delegated handler POSTs it.
let _saveSeq = 0; const SAVEABLE = {};
function saveChip(payload){
  const k = ++_saveSeq; SAVEABLE[k] = payload;
  return `<button class="save-btn" data-k="${k}" title="احفظ في الدفتر">★</button>`;
}
function gradeClass(g){
  if(!g) return "g-other";
  if(g.includes("صحيح")) return "g-sahih";
  if(g.includes("حسن"))  return "g-hasan";
  if(g.includes("ضعيف")||g.includes("موضوع")||g.includes("منكر")||g.includes("باطل")) return "g-daif";
  return "g-other";
}
// Scholars' rulings (أحكام), ordered by era; هـ after each hijri year, divergence flagged.
function rulingsHtml(rulings){
  if(!rulings || !rulings.length) return "";
  const items = rulings.map(r => {
    const basis = (r.basis && r.basis !== "نصّ") ? ` <span class="r-basis">(${esc(r.basis)})</span>` : "";
    const info = r.note ? ` <span class="r-info" title="${esc(r.note)}">ⓘ</span>` : "";
    const tip = r.note ? ` title="${esc(r.note)}"` : "";
    return `<span class="ruling ${gradeClass(r.verdict)}"${tip}>${esc(r.scholar)} `
      + `<span class="r-era">${esc(r.era)}</span>: ${esc(r.verdict)}${basis}${info}</span>`;
  }).join("");
  const diverge = new Set(rulings.map(r => r.verdict)).size > 1
    ? ` <span class="r-diverge">⚠ اختلف العلماء</span>` : "";
  return `<div class="rulings"><span class="r-lbl">أحكام العلماء:</span>${items}${diverge}</div>`;
}
// Stated hidden defects (العلل) mentioned in the شروح/تخريج — surfaced, not a verdict.
function illalHtml(illal){
  if(!illal || !illal.length) return "";
  const items = illal.map(d => `<span class="ruling g-daif">${esc(d.type)}`
    + `${d.scholar ? " — " + esc(d.scholar) : ""}</span>`).join("");
  return `<div class="rulings"><span class="r-lbl">عللٌ مذكورة:</span>${items}`
    + ` <span class="r-info" title="عللٌ ذُكرت في الشروح/التخريج؛ تُحقَّق، وليست حكمًا من التطبيق">ⓘ</span></div>`;
}
// Highlight the query terms inside a matn (tolerant of tashkeel & alef/ya/ta variants).
let _hlTerms = [];
const _TASH = "[\\u0617-\\u061A\\u064B-\\u0652\\u0670\\u0640]*";
function _hlRe(t){
  const ch = c => "أإآا".includes(c) ? "[أإآا]" : "ةه".includes(c) ? "[ةه]"
    : "ىي".includes(c) ? "[ىي]" : c.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return new RegExp(t.split("").map(ch).join(_TASH), "g");
}
function hlMatn(s){
  let out = esc(s);
  try { for(const t of _hlTerms) if(t.length >= 2) out = out.replace(_hlRe(t), m => `<mark>${m}</mark>`); }
  catch(_){}
  return out;
}
function shareTools(text){
  return `<button class="tool copy-btn" data-text="${esc(text)}" title="نسخ النصّ">⧉ نسخ</button>`
    + `<button class="tool share-btn" data-text="${esc(text)}" title="مشاركة">↗ مشاركة</button>`;
}
// A citation «collection · رقم N · ج V · ص P». The volume matters: many turath books are
// multi-volume and restart the printed page at 1 each volume, so «ص» alone is ambiguous.
function citeOf(x){
  return [x.collection, (x.number!=null?"رقم "+x.number:null),
          (x.volume!=null&&x.volume!==""?"ج "+x.volume:null),
          (x.page!=null?"ص "+x.page:null)].filter(Boolean).join("  ·  ");
}
// the chain (الإسناد) shown INLINE + its حكم loaded on demand — shared by the main card and each
// variant, so every طريق (the representative's included) is displayed the same way.
function chainBlock(item){
  if(!item.isnad) return "";
  return `<div class="chain"><span class="chain-lbl">الإسناد:</span> ${esc(item.isnad)}</div>`
    + `<div class="toggle" data-id="${item.id != null ? item.id : ""}" data-closed="عرض الحكم على الإسناد ▾" data-open="إخفاء الحكم ▴">عرض الحكم على الإسناد ▾</div>`
    + `<div class="isnad"><div class="chain-verdict"></div></div>`;
}
function _varRow(m){
  const cite = citeOf(m);
  const g = m.grade ? `<span class="grade ${gradeClass(m.grade)}">${esc(m.grade)}</span>` : "";
  const text = m.matn ? `<div class="var-matn">${hlMatn(m.matn)}</div>` : "";
  return `<div class="var-row"><div class="rawi-item"><span>${esc(cite)}</span>${g}</div>${text}${chainBlock(m)}</div>`;
}
function hadithCard(h, n){
  const cite = citeOf(h);
  if(h.kind === "taliq"){   // a باب with only a تعليق/أثر (no isnad, no number) — library-only
    const num = n ? `<span class="r-num">${n}</span>` : "";
    return `<div class="card taliq">${num}
      <div class="cite"><span class="taliq-badge">تعليق / أثر</span><span>${esc(cite)}</span></div>
      <div class="matn">${hlMatn(h.matn)}</div>
      <div class="actions">${shareTools(h.matn + "\n— " + cite)}</div></div>`;
  }
  const grade = h.grade ? `<span class="grade ${gradeClass(h.grade)}">${esc(h.grade)}</span>` : "";
  const save = saveChip({kind:"hadith", title:cite, body:h.matn,
    meta:{collection:h.collection, number:h.number, volume:h.volume, page:h.page, grade:h.grade,
          isnad:h.isnad, rulings:h.rulings}});
  const trace = `<span class="go-takhrij" data-q="${esc(h.matn)}">تتبّع تخريجه ⟶</span>`;
  // OTHER narrations only — exclude this representative (members[0]), so it isn't listed twice
  const others = (h.members || []).slice(1);
  const variants = others.length
    ? `<span class="var-toggle">عرض رواياته الأخرى (${others.length}) عبر ${(h.sources||[]).length} مصدرًا ▾</span>`
      + `<div class="variants">${others.map(_varRow).join("")}</div>`
    : "";
  const txt = `${h.matn}\n— ${cite}${h.grade ? " · " + h.grade : ""}`;
  const num = n ? `<span class="r-num">${n}</span>` : "";
  return `<div class="card">${num}<div class="matn">${hlMatn(h.matn)}</div>
    <div class="cite">${grade}<span>${esc(cite)}</span>${save}</div>
    <div class="actions">${trace}${shareTools(txt)}</div>${rulingsHtml(h.rulings)}${chainBlock(h)}${variants}</div>`;
}

// Reveal long result lists in batches so the window stays responsive even with
// thousands of hits — all results are fetched, "تحميل المزيد" shows the rest.
const PAGE = 50;
let listState = null;   // {hits, shown, unit}

function renderList(hits, unit, empty){
  if(!hits.length){ results.innerHTML = `<div class="state">${empty}</div>`; return; }
  listState = { hits, shown: 0, unit };
  results.innerHTML =
    `<div class="note" id="count"></div><div id="list"></div><div id="more-wrap"></div>`;
  revealMore();
}
function revealMore(){
  const { hits, shown, unit } = listState;
  const next = hits.slice(shown, shown + PAGE);
  document.getElementById("list").insertAdjacentHTML("beforeend",
    next.map((h, i) => hadithCard(h, shown + i + 1)).join(""));
  listState.shown += next.length;
  document.getElementById("count").textContent = `${listState.shown} من ${hits.length} ${unit}`;
  const left = hits.length - listState.shown;
  const wrap = document.getElementById("more-wrap");
  wrap.innerHTML = left > 0 ? `<button class="more">تحميل المزيد (${left})</button>` : "";
  if(left > 0) wrap.firstChild.onclick = revealMore;
}

// Plain text of the whole result set (every hit, numbered) — for the «نسخ الكل» button.
function searchText(){
  if(!listState || !(listState.hits || []).length) return "";
  return listState.hits.map((h, i) => {
    const cite = citeOf(h);
    return `${i+1}. ${h.matn}\n— ${cite}${h.grade ? " · " + h.grade : ""}`;
  }).join("\n\n");
}

// ── Search (بحث): mode/field/group/sort controls, facet filters, report grouping ──
const searchState = { mode:"lexical", field:"all", group:"report", sort:"relevance",
                      collection:null, grade:null };
let searchData = null;   // last /search response (cached for re-sort / facet toggles)

function searchURL(query){
  const p = new URLSearchParams({q: query, mode: searchState.mode,
    field: searchState.field, group: searchState.group});
  if(searchState.collection) p.set("collection", searchState.collection);
  if(searchState.grade) p.set("grade", searchState.grade);
  return "/search?" + p.toString();
}
async function reSearch(){   // a control/filter changed — refetch with current state
  const query = q.value.trim();
  if(!query){ renderSearchIntro(); return; }   // no query yet → just (re)show the controls
  results.innerHTML = `<div class="state">… جارٍ البحث</div>`;
  try { renderSearch(await getJSON(searchURL(query))); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر الاتصال")}</div>`; }
}
function gradeRank(g){ g = g || ""; if(g.includes("صحيح")) return 3; if(g.includes("حسن")) return 2;
  if(g.includes("ضعيف") || g.includes("موضوع") || g.includes("منكر")) return 0; return 1; }
function sortItems(items){
  if(searchState.sort === "grade")
    return items.slice().sort((a, b) => gradeRank(b.grade) - gradeRank(a.grade));
  if(searchState.sort === "collection")
    return items.slice().sort((a, b) => (a.collection || "").localeCompare(b.collection || "", "ar"));
  return items;   // relevance = the backend's order
}
function searchControls(){
  const opt = (k, v, label) => `<option value="${v}"${searchState[k] === v ? " selected" : ""}>${label}</option>`;
  return `<div class="s-ctrls">`
    + `<select class="s-ctrl" data-k="mode" title="نوع المطابقة">${opt("mode","lexical","لفظيّ")}${opt("mode","semantic","دلاليّ (بالمعنى)")}${opt("mode","hybrid","هجين")}</select>`
    + `<select class="s-ctrl" data-k="field" title="موضع البحث">${opt("field","all","المتن والإسناد")}${opt("field","matn","المتن فقط")}${opt("field","isnad","الإسناد فقط")}</select>`
    + `<select class="s-ctrl" data-k="group" title="تجميع الروايات">${opt("group","report","دمج روايات الحديث")}${opt("group","none","عرض كل رواية")}</select>`
    + `<select class="s-ctrl" data-k="sort" title="الترتيب">${opt("sort","relevance","الأكثر صلة")}${opt("sort","grade","الأصحّ أولًا")}${opt("sort","collection","حسب الكتاب")}</select>`
    + `</div>`;
}
function activeFilters(){
  const out = [];
  if(searchState.collection){
    const c = ((searchData.facets || {}).collections || []).find(x => x.id == searchState.collection);
    out.push(`الكتاب: ${esc(c ? c.name : searchState.collection)}`);
  }
  if(searchState.grade) out.push(`الدرجة: ${esc(searchState.grade)}`);
  return out.length ? ` · مرشّحات (${out.join("، ")}) <span class="clear-filters">✕ إزالة</span>` : "";
}
function facetChips(f){
  if(!f) return "";
  const cols = (f.collections || []).slice(0, 12).map(c =>
    `<span class="facet${searchState.collection == c.id ? " on" : ""}" data-col="${c.id}">`
    + `${esc(c.name)} <b>${c.count}</b></span>`).join("");
  const grades = (f.grades || []).map(g =>
    `<span class="facet${searchState.grade == g.grade ? " on" : ""}" data-grade="${esc(g.grade)}">`
    + `${esc(g.grade)} <b>${g.count}</b></span>`).join("");
  if(!cols && !grades) return "";
  return `<div class="facets">` + (cols ? `<span class="f-lbl">الكتب:</span>${cols}` : "")
    + (grades ? `<span class="f-lbl">الدرجة:</span>${grades}` : "") + `</div>`;
}
// Pre-search panel: the controls shown up front so the search can be configured before
// typing. (Facet filters need results to count, so they appear once there are results.)
function renderSearchIntro(){
  results.innerHTML = searchControls()
    + `<div class="state">اضبط خيارات البحث (المطابقة · الموضع · التجميع · الترتيب) ثم اكتب الحديث واضغط «ابحث»</div>`;
}
function renderSearch(d){
  searchData = d;
  const grouped = !!d.groups;
  const items = sortItems((grouped ? d.groups : d.results) || []);
  const srcN = ((d.facets || {}).collections || []).length;
  const summary = grouped ? `${d.group_count} حديثًا · ${d.count} رواية` : `${d.count || 0} نتيجة`;
  const head = searchControls()
    + `<div class="note">${summary} · في ${srcN} مصدرًا${activeFilters()} <button class="tool search-copy">⧉ نسخ الكل</button></div>`
    + facetChips(d.facets);
  if(!items.length){ results.innerHTML = head + `<div class="state">لا توجد نتائج</div>`; return; }
  listState = { hits: items, shown: 0, unit: grouped ? "حديثًا" : "نتيجة" };
  results.innerHTML = head
    + `<div class="note" id="count"></div><div id="list"></div><div id="more-wrap"></div>`;
  revealMore();
}

async function run(){
  const query = q.value.trim();
  if(mode === "method"){ renderMethodology(); return; }   // a static reading page
  if(mode === "arch"){ renderArchitecture(); return; }     // architecture / how it works
  if(mode === "tech"){ renderTech(); return; }              // full technical reference
  if(mode === "audit"){ renderAudit(); return; }            // isnad audit — cases to review
  if(mode === "matn"){ renderMatnAudit(); return; }         // matn audit — extraction errors to review
  if(mode === "conflicts"){ renderConflicts(); return; }    // rijal grave↔trustworthy collisions
  if(mode === "browse"){ renderBrowse(); return; }          // browse every narrator (no search)
  if(mode === "books"){ renderBooks(); return; }            // navigate the corpus: كتب → أبواب → أحاديث
  if(!query && mode !== "notebook") return;   // notebook lists everything when empty
  results.innerHTML = `<div class="state">… جارٍ التنفيذ</div>`;
  try{
    if(mode === "search"){
      _hlTerms = query.split(/\s+/).filter(t => t.length >= 2);
      searchState.collection = null; searchState.grade = null;   // fresh query → clear filters
      renderSearch(await getJSON(searchURL(query)));
    } else if(mode === "ask"){
      _hlTerms = query.split(/\s+/).filter(t => t.length >= 2);
      if(engineSel.value === "local" && compareBox.checked){ await runCompare(query); return; }
      const eng = engineSel.value;
      const mdl = modelInput.value.trim();
      let url = `/ask?q=${encodeURIComponent(query)}&engine=${eng}`;
      if(mdl && eng !== "off") url += `&model=${encodeURIComponent(mdl)}`;
      // the synthesized answer AND the full list of hadith that contain the question
      const [d, s] = await Promise.all([
        getJSON(url), getJSON(`/search?q=${encodeURIComponent(query)}`)]);
      const hits = s.results || [];
      // the answer block (engine + answer + أحكام + علل + شرح) — shown below the list
      let ans = "";
      if(d.warning) ans += `<div class="warn">${esc(d.warning)}</div>`;
      if(d.engine){
        const tag = (ENGINE_AR[d.engine] || esc(d.engine)) + (d.model ? ` · ${esc(d.model)}` : "");
        ans += `<div class="engine-tag">${tag}</div>`;
      }
      ans += `<div class="card"><div class="answer">${esc(d.answer)}</div>`
        + saveChip({kind:"answer", title:query, body:d.answer,
            meta:{engine:d.engine, model:d.model, rulings:d.rulings}}) + `</div>`;
      if(d.rulings && d.rulings.length) ans += `<div class="card">${rulingsHtml(d.rulings)}</div>`;
      if(d.illal && d.illal.length) ans += `<div class="card">${illalHtml(d.illal)}</div>`;
      (d.sharh || []).forEach(sh => {
        const ref = sh.sharh + (sh.hadith_number!=null ? ` (عند الحديث ${sh.hadith_number})` : "");
        const body = sh.text || sh.excerpt || "";
        ans += `<div class="card sharh"><b>${esc(ref)}</b><div class="ex">${esc(body)}</div></div>`;
      });
      // count + where + a navigable list of the matching hadith (choose one to explore)
      const srcN = new Set(hits.map(h => h.collection).filter(Boolean)).size;
      if(!hits.length){
        results.innerHTML = `<div class="note">لم نعثر على أحاديثَ مطابقة لسؤالك؛ وهذه خلاصة المصادر:</div>` + ans;
      } else {
        listState = { hits, shown: 0, unit: "حديثًا" };
        results.innerHTML =
          `<div class="note">سؤالك ورد في أحاديثَ عبر <b>${srcN}</b> مصدرًا — اختر حديثًا للاطّلاع على موضعه وإسناده وتخريجه:</div>`
          + `<div class="note" id="count"></div><div id="list"></div><div id="more-wrap"></div>`
          + `<div class="comp-head">خلاصة الجواب من المصادر</div>` + ans;
        revealMore();
      }
    } else if(mode === "takhrij"){
      renderTakhrij(await getJSON(`/takhrij?q=${encodeURIComponent(query)}`));
    } else if(mode === "narrator"){
      renderNarrator(await getJSON(`/narrator?name=${encodeURIComponent(query)}`));
    } else if(mode === "network"){
      netHistory = [];                 // fresh trail; navigateNet shows its own errors
      await navigateNet(query);
    } else if(mode === "isnad"){
      // a number (any digits) → a hadith id to look up; anything else → a pasted chain.
      const num = toAscii(query);
      const param = /^\d+$/.test(num) ? `hadith_id=${num}` : `isnad=${encodeURIComponent(query)}`;
      renderIsnad(await getJSON(`/verify-isnad?${param}`));
    } else {
      const d = await getJSON(`/notebook?q=${encodeURIComponent(query)}`);
      renderNotebook(d.items || []);
    }
  } catch(e){
    // show the server's message (validation / not found) when there is one
    const net = !e || !e.message || /failed to fetch|networkerror|load failed/i.test(e.message);
    results.innerHTML = `<div class="state">${esc(net
      ? "تعذّر الاتصال بالخادم. تأكّد أنّ التطبيق يعمل." : e.message)}</div>`;
  }
}

// Run the same question across the local Qwen sizes, side by side, each with the time
// it took — so you can compare quality vs speed and decide which size is best for you.
async function runCompare(query){
  results.innerHTML = `<div class="note">مقارنة النماذج المحلية على نفس السؤال</div>`
    + `<div class="cmp-cols" id="cmp"></div>`;
  const cmp = document.getElementById("cmp");
  COMPARE_MODELS.forEach((m, i) => cmp.insertAdjacentHTML("beforeend",
    `<div class="cmp-col"><div class="cmp-head" id="h${i}">${esc(m)} <span class="cmp-time">… جارٍ</span></div>`
    + `<div class="card"><div class="answer" id="a${i}">…</div></div></div>`));
  for(let i = 0; i < COMPARE_MODELS.length; i++){
    const t0 = performance.now();
    try{
      const url = `/ask?q=${encodeURIComponent(query)}&engine=local&model=${encodeURIComponent(COMPARE_MODELS[i])}`;
      const d = await (await fetch(url)).json();
      const secs = ((performance.now() - t0) / 1000).toFixed(1);
      document.getElementById("h"+i).innerHTML = `${esc(COMPARE_MODELS[i])} <span class="cmp-time">· ${secs}ث</span>`;
      const warn = d.warning ? `<div class="warn">${esc(d.warning)}</div>` : "";
      document.getElementById("a"+i).innerHTML = warn + esc(d.answer || "");
    }catch(e){
      document.getElementById("a"+i).textContent = "تعذّر الاتصال";
    }
  }
}

// Takhrij: show every narration of the same report, grouped into distinct wordings
// (صيغ) and labelled by closeness to the source (بلفظه / بنحوه / بمعناه).
function vlabelClass(l){ return l === "بلفظه" ? "v-lafz" : l === "بنحوه" ? "v-nahw" : "v-maana"; }
function narrationCard(n){
  const cite = citeOf(n);
  const grade = n.grade ? `<span class="grade ${gradeClass(n.grade)}">${esc(n.grade)}</span>` : "";
  const sim = `<span class="simbadge">${Math.round((n.overlap||0)*100)}% تطابق</span>`;
  // The chain is always shown here — «who carried it» is the point of takhrij.
  const chain = n.isnad
    ? `<div class="chain"><span class="chain-lbl">الإسناد:</span> ${esc(n.isnad)}</div>` : "";
  const save = saveChip({kind:"hadith", title:cite, body:n.matn,
    meta:{collection:n.collection, number:n.number, volume:n.volume, page:n.page, grade:n.grade,
          isnad:n.isnad, companion:n.companion, rulings:n.rulings}});
  return `<div class="card"><div class="matn">${esc(n.matn)}</div>
    <div class="cite">${grade}<span>${esc(cite)}</span>${sim}${save}</div>${chain}${rulingsHtml(n.rulings)}</div>`;
}
function renderTakhrij(d){
  const groups = d.groups || [];
  if(!groups.length){ results.innerHTML = `<div class="state">لا توجد روايات</div>`; return; }
  const sources = Object.keys(d.by_collection || {}).length;
  let html = `<div class="note">${d.count} روايةً · عن ${d.companions} صحابيًّا · `
    + `في ${d.variants} صيغة · عبر ${sources} مصدرًا</div>`;
  if((d.illal || []).length){
    html += `<div class="illal-box"><div class="illal-lbl">إشاراتٌ بنيويّةٌ للعِلّة والشذوذ `
      + `<span class="illal-sub">— قرائنُ من الطرق للنظر، لا حُكمٌ</span></div>`
      + d.illal.map(h => `<div class="illal-hint il-${h.severity === "warn" ? "warn" : "info"}">`
          + `<span class="il-type">${esc(h.type)}</span>${esc(h.note)}</div>`).join("")
      + `</div>`;
  }
  groups.forEach(g => {
    const who = g.companion ? `من حديث: ${esc(g.companion)}` : "صحابيّ غير محدَّد";
    html += `<div class="comp-head">${who} <span class="simbadge">(${g.count} رواية)</span></div>`;
    if(g.takhrij) html += `<div class="takhrij-line">${esc(g.takhrij)}</div>`;
    (g.variants || []).forEach(v => {
      html += `<div class="group-head"><span class="vlabel ${vlabelClass(v.label)}">${esc(v.label)}</span>`
        + `<span class="simbadge">${v.count} رواية · ${Math.round((v.closeness||0)*100)}% تطابق مع الأصل</span></div>`;
      html += v.narrations.map(narrationCard).join("");
    });
  });
  results.innerHTML = html;
}

// Narrator (راوٍ): the narrator's place in the network — his شيوخ and تلاميذ, and grade.
function rijalClass(v){
  if(!v) return "g-other";
  if(/ثقة|صحاب|حافظ|إمام|ثبت/.test(v)) return "g-sahih";
  if(/صدوق|لا بأس|حسن/.test(v)) return "g-hasan";
  if(/ضعيف|متروك|منكر|كذاب|واهٍ/.test(v)) return "g-daif";
  return "g-other";
}
// The «double opinion» (الرأي الثاني): show the critics' verdicts when they differ,
// e.g. «ثقة عند ابن حجر · صدوق عند الذهبي».
const SRC_AUTHOR = {"تقريب التهذيب":"ابن حجر", "الكاشف":"الذهبي"};
// The verdict ALWAYS shown with its author and source book — important for the student:
// «ثقة — قاله ابن حجر في تقريب التهذيب». Lists every critic's verdict; flags «اختلفوا».
function rijalAttribution(rij){
  if(!rij) return "";
  const ops = (rij.opinions && rij.opinions.length)
    ? rij.opinions
    : ((rij.verdict || rij.grade) ? [{source: rij.source, grade: rij.verdict || rij.grade}] : []);
  if(!ops.length) return "";
  const parts = ops.map(o => {
    const who = SRC_AUTHOR[o.source] || "";
    const attr = [who && `قاله ${who}`, o.source && `في ${o.source}`].filter(Boolean).join("، ");
    return `<span class="ruling ${rijalClass(o.grade)}">${esc(o.grade)}`
      + (attr ? ` <span class="r-era">— ${esc(attr)}</span>` : "") + `</span>`;
  }).join("");
  const diverge = new Set(ops.map(o => o.grade)).size > 1 ? `<span class="r-diverge">⚠ اختلفوا</span>` : "";
  return `<div class="rulings"><span class="r-lbl">الحكم ومصدره:</span>${parts}${diverge}</div>`;
}
// أقوال الأئمة — the NAMED multi-critic verdicts the great رجال books report (beyond ابن حجر/الذهبي's
// distilled grade): «ثقة — ابن معين · تهذيب الكمال». Each carries the critic AND the BOOK that reports
// his verdict. From the prose sources (الجرح/تهذيب/الثقات/لسان), attached to the man by name in build_rijal.
function rijalAppraisals(rij){
  if(!rij || !rij.appraisals || !rij.appraisals.length) return "";
  const parts = rij.appraisals.map(a =>
    `<span class="ruling ${rijalClass(a.verdict)}">${esc(a.verdict)}`
    + ` <span class="r-era">— ${esc(a.critic)}${a.book ? ' <span class="r-book">· '+esc(a.book)+'</span>' : ''}</span></span>`).join("");
  return `<div class="rulings"><span class="r-lbl">أقوال الأئمة:</span>${parts}</div>`;
}
// Compact attribution for a chain row. When the critics agree it shows the author(s)
// («— ابن حجر»); when they DIFFER it reports every verdict («— ثقة عند ابن حجر · ضعيف عند الذهبي ⚠»).
function srcTag(rij){
  if(!rij) return "";
  const ops = (rij.opinions && rij.opinions.length)
    ? rij.opinions : (rij.source ? [{source: rij.source, grade: rij.grade}] : []);
  if(!ops.length) return "";
  if(new Set(ops.map(o => o.grade)).size > 1){
    const parts = ops.map(o => `${esc(o.grade)} عند ${esc(SRC_AUTHOR[o.source] || o.source)}`).join(" · ");
    return ` <span class="r-era">— ${parts} ⚠</span>`;
  }
  const who = []; const seen = new Set();
  ops.forEach(o => { const w = SRC_AUTHOR[o.source] || o.source; if(w && !seen.has(w)){ seen.add(w); who.push(w); } });
  return who.length ? ` <span class="r-era">— ${esc(who.join(" · "))}</span>` : "";
}
function rawiList(title, arr){
  if(!arr || !arr.length) return `<div class="rawi-col"><h3>${title}</h3><div class="note">—</div></div>`;
  const rows = arr.map(x =>
    `<div class="rawi-item"><span>${esc(x.name)}</span><span class="simbadge">${x.count} حديثًا</span></div>`
  ).join("");
  return `<div class="rawi-col"><h3>${title} (${arr.length})</h3>${rows}</div>`;
}
// تمييز المهمل in the UI: a مشترك name (عبد الله / محمد / عمر) matches many men — we never pick
// one (which would show a generation-mixed network: عمر الصحابي with a شيخ who died 180 years
// later). The user picks the intended narrator from the candidate list; each row re-runs the search.
// A global one-step «◀ رجوع» for the راوٍ tab: a thunk that re-renders the view you came FROM (the
// browse list, or the «مشترك» candidates), shown atop the narrator/candidate card. Cleared on a fresh
// search or a tab switch, so it only appears when there is genuinely a place to step back to.
let navStack = [];       // a STACK of «◀ رجوع» thunks — each restores the view you came from, so
                         // chain → راوٍ → شبكة → … unwinds one step at a time
let lastCand = null;     // the last «مشترك» payload, so a chosen candidate can step back to the list
function backBar(){ return navStack.length ? `<button class="gbl-back">◀ رجوع</button>` : ""; }

function renderCandidates(d){
  lastCand = d;
  const more = d.truncated ? ` <span class="r-era">(عُرض أوّل ${d.candidates.length} — ضيّق البحث بإضافة اسم الأب)</span>` : "";
  const head = `<div class="card"><div class="rawi-name">${esc(d.name)} <span class="grade g-other">مشترك</span></div>`
    + `<div class="rawi-summary">هذا الاسم مشتركٌ بين ${d.count} راويًا في القاعدة${more} — اخترِ المقصود (لا نختار عنك):</div></div>`;
  const rows = d.candidates.map(c => {
    const dy = c.death_year ? ` <span class="r-era">· ت ${c.death_year}هـ</span>` : "";
    const ku = c.kunya ? ` <span class="r-era">· ${esc(c.kunya)}</span>` : "";
    const g = c.grade ? `<span class="grade ${rijalClass(c.grade)}">${esc(c.grade)}</span>` : "";
    return `<div class="rawi-item rawi-pick" data-pick="${esc(c.name)}" role="button" tabindex="0">`
      + `<span>${esc(c.name)}${ku}${dy}</span>${g}</div>`;
  }).join("");
  return backBar() + head + `<div class="rawi-col">${rows}</div>`;
}
function renderNarrator(d){
  if(d.kind === "ambiguous"){ results.innerHTML = renderCandidates(d); return; }
  const v = d.grade && (d.grade.verdict || d.grade.grade);
  const badge = isProphet(d.name) ? `<span class="grade g-sahih">مصدر الحديث ﷺ</span>`
    : v ? `<span class="grade ${rijalClass(v)}">${esc(v)}</span>` : "";
  const save = saveChip({kind:"narrator", title:d.name, body:d.summary || "",
    meta:{grade:d.grade, sources:d.sources}});
  const netBtn = isProphet(d.name) ? "" : `<button class="net-jump" data-nav="${esc(d.name)}">🕸 الشبكة</button>`;
  let html = backBar() + `<div class="card"><div class="rawi-name">${esc(d.name)} ${badge} ${save} ${netBtn}</div>`;
  if(d.summary) html += `<div class="rawi-summary">${esc(d.summary)}</div>`;
  html += rijalAttribution(d.grade);
  html += rijalAppraisals(d.grade);
  html += `</div>`;
  html += `<div class="rawi-cols">`
    + rawiList("شيوخه — يروي عنهم", d.teachers)
    + rawiList("تلاميذه — يروون عنه", d.students)
    + `</div>`;
  if(d.sources && d.sources.length){
    html += `<div class="sources"><span class="r-lbl">المصادر:</span> `
      + d.sources.map(s => `${esc(s.what)} — ${esc(s.from)}`).join("  ·  ") + `</div>`;
  }
  results.innerHTML = html;
}

// Browse (الرواة): a navigable index of EVERY graded narrator — pick a letter or a درجة, or type
// to filter by name, then click a man to open his راوٍ card. Lets the user explore the رجال
// without searching. Server-paged (/narrators) since the base is ~20k men; «المزيد» appends.
const browseState = {letter:null, grade:null, q:"", offset:0, limit:60, total:0};
const AR_LETTERS = "ابتثجحخدذرزسشصضطظعغفقكلمنهوي".split("");
let _brTimer = null;

async function renderBrowse(){
  results.innerHTML = `<div class="state">… جارٍ تحميل فهرس الرواة</div>`;
  browseState.offset = 0;
  await browseFetch("shell");
}
function browseURL(){
  const p = new URLSearchParams();
  if(browseState.letter) p.set("letter", browseState.letter);
  if(browseState.grade)  p.set("grade", browseState.grade);
  if(browseState.q)      p.set("q", browseState.q);
  p.set("offset", browseState.offset);
  p.set("limit", browseState.limit);
  return `/narrators?${p.toString()}`;
}
// kind: "shell" (rebuild controls + first page) · "list" (replace the list, keep controls/focus —
// for typing) · "more" (append the next page).
async function browseFetch(kind){
  let d;
  try { d = await getJSON(browseURL()); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر التحميل")}</div>`; return; }
  browseState.total = d.total;
  if(kind === "shell") drawBrowseShell(d);
  if(kind !== "more"){ const l = document.getElementById("brlist"); if(l) l.innerHTML = ""; }
  appendBrowseRows(d);
}
function drawBrowseShell(d){
  const lc = {}; (d.letters || []).forEach(x => lc[x.letter] = x.count);
  const lbtn = (ch, label, n, active) =>
    `<button class="tool br-letter${active ? " done" : ""}" data-letter="${ch}"${n === 0 ? " disabled" : ""}>`
    + `${esc(label)}${n ? ` <span class="simbadge">${n}</span>` : ""}</button>`;
  const letters = lbtn("", "الكل", 1, !browseState.letter)
    + AR_LETTERS.map(ch => lbtn(ch, ch, lc[ch] || 0, browseState.letter === ch)).join("");
  const gbtn = (g, n, active) =>
    `<button class="tool br-grade${active ? " done" : ""}" data-grade="${esc(g)}">`
    + `<span class="grade ${rijalClass(g)}">${esc(g)}</span> <span class="simbadge">${n}</span></button>`;
  const grades = `<button class="tool br-grade${!browseState.grade ? " done" : ""}" data-grade="">الكل</button>`
    + (d.grades || []).map(x => gbtn(x.grade, x.count, browseState.grade === x.grade)).join("");
  results.innerHTML =
      `<div class="note">فهرسُ الرواة — <b>${d.grand_total}</b> راويًا مُدرَجًا في القاعدة. اختَر حرفًا أو درجةً، أو اكتب اسمًا للتصفية، ثم انقُر اسمًا لعرض بطاقته.</div>`
    + `<div class="actions br-letters">${letters}</div>`
    + `<div class="actions br-grades">${grades}</div>`
    + `<div class="actions"><input id="brq" class="br-search" placeholder="صفِّ بالاسم…" value="${esc(browseState.q)}"></div>`
    + `<div class="note" id="brcount"></div>`
    + `<div id="brlist" class="rawi-col"></div>`
    + `<div id="brmore"></div>`;
}
function appendBrowseRows(d){
  const list = document.getElementById("brlist");
  if(!list) return;
  if(browseState.offset === 0 && !d.items.length){
    list.innerHTML = `<div class="note">لا رواةَ مطابقين لهذه التصفية.</div>`;
    const m = document.getElementById("brmore"); if(m) m.innerHTML = "";
    const c = document.getElementById("brcount"); if(c) c.textContent = "";
    return;
  }
  list.insertAdjacentHTML("beforeend", d.items.map(r => {
    const dy = r.death_year ? ` <span class="r-era">· ت ${r.death_year}هـ</span>` : "";
    const ku = r.kunya ? ` <span class="r-era">· ${esc(r.kunya)}</span>` : "";
    const g  = r.grade ? `<span class="grade ${rijalClass(r.grade)}">${esc(r.grade)}</span>` : "";
    return `<div class="rawi-item br-pick" data-pick="${esc(r.name)}" role="button" tabindex="0">`
      + `<span>${esc(r.name)}${ku}${dy}</span>${g}</div>`;
  }).join(""));
  const shown = browseState.offset + d.items.length;
  const c = document.getElementById("brcount");
  if(c) c.textContent = `عُرض ${shown} من ${d.total}`;
  const m = document.getElementById("brmore");
  if(m) m.innerHTML = shown < d.total ? `<button class="tool br-more">المزيد (${d.total - shown})</button>` : "";
}
// Browse interactions: letter / درجة chips rebuild the shell; «المزيد» appends; a name opens راوٍ.
results.addEventListener("click", e => {
  const lt = e.target.closest(".br-letter");
  if(lt){ if(lt.disabled) return; browseState.letter = lt.getAttribute("data-letter") || null; browseState.offset = 0; browseFetch("shell"); return; }
  const gr = e.target.closest(".br-grade");
  if(gr){ browseState.grade = gr.getAttribute("data-grade") || null; browseState.offset = 0; browseFetch("shell"); return; }
  const mo = e.target.closest(".br-more");
  if(mo){ browseState.offset += browseState.limit; browseFetch("more"); return; }
  const pk = e.target.closest(".br-pick");
  if(pk){
    q.value = pk.getAttribute("data-pick");
    document.querySelector('.modes button[data-mode="narrator"]').click();  // open the راوٍ card (clears navStack)
    navStack.push(() => document.querySelector('.modes button[data-mode="browse"]').click());  // «رجوع» → the list
    run();
  }
});
// Type-to-filter (debounced) — replace the list only, so the input keeps focus.
results.addEventListener("input", e => {
  const inp = e.target.closest(".br-search");
  if(!inp) return;
  browseState.q = inp.value.trim();
  browseState.offset = 0;
  clearTimeout(_brTimer);
  _brTimer = setTimeout(() => browseFetch("list"), 250);
});

// Library (الكتب): navigate the corpus by its OWN structure — collections → their كتب/أبواب → the
// hadiths under each — instead of searching. Three views with a breadcrumb; the leaf reuses
// hadithCard. Server-backed by /books (reads the same index.db). The chapter filter is client-side
// (a book's chapters are already in hand); hadiths page via «المزيد».
const booksState = {realm:"hadith", view:"collections", book_id:null, collection:"", chapter:null, q:"",
                    offset:0, limit:50, chapters:[]};

async function renderBooks(){
  Object.assign(booksState, {realm:"hadith", view:"collections", book_id:null, chapter:null, q:""});
  results.innerHTML = `<div class="state">… جارٍ تحميل الكتب</div>`;
  let d, s = {commentaries:[]};
  try { d = await getJSON("/books"); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر التحميل")}</div>`; return; }
  try { s = await getJSON("/sharh-books"); } catch(e){ /* sharh index optional */ }
  const cols = d.collections || [];
  const items = cols.map(c =>
    `<div class="rawi-item bk-col" data-id="${c.book_id}" data-name="${esc(c.collection)}" role="button" tabindex="0">`
    + `<span>${esc(c.collection)}</span><span class="simbadge">${c.count}</span></div>`).join("");
  const shr = (s.commentaries || []).map(c =>
    `<div class="rawi-item bk-scol" data-id="${c.book_id}" data-name="${esc(c.sharh)}" role="button" tabindex="0">`
    + `<span>${esc(c.sharh)}${c.base_name ? ` <span class="sharh-on">على ${esc(c.base_name)}</span>` : ""}</span>`
    + `<span class="simbadge">${c.count}</span></div>`).join("");
  results.innerHTML = booksCrumb()
    + `<div class="note">تصفّح الكتب الكبرى وأبوابها — اختَر كتابًا، ثم بابًا، ثم تظهر أحاديثه.</div>`
    + `<div class="rawi-col">${items || '<div class="note">لا كتب بعد — ابنِ الفهرس (index.db) أولًا.</div>'}</div>`
    + (shr ? `<div class="note" style="margin-top:18px"><b>شروح الحديث</b> — اختَر شرحًا لتصفّح أبوابه ونصوصه.</div>`
             + `<div class="rawi-col">${shr}</div>` : "");
}

function booksCrumb(){
  const p = [`<span class="bk-crumb" data-to="collections" role="button" tabindex="0">الكتب</span>`];
  if(booksState.book_id != null)
    p.push(`<span class="bk-crumb" data-to="chapters" role="button" tabindex="0">${esc(booksState.collection)}</span>`);
  if(booksState.chapter != null) p.push(`<span>${esc(booksState.chapter)}</span>`);
  if(booksState.view === "search") p.push(`<span>بحث في الكتاب</span>`);
  // An explicit one-level «back» button on every view below the root (beside the clickable breadcrumb),
  // so navigation is always reversible from anywhere: أحاديث/بحث → أبواب → الكتب.
  const back = (booksState.chapter != null || booksState.view === "search")
      ? `<button class="bk-back" data-to="chapters">◀ رجوع</button>`
      : booksState.book_id != null
      ? `<button class="bk-back" data-to="collections">◀ رجوع</button>`
      : "";
  return `<div class="note bk-bread" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">`
    + `${back}<span>${p.join(" › ")}</span></div>`;
}

function _bkNorm(s){ return (s || "").replace(/[ً-ْٰ]/g, ""); }   // strip tashkeel for the filter
function _bkChapterItems(){
  const ql = _bkNorm(booksState.q.trim());
  const shown = ql ? booksState.chapters.filter(c => _bkNorm(c.chapter).includes(ql)) : booksState.chapters;
  return shown.map(c =>
    `<div class="rawi-item bk-chapter" data-ch="${esc(c.chapter)}" role="button" tabindex="0">`
    + `<span>${esc(c.chapter)}</span><span class="simbadge">${c.count}</span></div>`).join("")
    || '<div class="note">لا أبواب مطابقة لهذه التصفية.</div>';
}

async function openBookChapters(book_id, name, realm){
  Object.assign(booksState, {realm: realm || "hadith", book_id, collection:name, chapter:null, q:""});
  results.innerHTML = `<div class="state">… جارٍ تحميل الأبواب</div>`;
  const url = booksState.realm === "sharh" ? `/sharh-books/${book_id}/chapters` : `/books/${book_id}/chapters`;
  let d;
  try { d = await getJSON(url); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر التحميل")}</div>`; return; }
  booksState.collection = d.collection || name;
  booksState.chapters = d.chapters || [];
  drawBooksChapters();
}

function drawBooksChapters(){
  booksState.view = "chapters"; booksState.chapter = null;
  const sharh = booksState.realm === "sharh";
  results.innerHTML = booksCrumb()
    + `<div class="note"><b>${booksState.chapters.length}</b> بابًا في «${esc(booksState.collection)}». انقُر بابًا لعرض ${sharh ? "نصوصه" : "أحاديثه"}.</div>`
    + `<div class="actions" style="flex-wrap:wrap;gap:8px">`
    +   `<input id="bkfind" class="br-search" placeholder="🔎 ابحث بالكلمات في كامل الكتاب…" value="${esc(booksState.find || "")}">`
    +   `<input id="bkq" class="br-search" placeholder="صفِّ بأسماء الأبواب…" value="${esc(booksState.q)}"></div>`
    + `<div class="rawi-col" id="bkchlist">${_bkChapterItems()}</div>`;
}

// In-book word search: search the whole book's CONTENT (matns / شرح passages), not just باب titles.
async function openBookSearch(query){
  booksState.find = query; booksState.view = "search";
  const sharh = booksState.realm === "sharh";
  results.innerHTML = `<div class="state">… جارٍ البحث في «${esc(booksState.collection)}»</div>`;
  const url = (sharh ? `/sharh-books/${booksState.book_id}/search` : `/books/${booksState.book_id}/search`)
    + `?q=${encodeURIComponent(query)}`;
  let d;
  try { d = await getJSON(url); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر البحث")}</div>`; return; }
  const rows = sharh ? (d.passages || []) : (d.hadiths || []);
  const cards = rows.map(r => {
    const chip = r.chapter ? `<div class="bk-inchapter" data-ch="${esc(r.chapter)}">📂 ${esc(r.chapter)}</div>` : "";
    return chip + (sharh ? sharhPassageCard(r) : hadithCard(r));
  }).join("");
  results.innerHTML = booksCrumb()
    + `<div class="note">نتائج البحث عن «${esc(query)}» في «${esc(booksState.collection)}» — <b>${rows.length}</b>`
    + (rows.length >= 60 ? "+ (أهمّ النتائج)" : "") + `. <span class="bk-toch">⟵ العودة إلى الأبواب</span></div>`
    + (cards || `<div class="state">لا نتائج لـ «${esc(query)}» في هذا الكتاب.</div>`);
}

function sharhPassageCard(p){
  const on = [p.base_name, (p.hadith_number != null ? "رقم " + p.hadith_number : null)].filter(Boolean).join(" · ");
  const cite = [p.sharh, (p.page != null ? "ص " + p.page : null)].filter(Boolean).join("  ·  ");
  const txt = `${p.text}\n— ${p.sharh}${on ? " — على " + on : ""}`;
  return `<div class="card sharh">
    <div class="cite"><span class="sharh-badge">شرح</span><span>${esc(cite)}</span>${on ? `<span class="sharh-on">على ${esc(on)}</span>` : ""}</div>
    <div class="sharh-text">${esc(p.text)}</div>
    <div class="actions">${shareTools(txt)}</div></div>`;
}

// Step to the previous/next باب in book order (the «السابق»/«التالي» scroll buttons), so the user
// flips through the أبواب without returning to the list. `booksState.chapters` is already in order.
function _chapterNav(){
  if(booksState.chapter == null) return "";
  const i = booksState.chapters.findIndex(c => c.chapter === booksState.chapter);
  if(i < 0) return "";
  const n = booksState.chapters.length;
  return `<div class="ch-nav">`
    + `<button class="tool ch-step" data-d="-1" ${i <= 0 ? "disabled" : ""}>◀ السابق</button>`
    + `<span class="ch-pos">${i + 1} / ${n}</span>`
    + `<button class="tool ch-step" data-d="1" ${i >= n - 1 ? "disabled" : ""}>التالي ▶</button>`
    + `</div>`;
}
function _stepChapter(d){
  const i = booksState.chapters.findIndex(c => c.chapter === booksState.chapter);
  const j = i + d;
  if(i < 0 || j < 0 || j >= booksState.chapters.length) return;
  openChapterHadiths(booksState.chapters[j].chapter);
  results.scrollIntoView ? results.scrollIntoView({block:"start"}) : window.scrollTo(0, 0);
}

async function openChapterHadiths(chapter, kind){
  booksState.chapter = chapter; booksState.view = "hadiths";
  const sharh = booksState.realm === "sharh";
  if(kind !== "more"){ booksState.offset = 0; results.innerHTML = `<div class="state">… جارٍ التحميل</div>`; }
  const p = new URLSearchParams({offset:booksState.offset, limit:booksState.limit});
  if(chapter != null) p.set("chapter", chapter);
  const url = sharh ? `/sharh-books/${booksState.book_id}/passages?${p.toString()}`
                    : `/books/${booksState.book_id}/hadiths?${p.toString()}`;
  let d;
  try { d = await getJSON(url); }
  catch(e){ results.innerHTML = `<div class="state">${esc(e.message || "تعذّر التحميل")}</div>`; return; }
  if(kind !== "more"){
    const nav = _chapterNav();
    results.innerHTML = booksCrumb()
      + `<div class="note">«${esc(booksState.collection)}» — ${esc(chapter || (sharh ? "كل النصوص" : "كل الأحاديث"))}</div>`
      + nav
      + `<div id="bklist"></div><div id="bkmore"></div>`
      + nav;
  }
  const rows = sharh ? (d.passages || []) : (d.hadiths || []);
  const list = document.getElementById("bklist");
  if(list) list.insertAdjacentHTML("beforeend", rows.map(r => sharh ? sharhPassageCard(r) : hadithCard(r)).join(""));
  booksState.offset += rows.length;
  const more = document.getElementById("bkmore");
  if(more) more.innerHTML = d.has_more ? `<button class="tool bk-more">المزيد</button>` : "";
}

// Library interactions: a collection opens its chapters; a chapter opens its hadiths; «المزيد» pages;
// the breadcrumb steps back up.
results.addEventListener("click", e => {
  const bb = e.target.closest(".bk-back");
  if(bb){ bb.getAttribute("data-to") === "chapters" ? drawBooksChapters() : renderBooks(); return; }
  const col = e.target.closest(".bk-col");
  if(col){ openBookChapters(+col.getAttribute("data-id"), col.getAttribute("data-name"), "hadith"); return; }
  const scol = e.target.closest(".bk-scol");
  if(scol){ openBookChapters(+scol.getAttribute("data-id"), scol.getAttribute("data-name"), "sharh"); return; }
  const ch = e.target.closest(".bk-chapter");
  if(ch){ openChapterHadiths(ch.getAttribute("data-ch")); return; }
  const more = e.target.closest(".bk-more");
  if(more){ openChapterHadiths(booksState.chapter, "more"); return; }
  const step = e.target.closest(".ch-step");
  if(step && !step.disabled){ _stepChapter(+step.getAttribute("data-d")); return; }
  const inch = e.target.closest(".bk-inchapter");        // a result's باب → open it
  if(inch){ openChapterHadiths(inch.getAttribute("data-ch")); return; }
  const toch = e.target.closest(".bk-toch");             // «العودة إلى الأبواب» from search results
  if(toch){ drawBooksChapters(); return; }
  const cr = e.target.closest(".bk-crumb");
  if(cr){ cr.getAttribute("data-to") === "collections" ? renderBooks() : drawBooksChapters(); return; }
});
results.addEventListener("input", e => {
  const inp = e.target.closest("#bkq");
  if(!inp) return;
  booksState.q = inp.value;
  const list = document.getElementById("bkchlist");
  if(list) list.innerHTML = _bkChapterItems();
});
results.addEventListener("keydown", e => {                // Enter in the in-book word search
  const f = e.target.closest("#bkfind");
  if(f && e.key === "Enter"){ const q = f.value.trim(); if(q) openBookSearch(q); }
});

// Network (الشبكة): an interactive, navigable graph of a narrator's place in the
// isnad web — his شيوخ above (toward the Prophet ﷺ) and تلاميذ below, each node
// coloured by his grade and clickable to re-centre the graph on him. Reuses the
// grade-enriched /narrator dossier — no new endpoint.
let netHistory = [];                       // names visited, for the «رجوع» trail
async function navigateNet(name, push){
  if(!name) return;
  results.innerHTML = `<div class="state">… جارٍ بناء الشبكة</div>`;
  try{
    const d = await getJSON(`/narrator?name=${encodeURIComponent(name)}`);
    if(push !== false && netHistory[netHistory.length - 1] !== d.name) netHistory.push(d.name);
    renderNetwork(d);
  }catch(e){
    const net = !e || !e.message || /failed to fetch|networkerror|load failed/i.test(e.message);
    results.innerHTML = `<div class="state">${esc(net
      ? "تعذّر الاتصال بالخادم. تأكّد أنّ التطبيق يعمل." : e.message)}</div>`;
  }
}
function netBack(){
  if(netHistory.length < 2) return;
  netHistory.pop();                                       // drop the current narrator
  navigateNet(netHistory[netHistory.length - 1], false);  // re-show the previous (no push)
}
// Node colour = grade, using the same buckets as the rest of the app (rijalClass).
function netColor(grade){
  if(!grade) return "#b9ad97";                                  // unknown to the base
  if(/ثقة|صحاب|حافظ|إمام|ثبت/.test(grade)) return "#1f7a52";     // ثقة فأعلى
  if(/صدوق|لا بأس|حسن/.test(grade))        return "#a87d27";     // صدوق/حسن
  if(/ضعيف|متروك|منكر|كذاب|واهٍ/.test(grade)) return "#a5381f";  // ضعيف فمَن دونه
  return "#8a7f6c";                                             // معروفٌ بلا تمييز
}
function _netClip(s){ s = s || ""; return s.length > 16 ? s.slice(0, 15) + "…" : s; }
// The Prophet ﷺ is the *source* of the hadith, not a narrator graded by الجرح والتعديل —
// the «ﷺ» ligature marks his (only) node, so he's shown as «مصدر الحديث», never «unknown».
function isProphet(name){ return (name || "").includes("ﷺ"); }
function _netNode(x, y, p, r, center){
  const prophet = isProphet(p.name);
  // an «<relation> فلان» node is a real link whose name isn't recorded — shown dashed.
  const unnamed = !prophet && /^(والد|والدة|جدّ|جد|جدّة|أخو|أخت|عمّ|خال|نجل|بنت) /.test(p.name || "");
  const title = p.name + (prophet ? " — مصدر الحديث ﷺ"
      : unnamed ? " — راوٍ غير مُسمّى (معروفٌ بالنسبة)"
      : (p.grade ? " — " + p.grade : " — غير معروف في القاعدة"))
    + (p.count ? " — " + p.count + " حديثًا" : "");
  const cls = "net-node" + (center ? " net-center" : "") + (unnamed ? " net-unnamed" : "")
    + (prophet ? " net-prophet" : "");
  const fill = prophet ? "#155c3d" : netColor(p.grade);
  return `<g class="${cls}" data-nav="${esc(p.name)}">`
    + `<title>${esc(title)}</title>`
    + `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}"></circle>`
    + `<text x="${x}" y="${y + r + 16}" text-anchor="middle" class="net-lbl">${esc(_netClip(p.name))}</text>`
    + `</g>`;
}
function _netEdge(x1, y1, x2, y2, count){
  const w = (1 + Math.min(5, Math.log2((count || 1) + 1))).toFixed(2);
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="net-edge" stroke-width="${w}"></line>`;
}
function renderNetwork(d){
  if(d.kind === "ambiguous"){ results.innerHTML = renderCandidates(d); return; }
  const teachers = d.teachers || [];          // ALL شيوخ — no cap
  const students = d.students || [];          // ALL تلاميذ — no cap
  const usable = Math.max(680, (results.clientWidth || 760) - 48);
  const maxSide = Math.max(teachers.length, students.length, 1);
  const W = Math.max(usable, maxSide * 82), H = 560;   // widen to fit all; .net-wrap scrolls
  const cx = W / 2, cy = H / 2, R = 32, r = 22;
  const yTop = 92, yBot = H - 92;
  const xOf = (i, n) => n <= 1 ? W / 2 : W * 0.06 + W * 0.88 * i / (n - 1);

  // edges first (drawn under the nodes), then the nodes themselves
  let edges = "", nodes = "";
  teachers.forEach((t, i) => {
    const x = xOf(i, teachers.length);
    edges += _netEdge(cx, cy - R, x, yTop + r, t.count);
    nodes += _netNode(x, yTop, t, r, false);
  });
  students.forEach((s, i) => {
    const x = xOf(i, students.length);
    edges += _netEdge(cx, cy + R, x, yBot - r, s.count);
    nodes += _netNode(x, yBot, s, r, false);
  });
  const centerV = d.grade && (d.grade.verdict || d.grade.grade);
  nodes += _netNode(cx, cy, {name: d.name, grade: centerV}, R, true);

  const svg = `<svg class="net" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" `
    + `xmlns="http://www.w3.org/2000/svg" role="img" aria-label="شبكة الرواة">`
    + `<text x="${cx}" y="30" text-anchor="middle" class="net-row">شيوخه — يروي عنهم ↑</text>`
    + `<text x="${cx}" y="${H - 14}" text-anchor="middle" class="net-row">تلاميذه — يروون عنه ↓</text>`
    + edges + nodes + `</svg>`;

  // info panel for the centred narrator (reuses the راوٍ card pieces)
  const badge = isProphet(d.name) ? `<span class="grade g-sahih">مصدر الحديث ﷺ</span>`
    : centerV ? `<span class="grade ${rijalClass(centerV)}">${esc(centerV)}</span>` : "";
  const save = saveChip({kind:"narrator", title:d.name, body:d.summary || "",
    meta:{grade:d.grade, sources:d.sources}});
  const meta = [];
  if(d.grade && d.grade.death_year) meta.push(`ت ${esc(d.grade.death_year)}هـ`);
  meta.push(`شيوخ: ${(d.teachers || []).length}`, `تلاميذ: ${(d.students || []).length}`);
  let info = `<div class="card"><div class="rawi-name">${esc(d.name)} ${badge} ${save}</div>`
    + `<div class="note" style="margin:6px 0 0">${meta.join("  ·  ")}</div>`;
  if(d.summary) info += `<div class="rawi-summary">${esc(d.summary)}</div>`;
  info += rijalAttribution(d.grade);
  if(d.sources && d.sources.length){
    info += `<div class="sources"><span class="r-lbl">المصادر:</span> `
      + d.sources.map(s => `${esc(s.what)} — ${esc(s.from)}`).join("  ·  ") + `</div>`;
  }
  info += `</div>`;

  // «رجوع» (gbl-back) leaves the graph back to the chain/راوٍ you came from; «السابق» (net-back) steps
  // back through the graph's own navigation history.
  const back = (navStack.length ? `<button class="gbl-back">◀ رجوع</button>` : "")
    + (netHistory.length > 1 ? `<button class="net-back">◀ السابق</button>` : "");
  const legend = `<div class="net-legend">`
    + `<span><i style="background:#1f7a52"></i>ثقة فأعلى</span>`
    + `<span><i style="background:#a87d27"></i>صدوق/حسن</span>`
    + `<span><i style="background:#a5381f"></i>ضعيف فمَن دونه</span>`
    + `<span><i style="background:#8a7f6c"></i>غير ذلك</span>`
    + `<span><i style="background:#b9ad97"></i>غير معروف في القاعدة</span>`
    + `<span><i style="background:#155c3d;outline:2px solid #a87d27;outline-offset:-1px"></i>النبي ﷺ (المصدر)</span></div>`;
  const hint = `<div class="note">انقر أيَّ راوٍ للانتقال إليه؛ وسُمكُ الخطّ على قدر عدد المرويّات بينهما. `
    + `الشيوخُ أعلى (نحو النبيّ ﷺ) والتلاميذُ أسفل.</div>`;

  results.innerHTML = `<div class="net-top">${back}${legend}</div>`
    + `<div class="net-wrap">${svg}</div>` + hint + info;
}

// Isnad (الإسناد): the chain's bottom-line verdict, narrator by narrator, plus اتصال.
const TONE = {sahih:"g-sahih", hasan:"g-hasan", daif:"g-daif", other:"g-other"};
function isnadVia(v){
  if(v === "سماع")  return `<span class="via via-sama">سماع</span>`;
  if(v === "عنعنة") return `<span class="via via-anana">عنعنة</span>`;
  return "";
}
function renderIsnad(d){
  const a = d.analysis || {}, r = d.ruling, cont = d.continuity, s = d.source || {};
  let html = "";
  // 0) the hadith itself — matn, book/citation, and the chain text (freely selectable)
  const cite0 = citeOf(s);
  if(s.matn || s.isnad || cite0){
    html += `<div class="card">`
      + (s.matn ? `<div class="matn">${esc(s.matn)}</div>` : "")
      + (cite0 ? `<div class="cite"><span>${esc(cite0)}</span></div>` : "")
      + (s.isnad ? `<div class="chain"><span class="chain-lbl">الإسناد:</span> ${esc(s.isnad)}</div>` : "")
      + `</div>`;
  }
  // 1) the bottom-line verdict «الحكم على الإسناد»
  if(r){
    const cls = TONE[r.tone] || "g-other";
    const save = saveChip({kind:"isnad", title:`الحكم على الإسناد: ${r.grade}`,
      body:(d.source && d.source.isnad) || "", meta:{grade:r.grade, ruling:r, source:d.source}});
    html += `<div class="card"><div class="rawi-name"><span>الحكم على الإسناد</span>`
      + `<span class="grade ${cls}">${esc(r.grade)}</span>${save}</div>`
      + `<div class="rawi-summary">${esc(r.reason)}</div>`
      + `<div class="note" style="margin-top:8px">${esc(r.disclaimer)}</div></div>`;
  }
  // 2) chain features at a glance
  const feats = [`${a.length || 0} راوٍ`];
  if(a.modes){ if(a.modes["سماع"]) feats.push(`سماع: ${a.modes["سماع"]}`);
               if(a.modes["عنعنة"]) feats.push(`عنعنة: ${a.modes["عنعنة"]}`); }
  if(a.has_tahwil) feats.push("فيه تحويل (ح)");
  feats.push(a.reaches_prophet ? "يصل إلى النبي ﷺ (مرفوع)" : "لا يبلغ النبي ﷺ في النصّ");
  html += `<div class="note">${feats.map(esc).join("  ·  ")}</div>`;
  // 3) the narrators, each with his grade
  html += `<div class="rawi-col"><h3>سلسلة الرواة (${(a.narrators || []).length})</h3>`;
  (a.narrators || []).forEach((n, i) => {
    const rij = n.rijal;
    const g = rij && rij.grade;
    const cands = (rij && rij.candidates) || null;          // [{name,grade}] — the ②b honest-doubt set
    const contested = !!(rij && rij.ambiguous && !rij.grade_agreed);   // اختُلفت درجاتهم → يُتوقَّف
    // مُيِّز بالقرينة: a bare name fixed by its شيخ/الرفقة (قاعدة · شبكة · رفقة) — show what it resolved to
    const res = n.resolved && n.resolved !== n.name
      ? ` <span class="simbadge sim-ok" title="مُيِّز بالقرينة: الشيخ أو الرفقة">↜ ${esc(n.resolved)}</span>` : "";
    // the «مشترك» label: محسوم الدرجة (all candidates agree → الحكم لا يتغيّر) vs يُتوقَّف (اختُلفت درجاتهم)
    const amb = rij && rij.ambiguous
      ? ` <span class="simbadge${contested ? ' sim-stop' : ''}" title="${esc((rij.alternatives||[]).join(' / '))}">${contested ? 'يُتوقَّف' : 'مشترك · محسوم'}</span>` : "";
    const ops = rij && rij.opinions;
    const div = ops && new Set(ops.map(o => o.grade)).size > 1
      ? ` <span class="r-diverge" title="${esc(ops.map(o => (SRC_AUTHOR[o.source]||o.source)+": "+o.grade).join(" · "))}">⚠ اختلفوا</span>` : "";
    const badge = (n.is_prophet || isProphet(n.name))
      ? `<span class="grade g-sahih">مصدر الحديث ﷺ</span>`
      : n.mubham
        ? `<span class="grade g-daif" title="راوٍ لم يُسمَّ — جهالةُ عين">راوٍ مبهم</span>`
      : contested
        ? `<span class="grade g-other" title="اختُلفت درجاتُهم فلا يُحكم بواحدةٍ">يُتوقَّف فيه</span>${res}${amb}`
      : g
        ? `<span class="grade ${rijalClass(g)}" title="${esc((rij.verdict || '') + (rij.source ? ' — ' + rij.source : ''))}">${esc(g)}</span>${srcTag(rij)}${res}${amb}`
        : `<span class="simbadge">غير معروف في القاعدة</span>`;
    html += `<div class="rawi-item"><span>${i + 1}. ${chainName(n)} ${isnadVia(n.via)}</span>${badge}</div>`;
    // the ②b «dubbio onesto» box — the few possible identities + each درجة (clickable → his راوٍ card)
    if(cands && cands.length){
      html += `<div class="doubt-box"><span class="doubt-lbl">${contested
          ? 'يُحتمل أنه أحدُ هؤلاء — مختلفو الدرجة، فيُتوقَّف حتى يُميَّز بقرينة:'
          : 'مشتركٌ بين هؤلاء، وكلُّهم بدرجةٍ واحدة فلا يتغيّر الحكم:'}</span>`
        + cands.map(c => `<span class="doubt-cand"><span class="rawi-link" data-pick="${esc(c.name)}" role="button" tabindex="0">${esc(c.name)}</span><span class="grade ${rijalClass(c.grade||'')}">${esc(c.grade||'—')}</span></span>`).join('')
        + `</div>`;
    }
  });
  html += `</div>`;
  // 4) continuity, link by link
  if(cont){
    html += `<div class="rawi-col"><h3>اتصال السند</h3>`;
    (cont.links || []).forEach(l => {
      const ok = l.seen
        ? `<span class="grade g-sahih">معروف (${l.count})</span>`
        : `<span class="grade g-daif">لم يُعرف</span>`;
      html += `<div class="rawi-item"><span>${esc(l.from)} ← ${esc(l.to)}</span>${ok}</div>`;
    });
    html += `<div class="rawi-summary">${esc(cont.note)}</div></div>`;
  }
  // 5) the structural notes
  if(a.notes && a.notes.length){
    html += `<div class="sources"><span class="r-lbl">ملاحظات:</span> `
      + a.notes.map(esc).join("  ·  ") + `</div>`;
  }
  results.innerHTML = html;
}

// A narrator INSIDE a chain (the «سلسلة الرواة» list): clickable — opens his راوٍ card — and shown
// GREEN when he is a صحابي (a Companion of the Prophet). The Prophet ﷺ (the source) and an unnamed
// راوٍ (مبهم) are plain text, not navigable.
function chainName(n){
  if(n.is_prophet || isProphet(n.name) || n.mubham) return esc(n.name);
  const sah = n.rijal && /صحاب/.test(n.rijal.grade || "") ? " sahabi" : "";
  return `<span class="rawi-link${sah}" data-pick="${esc(n.name)}" role="button" tabindex="0">${esc(n.name)}</span>`;
}
// Open a narrator's راوٍ card from a chain, pushing the current view so «◀ رجوع» returns to the exact
// chain (works from search / الإسناد / التدقيق — the listener is delegated on `results`).
function openRawiFromChain(name){
  const snap = _snapshot();
  q.value = name;
  document.querySelector('.modes button[data-mode="narrator"]').click();   // → راوٍ (clears navStack)
  navStack.push(snap);
  run();
}
// Open a narrator's network GRAPH (الشبكة) — same one-step-back behaviour.
function openNetFromChain(name){
  const snap = _snapshot();
  q.value = name;
  document.querySelector('.modes button[data-mode="network"]').click();    // → الشبكة (clears navStack)
  navStack.push(snap);
  navigateNet(name);
}
function _snapshot(){
  const m = mode, html = results.innerHTML;
  return () => _restoreView(m, html);
}
function _restoreView(m, html){
  mode = m;
  document.querySelectorAll(".modes button").forEach(x => x.classList.toggle("active", x.dataset.mode === m));
  go.textContent = LABELS[m]; q.placeholder = PLACEHOLDER[m];
  const info = ["method", "arch", "tech", "audit", "conflicts", "matn", "browse", "books"].includes(m);
  q.style.display = info ? "none" : ""; go.style.display = info ? "none" : "";
  results.innerHTML = html;
}


// Compact «الحكم على الإسناد» for a hadith card (lazy-loaded from /verify-isnad when the
// isnad is unfolded) — the same engine as the الإسناد tab: verdict + each راوٍ graded.
function chainVerdictHtml(d){
  const a = d.analysis || {}, r = d.ruling, cont = d.continuity;
  let html = "";
  if(r){
    const cls = TONE[r.tone] || "g-other";
    html += `<div class="verdict-head"><span class="v-lbl">الحكم على الإسناد:</span>`
      + `<span class="grade ${cls}">${esc(r.grade)}</span></div>`
      + `<div class="rawi-summary">${esc(r.reason)}</div>`;
  }
  (a.narrators || []).forEach((n, i) => {
    const rij = n.rijal, g = rij && rij.grade;
    const badge = (n.is_prophet || isProphet(n.name))
      ? `<span class="grade g-sahih">مصدر الحديث ﷺ</span>`
      : n.mubham ? `<span class="grade g-daif" title="راوٍ لم يُسمَّ — جهالةُ عين">راوٍ مبهم</span>`
      : g ? `<span class="grade ${rijalClass(g)}" title="${esc((rij.verdict || '') + (rij.source ? ' — ' + rij.source : ''))}">${esc(g)}</span>${srcTag(rij)}`
          : `<span class="simbadge">غير معروف في القاعدة</span>`;
    html += `<div class="rawi-item"><span>${i + 1}. ${chainName(n)} ${isnadVia(n.via)}</span>${badge}</div>`;
  });
  if(cont && cont.note) html += `<div class="rawi-summary">${esc(cont.note)}</div>`;
  if(r && r.disclaimer) html += `<div class="note" style="margin-top:6px">${esc(r.disclaimer)}</div>`;
  return html || `<div class="note">تعذّر تحليل هذا الإسناد</div>`;
}

// A full inline case for the التدقيق tab: the hadith (matn), its book/citation, the chain
// text, then the verdict — everything freely selectable, shown in place (no navigation).
function caseDetailHtml(d){
  const s = d.source || {};
  const cite = citeOf(s);
  return (s.matn ? `<div class="matn">${esc(s.matn)}</div>` : "")
    + (cite ? `<div class="cite"><span>${esc(cite)}</span></div>` : "")
    + (s.isnad ? `<div class="chain"><span class="chain-lbl">الإسناد:</span> ${esc(s.isnad)}</div>` : "")
    + chainVerdictHtml(d);
}

// Study notebook (دفتري): the items you saved with the ★ star, each with your own note.
const NB_KIND = {hadith:"حديث", narrator:"راوٍ", answer:"جواب", isnad:"إسناد", note:"ملاحظة"};
const NB_EMPTY = `<div class="state">دفترك فارغ — احفظ حديثًا أو راويًا أو جوابًا بالنجمة ★</div>`;
function nbGrade(it){
  const g = it.meta && it.meta.grade;
  if(!g) return "";
  const v = typeof g === "string" ? g : (g.verdict || g.grade);
  return v ? `<span class="grade ${gradeClass(v)}">${esc(v)}</span>` : "";
}
function nbCard(it){
  const kind  = `<span class="nb-kind">${NB_KIND[it.kind] || esc(it.kind)}</span>`;
  const title = it.title ? `<span class="nb-title">${esc(it.title)}</span>` : "";
  const body  = it.body  ? `<div class="nb-body">${esc(it.body)}</div>` : "";
  return `<div class="card nb" data-id="${it.id}">
    <div class="cite">${kind}${nbGrade(it)}${title}
      <button class="nb-del" title="احذف من الدفتر">حذف ✕</button></div>
    ${body}
    <div class="nb-row">
      <input class="nb-input" placeholder="اكتب ملاحظتك…" value="${esc(it.note || "")}">
      <button class="nb-save">حفظ الملاحظة</button>
    </div></div>`;
}
function renderNotebook(items){
  if(!items.length){ results.innerHTML = NB_EMPTY; return; }
  results.innerHTML = `<div class="note">${items.length} محفوظًا في دفترك</div>`
    + items.map(nbCard).join("");
}

    "ومن هذا الباب أنّ الكنية («أبو بكر»، «أم سلمة») لا تُطابِق إلّا حين يُذكَر صاحبُها بها صريحًا، فلا تُلصَق كنيةُ صحابيٍّ بـ«أبو بكر بن أبي شيبة» (وهو حافظٌ متأخّرٌ، شيخُ الشيخين) فيُحسَب صحابيًّا؛ والاسمُ المجرَّدُ «أبو بكر» يبقى مشترَكًا حتى تعيّنه السلسلةُ. وكذلك «معمر» (وهو اسمٌ) لا يُطابِق مَن كنيتُه «أبو معمر»، فالمذكورُ باسمه غيرُ المذكورِ بكنيته.",
    "ويُقرَأُ الاسمُ من أوّله — الاسمُ فأبوه — لا بمجرّد تشارُكِ كلمةٍ أيًّا كان موضعُها: «عدي بن حاتم» هو الصحابيُّ عديُّ بنُ حاتمٍ الطائيُّ، لا «عديُّ بنُ الفضل» الذي وافقه في «عديّ» و«حاتم» مصادفةً — إذ جاءت «حاتم» فيه جزءًا من كنيته (أبو حاتم) لا أبًا له؛ فلا يُنتزَع الحكمُ بمشابهةٍ عارضةٍ في كلمةٍ موضعُها مختلف. وبهذا بقي «حبيب بن أبي ثابت» ثقةً كما هو، لا متروكًا يشاركه طرفَ الاسم.",
    "ومن هذا الباب أيضًا: الاسمُ المعروفُ إذا وقع جَدًّا بعيدًا في سلسلة النسب فليس هو الراوي — «إبراهيم بن سعد بن إبراهيم بن عبد الرحمن بن عوف» راويه إبراهيمُ بنُ سعد، لا جدُّه الأعلى الصحابيُّ «عبد الرحمن بن عوف»؛ فالمطابقةُ بالاحتواء لا تصحُّ إلّا أن يكون الاسمُ المعروفُ صدرَ المذكور (الراوي نفسه)، لا حلقةً مدفونةً بين آبائه — وإلّا حُكِم على الحفيد بحكم جدّه الصحابيّ في غير موضعه، وهو من أكثر ما يُنتِج «صحابيًّا» وسطَ السند في تقرير «التدقيق».",
    "ونُنقّي قاعدةَ الرواة نفسَها من المدخلات الفاسدة قبل المطابقة: اسمٌ انقطع عند «… بن»، أو اختُزل إلى كلمةٍ واحدةٍ (كـ«خالد» وحده حُكم له صحابيًّا فيُسيءُ إلى كلِّ «خالد» في الأسانيد)، أو بقي مُبهَمًا (كـ«عبد الله» وحدها) فيلتقطُ كلَّ «عبد الله بن فلان»، أو جاء اسمًا مجرَّدًا (اسمٌ وأبٌ بلا نسبةٍ ولا كنية) حُكم له بأغلظ الجرح (كذّاب) وهو في الغالب خطأُ استخراجٍ — كـ«يونس بن محمد» (وهو الثقةُ المؤدِّبُ) حُكم له بالكذب، فيُسيءُ إلى كلِّ نظيرٍ أتمَّ منه؛ فنقاءُ القاعدة شرطٌ في صحّة المطابقة.",
    "فإن لم يَفُز مرشّحٌ بوضوح — إمّا لأنّ الصحبة لم تُرجّح، وإمّا لأنّ المقصودَ لا يَرِد إلّا مجرّدًا بلا صحبةٍ مميِّزة — وسمناه «مشترَكًا» ولم نُجزم. وهذا مقصودٌ: في علم الإسناد حكمٌ خاطئٌ يُقال بثقةٍ أسوأُ من «مشترَكٍ» صادق؛ قاعدتُنا أن نُبيّن ولا نُخمّن.",
    "وللتمييز آفاقٌ أوسعُ قد تُضاف لاحقًا: أقواها المتوفّرُ عندنا الطبقةُ (سنةُ الوفاة) — فالشيخُ أقدمُ من تلميذه، والوفياتُ تتناقص كلَّما اقتربنا من النبيّ ﷺ؛ وسنواتُ الوفاة موجودةٌ في «تقريب التهذيب»، فيُستبعَد المرشّحُ الذي لا يوافق زمنُه جيرانَ السلسلة. ودونها قرينةُ «الأكثر روايةً» (ترجيحُ المشهور، وهو ظنٌّ قد يُخطئ)، وأقواها وأبعدُها كلفةً: استيرادُ قوائم شيوخ كلِّ راوٍ وتلاميذه من كتب التراجم الموسّعة (تهذيب الكمال).",
    "ومتى رجّحنا بمثل هذه القرائن دون قطعٍ، فالأَولى أن يُعرَض الترجيحُ موسومًا «الأرجح أنّه فلان» — اجتهادًا ظاهرًا لا حكمًا قاطعًا — تمييزًا له عن المطابقة المؤكَّدة، حفظًا لقاعدة: لا نُلبس الظنَّ ثوبَ اليقين."]},
  {h:"أمثلةٌ عمليّة: تعيينُ المهمل من السلسلة", p:[
    "«سفيان» وحده مُهمَلٌ: قد يكون ابنَ عيينة أو الثوريَّ (كلاهما ثقة، لكنّهما رجلان). والجارُ في السلسلة هو الفيصل — في «… حَدَّثَنَا سُفْيَانُ، عَنْ عَمْرِو بْنِ دِينَارٍ …» هو ابنُ عيينة (المعروفُ بالرواية عن عمرو بن دينار)؛ وفي «… حَدَّثَنَا سُفْيَانُ، عَنْ مَنْصُورٍ … عَنْ إِبْرَاهِيمَ …» هو الثوريُّ. نفسُ الكلمة، وشخصان مختلفان بحسب مَن بعده.",
    "«جعفر بن محمد» في «… عَنْ جَعْفَرِ بْنِ مُحَمَّدٍ، عَنْ أَبِيهِ، عَنْ جَابِرِ بْنِ عَبْدِ اللَّهِ …» هو الإمامُ الصادق؛ يعيّنه جاراه: أبوه محمدٌ الباقر، وجابرٌ — ولا يجتمع هذا الجوارُ لغيره ممّن يشاركه الاسم.",
    "«حماد» في «… عَنْ حَمَّادٍ، عَنْ ثَابِتٍ، عَنْ أَنَسٍ …» هو حمّادُ بن سلمة (المعروفُ بثابت)، لا حمّادُ بن زيد؛ فالجارُ «ثابت» يرجّحه.",
    "«عدي بن حاتم» آخرَ السلسلةِ هو الصحابيُّ الطائيُّ: يعيّنه أنّ اسمَه يُقرأ من أوّله (عديٌّ فأبوه حاتم)، وأنّ موضعَه آخرُ السند موضعُ الصحابة — فلا يلتبس بـ«عدي بن الفضل» المتروكِ الذي شاركه «عديّ» و«حاتم» مصادفةً.",
    "هكذا يعمل التطبيق بالضبط: يأخذ جارَ الاسم المُهمَل في السلسلة (شيخَه أو تلميذه) ويقابله بصحبة كلِّ مرشّحٍ في الشبكة، فيُعيّن مَن توافق صحبتُه ذلك السياق؛ فإن لم يتبيّن واحدٌ بوضوحٍ تركه «مشترَكًا» ولم يخمّن."]},
  {h:"ما لا يُحسَم: المشترك المتشابه، والراوي المبهم", p:[
    "ليس كلُّ اسمٍ مشترَكٍ عسيرًا: «سفيان عن عمرو بن دينار» هو ابنُ عيينة، و«سفيان عن منصور» هو الثوريُّ — فالجارُ يفصل، وهذا نحسمه. إنّما يَعسُر حين يشترك المرشّحان في الجار نفسه: «حماد عن ثابت» (ابنُ سلمة أم ابنُ زيد؟)، و«عُبيد الله/عبد الله عن نافع عن ابن عمر» (المصغَّرُ الثقةُ أم المكبَّرُ الضعيف؟) — فالنظرُ إلى الجار لا يفرّق بينهما، فيبقى «مشترَكًا».",
    "وفي هذا العسير تنفع الطبقةُ (سنةُ الوفاة — قرينةٌ يُزمَع إضافتُها) متى اختلف زمنُ المرشّحَين، فيُستبعَد مَن لا يوافق زمنُه؛ لكن تبقى نواةٌ صلبةٌ لا تُحسَم حتى بها: المتشابهان في الطبقة والصحبة معًا (كالعَمريّ المصغَّر والمكبَّر، وفيه يختلف الحكمُ: ثقةٌ أو ضعيف) — وهذا حدُّ الأداة، يُترَك «مشترَكًا» بأمانةٍ لا تخمينًا.",
    "ويُفرَّق بين «المشترك» و«المبهم»: المشتركُ له اسمٌ يحمله جماعةٌ فنجتهد في تعيينه بالقرائن؛ أمّا المبهمُ فلا اسمَ له أصلًا («عن رجلٍ»، «عن شيخٍ له»، «عمّن حدّثه»، «بعض أصحابه») — وهذا لا يعيّنه أحدٌ، وهو في ذاته علّةُ ضعفٍ (جهالةُ عَينٍ) لا نقصٌ في قاعدتنا. ولذلك نَسِمُه «راوٍ مبهم» ونعدّه سببَ ضعفٍ بذاته (فيُضعَّف الإسنادُ لجهالته)، لا نُدرجه في «غير المعروف» الذي يُتوقَّف فيه. ويُستثنى المبهمُ الصحابيّ («رجلٌ من أصحاب النبي ﷺ») فالصحابةُ عدولٌ وإن لم يُسمَّوا."]},
  {h:"درجات الرواة (الجرح والتعديل)", src:"المرتبةُ منقولةٌ عن أئمّة هذا الفنّ في كتب الحكم المختصرة: أصلُها «تقريب التهذيب» للحافظ ابن حجر (ومنه عباراتُ المراتب: ثقة، صدوق، مقبول، مجهول، صدوق له أوهام، لين، ضعيف، متروك، كذاب)، ويُضمُّ إليه «الكاشف» للذهبي قولًا ثانيًا. والصحابةُ عدولٌ بالإجماع. ولا يُصدِر التطبيقُ جرحًا ولا تعديلًا من عنده — بل ينقل أحكامَ هؤلاء الأئمّة منسوبةً إليهم. وفوق الدرجةِ المختصرة، تُعرَض في صفحة «راوٍ» **أقوالُ الأئمة بأسمائهم** (قال ابنُ معين: ثقة، قال أبو حاتم: لا يُحتجُّ به، ذكره ابنُ حبّان في الثقات) كما تَنقلها كتبُ الجرح المبسوطةُ (الجرحُ والتعديل لابن أبي حاتم، تهذيبُ الكمال للمِزّيّ) — فيرى الباحثُ مَن قال وماذا قال، لا الخلاصةَ وحدها.",
    how:"نطابق اسمَ الراوي بقاعدة الرجال بالاحتواء (أن يكون الاسمُ المعروف داخلَ ما ورد في الإسناد أو العكس)، لا بمجرّد مشاركةِ كلمةٍ شائعة (فلا يُخلَط «محمد بن عبد الله بن نمير» بـ«عبد الله بن عمر»، ولا تُطابَق الكنيةُ الشائعة «أبو بكر» إلّا إذا ذُكر بها)؛ فإن شارك الاسمَ أكثرُ من راوٍ تُرك «مشترَكًا» ولم نخمّن. والنبيُّ ﷺ مصدرُ الحديث لا راوٍ يُجرَّح. ثمّ نصنّف حكمَ كلّ راوٍ إلى مرتبةٍ (ثقة، صدوق، لين، مجهول، ضعيف، متروك...) ونأخذ بالطرف الأضعف.",
    pros:"أحكامٌ منسوبةٌ إلى مصدرها؛ لا يجتهد النظامُ في تعديلٍ أو تجريح، ويُصرّح بالاشتباه بدل أن يخمّن.",
    cons:"تغطيةُ البذرة محدودة؛ فما لم يُعرف الراوي تتوقّف الأداة (يُتوقَّف فيه) حتى تُحمَّل قاعدةٌ أوسع."},
  {h:"أعلامُ الرجال والصحابة: من أين تأتي الدرجاتُ والتمييز؟", p:[
    "معرفةُ الرواة فنّان: «الجرحُ والتعديل» (الحكمُ على الراوي: أثقةٌ هو أم ضعيف؟)، و«معرفةُ الصحابة» (تمييزُ من صحب النبيَّ ﷺ ممّن لم يصحبه). ويبني التطبيقُ قاعدةَ رجاله من أئمّة الفنّين، ناقلًا أحكامَهم منسوبةً إليهم لا مُنشِئًا حكمًا من عنده.",
    "الدرجةُ (الجرحُ والتعديل): أصلُها «تقريبُ التهذيب» للحافظ ابن حجر العسقلانيّ (ت ٨٥٢هـ) — خلاصةٌ في كلمةٍ واحدةٍ لحال كلِّ راوٍ من رجال الكتب الستّة (ثقة، صدوق، لين، ضعيف، متروك، كذّاب)؛ ويُضَمُّ إليه «الكاشفُ» للذهبيّ (ت ٧٤٨هـ) قولًا ثانيًا.",
    "شبكةُ الصحبة (التي يُميَّز بها المشترَك — مَن شيوخُه ومَن تلاميذه): «تهذيبُ الكمال» للمِزّيّ (ت ٧٤٢هـ)، الأصلُ المبسوطُ الذي اختصره ابن حجر، يَسردُ لكلِّ راوٍ شيوخَه وتلاميذَه مباشرةً؛ و«الجرحُ والتعديل» لابن أبي حاتم الرازيّ (ت ٣٢٧هـ)، مصدرٌ مبكّرٌ مستقلٌّ يَنقل أحكامَ نقّادٍ كثيرين ويتجاوز رجالَ الستّة.",
    "معرفةُ الصحابة: غايةُ الباب «الإصابةُ في تمييز الصحابة» للحافظ ابن حجر — جمعَ ما تفرّق عند من سبقه مع تحقيق، ورتّبها على أربعةِ أقسامٍ في كلِّ حرف: (الأوّل) من ثبتت صحبتُه بأيّ طريقٍ فصحابيّ، (الثاني) من رآه صغيرًا فأُلحِق بالصحابة، (الثالث) المخضرمون الذين أدركوا الجاهليّةَ والإسلامَ ولم يلقَوه فليسوا صحابةً باتفاق، (الرابع) من ذُكر غلطًا ووهمًا فميّزه وصوّبه — وهو قسمٌ ابتكره لم يُسبَق إليه. ويتقدّمها في الباب: «الطبقاتُ الكبرى» لابن سعد (ت ٢٣٠هـ) أقدمُها، و«معرفةُ الصحابة» لأبي نعيم الأصبهانيّ (ت ٤٣٠هـ)، و«الاستيعابُ» لابن عبد البرّ (ت ٤٦٣هـ)، و«أسدُ الغابة» لابن الأثير (ت ٦٣٠هـ).",
    "كتبُ السَّعة (خارج الكتب الستّة): «الثقاتُ» لابن حبّان (ت ٣٥٤هـ) وللعِجليّ (ت ٢٦١هـ) و«الثقاتُ ممّن ليس في الكتب الستّة» لتوثيق من وُثّق؛ و«ميزانُ الاعتدال» للذهبيّ و«لسانُ الميزان» لابن حجر للمتكلَّم فيهم.",
    "وكيف يستعملها التطبيقُ؟ يأخذ الدرجةَ المختصرةَ من «تقريب/الكاشف»، ويبني «شبكةَ الصحبة» من «تهذيب الكمال/الجرح والتعديل» ومن الأسانيد نفسِها. و«الإصابةُ» تُقرأ فعلًا متى نُزِّلت: كلُّ ترجمةٍ في قسمَيها الأوّل والثاني (من ثبتت صحبتُه أو له رؤية) تدخل قاعدةَ الرجال «صحابيًّا» — إضافةً فقط لمن لم يكن معروفًا، فلا تمسُّ رجلًا له حكمٌ قائم (إذ قد يشارك صحابيٌّ مغمورٌ راويًا متأخّرًا اسمَه)؛ وإذ هؤلاء صحابةٌ مغمورون قلَّ أن يَرووا، فلا يُمَيَّزون بها إلّا في آخر السند (موضعِ الصحابيّ)، ولا يُحكَم بها على راوٍ في وسط السند لئلّا يُطابِقَ اسمُه المختصرُ تابعيًّا متأخّرًا يشاركه إيّاه. ويُتجاوَز قسماها الثالث (المخضرمون) والرابع (المذكورون وهمًا) عملًا بتمييز ابن حجر نفسِه — فيخرج بها صحابةٌ حقيقيون من «المجهولين». و«الثقاتُ ممن لم يقع في الكتب الستة» (لابن قطلوبغا) تُقرأ كذلك مصدرَ تغطيةٍ لمن هم خارج الكتب الستّة: يُدرَج الرجلُ «ثقةً» بالتوثيق، إلّا أن يُذكَر فيه جرحٌ مفسَّرٌ فيُقدَّم (الجرحُ المفسَّر مقدَّمٌ على التعديل — فمَن في «الثقات» وقال فيه أبو حاتم «ضعيف» فضعيف)، مع حفظِ أقوال الأئمة بأسمائها. وتبقى بقيّةُ كتب السَّعة (لسانُ الميزان، الطبقاتُ، وسائرُ كتب الثقات) مُنزَّلةً بانتظار قارئاتها؛ والمُنزَّلُ فعلًا مُبيَّنٌ في آخر هذه الصفحة («الكتب والمصادر»)."]

function methodCard(s){
  let body = (s.p || []).map(t => `<p class="m-p">${esc(t)}</p>`).join("");
  const row = (lbl, val, cls) =>
    val ? `<div class="m-row"><span class="m-lbl ${cls}">${lbl}</span><span>${esc(val)}</span></div>` : "";
  body += row("المصدر", s.src, "m-src") + row("كيف يُستخرج", s.how, "m-how")
        + row("المزايا", s.pros, "m-pros") + row("الحدود", s.cons, "m-cons");
  return `<div class="card m-card"><h3 class="m-h">${esc(s.h)}</h3>${body}</div>`;
}
// The books the app actually uses (with editions), fetched live from /sources so the
// list stays in sync with the corpus — grouped into collections / شروح / rijal.
function booksCard(s){
  const list = arr => (arr && arr.length)
    ? arr.map(b => `<div class="rawi-item"><span>${esc(b.name)}</span>`
        + `<span class="simbadge">${b.id}</span></div>`).join("")
    : `<div class="note">— (لم تُنزَّل بعد)</div>`;
  return `<div class="card m-card"><h3 class="m-h">الكتب والمصادر (مع الطبعات)</h3>`
    + `<p class="m-p">الكتب التي يعتمد عليها التطبيق فعليًّا، باسم الطبعة كما ورد من المصدر:</p>`
    + `<div class="m-row"><span class="m-lbl m-src">كتب السنة</span></div>${list(s.collections)}`
    + `<div class="m-row"><span class="m-lbl m-how">الشروح</span></div>${list(s.commentaries)}`
    + `<div class="m-row"><span class="m-lbl m-pros">الرجال</span></div>${list(s.rijal)}`
    + `</div>`;
}
async function renderMethodology(){
  results.innerHTML =
    `<div class="note">منهجية التطبيق: من أين يأتي كلُّ معطًى، وكيف يُستخرج، وما مزاياه وحدوده</div>`
    + METHODOLOGY.map(methodCard).join("");
  try { results.insertAdjacentHTML("beforeend", booksCard(await getJSON("/sources"))); }
  catch(_) {}
}

  {h:"Normalization and matching — app/parsing/normalize.py", p:[
