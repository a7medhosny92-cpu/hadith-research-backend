<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بحث وتحقيق الحديث</title>
<style>
  :root{
    --bg:#0f1419; --card:#1a2129; --accent:#3b9c6d; --accent2:#2f7d57;
    --muted:#8aa0ad; --text:#e8eef2; --line:#2a3540;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Segoe UI","Amiri","Scheherazade New","Traditional Arabic",serif;}
  header{padding:18px 24px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:1.5rem}
  header p{margin:6px 0 0;color:var(--muted);font-size:.92rem}
  .bar{display:flex;gap:8px;padding:16px 24px;flex-wrap:wrap;align-items:center;
    position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);z-index:5}
  .modes{display:flex;gap:4px}
  .modes button{background:var(--card);color:var(--text);border:1px solid var(--line);
    padding:9px 16px;border-radius:8px;cursor:pointer;font-size:1rem}
  .modes button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  #q{flex:1;min-width:240px;background:var(--card);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:1.15rem}
  #go{background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:12px 24px;font-size:1rem;cursor:pointer}
  #go:hover{background:var(--accent2)}
  #results{padding:8px 24px 48px;max-width:980px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px 18px;margin:14px 0}
  .matn{font-size:1.3rem;line-height:2.1}
  .answer{white-space:pre-wrap;font-size:1.2rem;line-height:2.1}
  .cite{color:var(--muted);margin-top:12px;font-size:.95rem;
    display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .grade{padding:3px 12px;border-radius:999px;font-size:.85rem;font-weight:bold}
  .g-sahih{background:#1f5c3d;color:#bff0d0}
  .g-hasan{background:#5c531f;color:#f0e7bf}
  .g-daif{background:#5c2a1f;color:#f0c8bf}
  .g-other{background:#33404a;color:#cde}
  .toggle{color:var(--accent);cursor:pointer;font-size:.88rem;margin-top:10px;user-select:none}
  .isnad{margin-top:8px;color:#aec4d2;font-size:.98rem;line-height:1.9;display:none;
    border-top:1px dashed var(--line);padding-top:8px}
  .isnad.show{display:block}
  .sharh{border-inline-start:3px solid var(--accent);background:#16201b}
  .sharh b{color:#bff0d0}
  .sharh .ex{margin-top:6px;line-height:1.95;color:#d4e6dc}
  .note{color:var(--muted);margin:6px 2px}
  .state{text-align:center;padding:40px;color:var(--muted);font-size:1.05rem}
  .more{display:block;margin:20px auto;background:var(--card);color:var(--accent);
    border:1px solid var(--accent);border-radius:8px;padding:11px 26px;font-size:1rem;cursor:pointer}
  .more:hover{background:var(--accent);color:#fff}
  #engine,#model{background:var(--card);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:11px 12px;font-size:.98rem}
  #engine{cursor:pointer}
  #model{min-width:200px}
  #engine[hidden],#model[hidden]{display:none}
  .warn{background:#4a3320;color:#f3dcc2;border:1px solid #6b4a2a;border-radius:8px;
    padding:10px 14px;margin:6px 2px;font-size:.95rem;line-height:1.7}
  .engine-tag{color:var(--accent);font-size:.85rem;margin:2px 2px 8px}
  .group-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    margin:24px 2px 8px;padding-top:10px;border-top:1px solid var(--line)}
  .vlabel{padding:3px 14px;border-radius:999px;font-size:.9rem;font-weight:bold}
  .v-lafz{background:#1f5c3d;color:#bff0d0}
  .v-nahw{background:#5c531f;color:#f0e7bf}
  .v-maana{background:#1f3b5c;color:#bfd6f0}
  .simbadge{color:var(--muted);font-size:.84rem}
  .comp-head{font-size:1.2rem;font-weight:bold;color:#bff0d0;
    margin:26px 2px 4px;padding-top:14px;border-top:2px solid var(--accent2)}
  .takhrij-line{color:var(--muted);font-size:.92rem;margin:2px 2px 8px;line-height:1.9}
  .chain{margin-top:8px;color:#aec4d2;font-size:.96rem;line-height:1.9;
    border-top:1px dashed var(--line);padding-top:8px}
  .chain-lbl{color:var(--accent);font-weight:bold}
  .rawi-name{font-size:1.4rem;font-weight:bold;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .rawi-cols{display:flex;gap:16px;flex-wrap:wrap}
  .rawi-col{flex:1;min-width:280px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px;margin:14px 0}
  .rawi-col h3{margin:0 0 10px;color:#bff0d0;font-size:1.1rem;
    border-bottom:1px solid var(--line);padding-bottom:8px}
  .rawi-item{display:flex;justify-content:space-between;gap:10px;align-items:center;
    padding:7px 4px;border-bottom:1px solid #20292f;font-size:1.05rem}
  .rawi-summary{margin-top:10px;color:#cdd9e1;line-height:2;font-size:1.05rem}
  .sources{margin:16px 2px;color:var(--muted);font-size:.9rem;line-height:1.9;
    border-top:1px dashed var(--line);padding-top:10px}
  .rulings{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
    display:flex;flex-wrap:wrap;gap:6px;align-items:center;line-height:2}
  .r-lbl{color:var(--accent);font-weight:bold;font-size:.9rem}
  .ruling{padding:2px 10px;border-radius:999px;font-size:.85rem}
  .r-era{opacity:.75;font-size:.78rem}
  .r-basis{opacity:.7;font-size:.76rem}
  .r-diverge{color:#f0c674;font-weight:bold;font-size:.85rem}
  .r-info{cursor:help;opacity:.85}
</style>
</head>
<body>
<header>
  <h1>بحث وتحقيق الحديث</h1>
  <p>ابحث في كتب السنة، اسأل، وتتبّع التخريج — مع شروح العلماء، بالعربية الفصحى</p>
</header>

<div class="bar">
  <div class="modes">
    <button data-mode="search" class="active">بحث</button>
    <button data-mode="ask">سؤال</button>
    <button data-mode="takhrij">تخريج</button>
    <button data-mode="narrator">راوٍ</button>
  </div>
  <input id="q" placeholder="اكتب الحديث أو السؤال…" autofocus>
  <button id="go">ابحث</button>
  <select id="engine" title="محرّك الإجابة" hidden>
    <option value="off">بدون ذكاء اصطناعي · سريع</option>
    <option value="local">محلي · Ollama</option>
    <option value="remote">سحابي · أي مزوّد</option>
  </select>
  <input id="model" list="models" placeholder="النموذج (اختياري)" title="أي نموذج litellm" hidden>
  <datalist id="models">
    <option value="anthropic/claude-sonnet-4-6"></option>
    <option value="anthropic/claude-opus-4-8"></option>
    <option value="openai/gpt-4o"></option>
    <option value="gemini/gemini-2.0-flash"></option>
    <option value="groq/llama-3.3-70b-versatile"></option>
    <option value="mistral/mistral-large-latest"></option>
    <option value="ollama/qwen2.5:7b"></option>
    <option value="ollama/llama3"></option>
  </datalist>
</div>

<div id="results">
  <div class="state">اكتب نصًّا في الأعلى واضغط Enter</div>
</div>

<script>
const LABELS = {search:"ابحث", ask:"اسأل", takhrij:"خرّج", narrator:"اعرض"};
const PLACEHOLDER = {search:"اكتب الحديث أو السؤال…", ask:"اكتب سؤالك…",
  takhrij:"اكتب متن الحديث…", narrator:"اكتب اسم الراوي…"};
const ENGINE_AR = {
  off: "إجابة استخراجية من المصادر (بدون ذكاء اصطناعي)",
  local: "أُجيب عبر محرّك محلي (Ollama)",
  remote: "أُجيب عبر محرّك سحابي",
};
let mode = "search";
const results = document.getElementById("results");
const q  = document.getElementById("q");
const go = document.getElementById("go");
const engineSel = document.getElementById("engine");
const modelInput = document.getElementById("model");

// The LLM switch shows only in «سؤال»; the model box only when an engine is on.
function syncEngineUI(){
  engineSel.hidden = mode !== "ask";
  modelInput.hidden = mode !== "ask" || engineSel.value === "off";
}
engineSel.addEventListener("change", syncEngineUI);

document.querySelectorAll(".modes button").forEach(b => b.onclick = () => {
  mode = b.dataset.mode;
  document.querySelectorAll(".modes button").forEach(x => x.classList.toggle("active", x === b));
  go.textContent = LABELS[mode];
  q.placeholder = PLACEHOLDER[mode];
  syncEngineUI();
});
go.onclick = run;
q.addEventListener("keydown", e => { if (e.key === "Enter") run(); });

function esc(s){ const d = document.createElement("div"); d.textContent = (s==null?"":s); return d.innerHTML; }
function gradeClass(g){
  if(!g) return "g-other";
  if(g.includes("صحيح")) return "g-sahih";
  if(g.includes("حسن"))  return "g-hasan";
  if(g.includes("ضعيف")||g.includes("موضوع")||g.includes("منكر")||g.includes("باطل")) return "g-daif";
  return "g-other";
}
// Scholars' rulings (أحكام), ordered by era; هـ after each hijri year, divergence flagged.
function rulingsHtml(rulings){
  if(!rulings || !rulings.length) return "";
  const items = rulings.map(r => {
    const basis = (r.basis && r.basis !== "نصّ") ? ` <span class="r-basis">(${esc(r.basis)})</span>` : "";
    const info = r.note ? ` <span class="r-info" title="${esc(r.note)}">ⓘ</span>` : "";
    const tip = r.note ? ` title="${esc(r.note)}"` : "";
    return `<span class="ruling ${gradeClass(r.verdict)}"${tip}>${esc(r.scholar)} `
      + `<span class="r-era">${esc(r.era)}</span>: ${esc(r.verdict)}${basis}${info}</span>`;
  }).join("");
  const diverge = new Set(rulings.map(r => r.verdict)).size > 1
    ? ` <span class="r-diverge">⚠ اختلف العلماء</span>` : "";
  return `<div class="rulings"><span class="r-lbl">أحكام العلماء:</span>${items}${diverge}</div>`;
}
function hadithCard(h){
  const cite = [h.collection, (h.number!=null?"رقم "+h.number:null), (h.page!=null?"ص "+h.page:null)]
    .filter(Boolean).join("  ·  ");
  const grade = h.grade ? `<span class="grade ${gradeClass(h.grade)}">${esc(h.grade)}</span>` : "";
  const isnad = h.isnad
    ? `<div class="toggle">عرض الإسناد ▾</div><div class="isnad">${esc(h.isnad)}</div>` : "";
  return `<div class="card"><div class="matn">${esc(h.matn)}</div>
    <div class="cite">${grade}<span>${esc(cite)}</span></div>${rulingsHtml(h.rulings)}${isnad}</div>`;
}

// Reveal long result lists in batches so the window stays responsive even with
// thousands of hits — all results are fetched, "تحميل المزيد" shows the rest.
const PAGE = 50;
let listState = null;   // {hits, shown, unit}

function renderList(hits, unit, empty){
  if(!hits.length){ results.innerHTML = `<div class="state">${empty}</div>`; return; }
  listState = { hits, shown: 0, unit };
  results.innerHTML =
    `<div class="note" id="count"></div><div id="list"></div><div id="more-wrap"></div>`;
  revealMore();
}
function revealMore(){
  const { hits, shown, unit } = listState;
  const next = hits.slice(shown, shown + PAGE);
  document.getElementById("list").insertAdjacentHTML("beforeend", next.map(hadithCard).join(""));
  listState.shown += next.length;
  document.getElementById("count").textContent = `${listState.shown} من ${hits.length} ${unit}`;
  const left = hits.length - listState.shown;
  const wrap = document.getElementById("more-wrap");
  wrap.innerHTML = left > 0 ? `<button class="more">تحميل المزيد (${left})</button>` : "";
  if(left > 0) wrap.firstChild.onclick = revealMore;
}

async function run(){
  const query = q.value.trim();
  if(!query) return;
  results.innerHTML = `<div class="state">… جارٍ التنفيذ</div>`;
  try{
    if(mode === "search"){
      const d = await (await fetch(`/search?q=${encodeURIComponent(query)}`)).json();
      renderList(d.results || [], "نتيجة", "لا توجد نتائج");
    } else if(mode === "ask"){
      const eng = engineSel.value;
      const mdl = modelInput.value.trim();
      let url = `/ask?q=${encodeURIComponent(query)}&engine=${eng}`;
      if(mdl && eng !== "off") url += `&model=${encodeURIComponent(mdl)}`;
      const d = await (await fetch(url)).json();
      let html = "";
      if(d.warning) html += `<div class="warn">${esc(d.warning)}</div>`;
      if(d.engine){
        const tag = (ENGINE_AR[d.engine] || esc(d.engine)) + (d.model ? ` · ${esc(d.model)}` : "");
        html += `<div class="engine-tag">${tag}</div>`;
      }
      html += `<div class="card"><div class="answer">${esc(d.answer)}</div></div>`;
      if(d.rulings && d.rulings.length) html += `<div class="card">${rulingsHtml(d.rulings)}</div>`;
      (d.sharh || []).forEach(s => {
        const ref = s.sharh + (s.hadith_number!=null ? ` (عند الحديث ${s.hadith_number})` : "");
        const body = s.text || s.excerpt || "";
        html += `<div class="card sharh"><b>${esc(ref)}</b><div class="ex">${esc(body)}</div></div>`;
      });
      results.innerHTML = html;
    } else if(mode === "takhrij"){
      const d = await (await fetch(`/takhrij?q=${encodeURIComponent(query)}`)).json();
      renderTakhrij(d);
    } else {
      const r = await fetch(`/narrator?name=${encodeURIComponent(query)}`);
      const d = await r.json();
      if(!r.ok){ results.innerHTML = `<div class="state">${esc(d.detail || "تعذّر العرض")}</div>`; return; }
      renderNarrator(d);
    }
  } catch(e){
    results.innerHTML = `<div class="state">تعذّر الاتصال بالخادم. تأكّد أنّ التطبيق يعمل.</div>`;
  }
}

// Takhrij: show every narration of the same report, grouped into distinct wordings
// (صيغ) and labelled by closeness to the source (بلفظه / بنحوه / بمعناه).
function vlabelClass(l){ return l === "بلفظه" ? "v-lafz" : l === "بنحوه" ? "v-nahw" : "v-maana"; }
function narrationCard(n){
  const cite = [n.collection, (n.number!=null?"رقم "+n.number:null), (n.page!=null?"ص "+n.page:null)]
    .filter(Boolean).join("  ·  ");
  const grade = n.grade ? `<span class="grade ${gradeClass(n.grade)}">${esc(n.grade)}</span>` : "";
  const sim = `<span class="simbadge">${Math.round((n.overlap||0)*100)}% تطابق</span>`;
  // The chain is always shown here — «who carried it» is the point of takhrij.
  const chain = n.isnad
    ? `<div class="chain"><span class="chain-lbl">الإسناد:</span> ${esc(n.isnad)}</div>` : "";
  return `<div class="card"><div class="matn">${esc(n.matn)}</div>
    <div class="cite">${grade}<span>${esc(cite)}</span>${sim}</div>${chain}${rulingsHtml(n.rulings)}</div>`;
}
function renderTakhrij(d){
  const groups = d.groups || [];
  if(!groups.length){ results.innerHTML = `<div class="state">لا توجد روايات</div>`; return; }
  const sources = Object.keys(d.by_collection || {}).length;
  let html = `<div class="note">${d.count} روايةً · عن ${d.companions} صحابيًّا · `
    + `في ${d.variants} صيغة · عبر ${sources} مصدرًا</div>`;
  groups.forEach(g => {
    const who = g.companion ? `من حديث: ${esc(g.companion)}` : "صحابيّ غير محدَّد";
    html += `<div class="comp-head">${who} <span class="simbadge">(${g.count} رواية)</span></div>`;
    if(g.takhrij) html += `<div class="takhrij-line">${esc(g.takhrij)}</div>`;
    (g.variants || []).forEach(v => {
      html += `<div class="group-head"><span class="vlabel ${vlabelClass(v.label)}">${esc(v.label)}</span>`
        + `<span class="simbadge">${v.count} رواية · ${Math.round((v.closeness||0)*100)}% تطابق مع الأصل</span></div>`;
      html += v.narrations.map(narrationCard).join("");
    });
  });
  results.innerHTML = html;
}

// Narrator (راوٍ): the narrator's place in the network — his شيوخ and تلاميذ, and grade.
function rijalClass(v){
  if(!v) return "g-other";
  if(/ثقة|صحاب|حافظ|إمام|ثبت/.test(v)) return "g-sahih";
  if(/صدوق|لا بأس|حسن/.test(v)) return "g-hasan";
  if(/ضعيف|متروك|منكر|كذاب|واهٍ/.test(v)) return "g-daif";
  return "g-other";
}
function rawiList(title, arr){
  if(!arr || !arr.length) return `<div class="rawi-col"><h3>${title}</h3><div class="note">—</div></div>`;
  const rows = arr.map(x =>
    `<div class="rawi-item"><span>${esc(x.name)}</span><span class="simbadge">${x.count} حديثًا</span></div>`
  ).join("");
  return `<div class="rawi-col"><h3>${title} (${arr.length})</h3>${rows}</div>`;
}
function renderNarrator(d){
  const v = d.grade && (d.grade.verdict || d.grade.grade);
  const badge = v ? `<span class="grade ${rijalClass(v)}">${esc(v)}</span>` : "";
  let html = `<div class="card"><div class="rawi-name">${esc(d.name)} ${badge}</div>`;
  if(d.summary) html += `<div class="rawi-summary">${esc(d.summary)}</div>`;
  html += `</div>`;
  html += `<div class="rawi-cols">`
    + rawiList("شيوخه — يروي عنهم", d.teachers)
    + rawiList("تلاميذه — يروون عنه", d.students)
    + `</div>`;
  if(d.sources && d.sources.length){
    html += `<div class="sources"><span class="r-lbl">المصادر:</span> `
      + d.sources.map(s => `${esc(s.what)} — ${esc(s.from)}`).join("  ·  ") + `</div>`;
  }
  results.innerHTML = html;
}

// Toggle the isnad (event delegation).
results.addEventListener("click", e => {
  if(!e.target.classList.contains("toggle")) return;
  const isnad = e.target.nextElementSibling;
  const open = isnad.classList.toggle("show");
  e.target.textContent = open ? "إخفاء الإسناد ▴" : "عرض الإسناد ▾";
});
</script>
</body>
</html>
