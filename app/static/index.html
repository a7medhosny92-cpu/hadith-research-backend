<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بحث وتحقيق الحديث</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&display=swap');
  :root{
    --bg:#f7f3ea; --card:#ffffff; --ink:#2b2620; --text:#2b2620;
    --accent:#1f7a52; --accent2:#155c3d; --gold:#a87d27; --gold2:#876516;
    --muted:#675d45; --line:#e7dec9;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Amiri","Scheherazade New","Traditional Arabic","Segoe UI",serif;
    font-size:17px;line-height:1.9;
    -webkit-user-select:text;user-select:text;   /* let the user select & copy any text freely */
    background-image:radial-gradient(circle at 1px 1px, rgba(168,125,39,.055) 1px, transparent 0);
    background-size:22px 22px;}
  /* but the interactive chrome (buttons, chips, toggles) stays unselectable */
  .modes button,#go,.tool,.save-btn,.more,.s-ctrl,.go-takhrij,.clear-filters{
    -webkit-user-select:none;user-select:none}
  header{padding:22px 24px 18px;border-bottom:2px solid var(--gold);
    background:linear-gradient(180deg,#fbf8f1,#f2ebdb)}
  header h1{margin:0;font-size:1.95rem;font-weight:700;color:var(--accent2);letter-spacing:.3px}
  header p{margin:8px 0 0;color:var(--gold2);font-size:1.02rem}
  .bar{display:flex;gap:8px;padding:14px 24px;flex-wrap:wrap;align-items:center;
    position:sticky;top:0;background:rgba(247,243,234,.96);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);z-index:5}
  .modes{display:flex;gap:5px;flex-wrap:wrap}
  .modes button{background:var(--card);color:var(--accent2);border:1px solid var(--line);
    padding:9px 16px;border-radius:10px;cursor:pointer;font-size:1rem;font-family:inherit;transition:all .15s}
  .modes button:hover{border-color:var(--accent);background:#f0f7f3}
  .modes button.active{background:var(--accent);border-color:var(--accent);color:#fff;
    box-shadow:0 2px 8px rgba(31,122,82,.25)}
  /* the reference/documentation tabs are grouped to the left, behind a divider, and muted */
  .bar-sep{align-self:stretch;width:1px;background:var(--line);margin:3px 6px}
  .modes button.doc{color:var(--muted);background:transparent}
  .modes button.doc:hover{color:var(--accent2)}
  .modes button.doc.active{color:#fff}
  #q{flex:1;min-width:240px;background:var(--card);color:var(--text);font-family:inherit;
    border:1px solid var(--line);border-radius:10px;padding:12px 16px;font-size:1.15rem}
  #q:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,82,.12)}
  #go{background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;
    padding:12px 26px;font-size:1.05rem;font-weight:700;cursor:pointer}
  #go:hover{background:var(--accent2)}
  #results{padding:10px 24px 56px;max-width:980px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 20px;margin:15px 0;box-shadow:0 1px 4px rgba(80,60,20,.06)}
  .matn{font-size:1.45rem;line-height:2.2;color:#221d16;
    font-family:"Scheherazade New","Amiri",serif}
  .answer{white-space:pre-wrap;font-size:1.22rem;line-height:2.15}
  .cite{color:var(--muted);margin-top:14px;font-size:.95rem;
    display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .grade{padding:4px 13px;border-radius:999px;font-size:.85rem;font-weight:700}
  .r-num{display:inline-block;background:#f0ece0;color:var(--gold2);font-weight:700;font-size:.9rem;border-radius:8px;padding:1px 9px;margin-bottom:8px}
  .card.taliq{background:#fbf9f3;border-style:dashed}
  .taliq-badge{background:#efe7d6;color:var(--gold2);padding:4px 13px;border-radius:999px;font-size:.85rem;font-weight:700}
  .bk-inchapter{color:var(--accent2);font-size:.9rem;cursor:pointer;margin:14px 0 -4px}
  .bk-inchapter:hover{text-decoration:underline}
  .bk-toch{color:var(--accent2);cursor:pointer;font-weight:700}
  .bk-toch:hover{text-decoration:underline}
  .ch-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:12px 0}
  .ch-pos{color:var(--muted);font-size:.9rem}
  .ch-step[disabled]{opacity:.4;cursor:default}
  .card.sharh{background:#f7faf8}
  .sharh-badge{background:#eef6f1;color:var(--accent2);padding:4px 13px;border-radius:999px;font-size:.85rem;font-weight:700}
  .sharh-on{color:var(--muted);font-size:.85rem;font-weight:400}
  .sharh-text{line-height:2;white-space:pre-wrap;margin-top:6px}
  .g-sahih{background:#dcefe1;color:#15643f}
  .g-hasan{background:#f6eccf;color:#876413}
  .g-daif{background:#f6ddd5;color:#a5381f}
  .g-other{background:#ebe4d4;color:#6c6149}
  .toggle{color:var(--accent);cursor:pointer;font-size:.9rem;margin-top:10px;user-select:none;font-weight:700}
  .go-takhrij{color:var(--gold2);cursor:pointer;font-size:.9rem;margin-top:10px;display:inline-block;font-weight:700}
  .go-takhrij:hover{text-decoration:underline;color:var(--accent2)}
  .isnad{margin-top:8px;color:#4a5a52;font-size:1rem;line-height:2;display:none;
    border-top:1px dashed var(--line);padding-top:10px}
  .isnad.show{display:block}
  .chain-verdict{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .verdict-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .v-lbl{color:var(--accent);font-weight:700;font-size:.95rem}
  .sharh{border-inline-start:4px solid var(--accent);background:#f1f8f4}
  .sharh b{color:var(--accent2)}
  .sharh .ex{margin-top:6px;line-height:2.05;color:#33453c}
  .note{color:var(--muted);margin:8px 2px;font-size:.98rem}
  .state{text-align:center;padding:46px;color:var(--muted);font-size:1.1rem}
  .more{display:block;margin:22px auto;background:var(--card);color:var(--accent);font-family:inherit;
    border:1px solid var(--accent);border-radius:10px;padding:11px 28px;font-size:1rem;cursor:pointer}
  .more:hover{background:var(--accent);color:#fff}
  /* search (بحث): controls · facet filters · card actions · foldable variants · highlight */
  .s-ctrls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 2px 6px}
  .s-ctrl{background:var(--card);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;font-size:.95rem;font-family:inherit;cursor:pointer}
  .s-ctrl:focus{outline:none;border-color:var(--accent)}
  .facets{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:6px 2px}
  .f-lbl{color:var(--accent);font-weight:700;font-size:.9rem;margin-inline-end:2px}
  .facet{background:var(--card);border:1px solid var(--line);color:var(--accent2);
    border-radius:999px;padding:5px 13px;font-size:.9rem;cursor:pointer;user-select:none;transition:all .15s}
  .facet:hover{border-color:var(--accent);background:#f0f7f3}
  .facet.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .facet b{font-weight:700;opacity:.8;margin-inline-start:3px}
  .facet.on b{opacity:.95}
  .clear-filters{color:#b04a3a;cursor:pointer;font-weight:700;font-size:.9rem}
  .clear-filters:hover{text-decoration:underline}
  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .tool{background:var(--card);border:1px solid var(--line);color:var(--accent2);
    border-radius:9px;padding:5px 13px;font-size:.88rem;cursor:pointer;font-family:inherit;line-height:1}
  .tool:hover{border-color:var(--accent);background:#f0f7f3}
  .tool.done{color:var(--accent);border-color:var(--accent);background:#eaf5ef}
  .tool:disabled{opacity:.32;cursor:default;background:var(--card);border-color:var(--line)}
  .tool:disabled:hover{border-color:var(--line)}
  .br-letters .tool{min-width:38px;justify-content:center;text-align:center}
  .br-search{background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:7px 13px;font-size:.92rem;font-family:inherit;min-width:240px;flex:1;max-width:420px}
  .br-search:focus{outline:none;border-color:var(--accent)}
  #brlist .br-pick{cursor:pointer}
  #brlist .br-pick:hover{background:#f0f7f3}
  .var-toggle{color:var(--gold2);cursor:pointer;font-size:.9rem;display:inline-block;
    margin-top:12px;font-weight:700;user-select:none}
  .var-toggle:hover{text-decoration:underline;color:var(--accent2)}
  .variants{display:none;margin-top:8px;border-top:1px dashed var(--line);padding-top:4px}
  .variants.show{display:block}
  mark{background:#fbe8b0;color:inherit;border-radius:3px;padding:0 1px}
  #engine,#model{background:var(--card);color:var(--text);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;font-size:.98rem;font-family:inherit}
  #engine{cursor:pointer}
  #model{min-width:200px}
  #engine[hidden],#model[hidden]{display:none}
  #compare-lbl{display:flex;gap:6px;align-items:center;color:var(--muted);
    font-size:.92rem;cursor:pointer}
  #compare-lbl[hidden]{display:none}
  .cmp-cols{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
  .cmp-col{flex:1 1 300px;min-width:280px}
  .cmp-head{font-weight:700;color:var(--accent2);margin:6px 2px;font-size:1rem}
  .cmp-time{color:var(--muted);font-size:.85rem}
  .warn{background:#fbf0d8;color:#8a5a16;border:1px solid #e8cf94;border-radius:10px;
    padding:11px 15px;margin:8px 2px;font-size:.96rem;line-height:1.8}
  .engine-tag{color:var(--accent);font-size:.88rem;margin:2px 2px 8px;font-weight:700}
  .group-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    margin:24px 2px 8px;padding-top:12px;border-top:1px solid var(--line)}
  .vlabel{padding:4px 14px;border-radius:999px;font-size:.9rem;font-weight:700}
  .v-lafz{background:#dcefe1;color:#15643f}
  .v-nahw{background:#f6eccf;color:#876413}
  .v-maana{background:#dde8f5;color:#2a5a8a}
  .simbadge{color:var(--muted);font-size:.9rem}
  .comp-head{font-size:1.3rem;font-weight:700;color:var(--accent2);
    margin:28px 2px 4px;padding-top:16px;border-top:2px solid var(--gold)}
  .takhrij-line{color:var(--gold2);font-size:.95rem;margin:2px 2px 8px;line-height:1.9}
  .illal-box{border:1px solid var(--gold);border-radius:10px;background:#fffaf0;padding:10px 12px;margin:6px 2px 14px}
  .illal-lbl{font-weight:700;color:#8a5a12;margin-bottom:6px}
  .illal-sub{font-weight:400;color:#9a8a6a;font-size:.85rem}
  .illal-hint{font-size:.95rem;line-height:1.8;margin:4px 0;padding-inline-start:8px;border-inline-start:3px solid #d9c48a}
  .illal-hint.il-warn{border-inline-start-color:#c0791e;background:#fff4e6}
  .il-type{display:inline-block;font-weight:700;color:#7a4e10;background:#f3e6c8;border-radius:6px;padding:0 7px;margin-inline-end:6px}
  .chain{margin-top:8px;color:#4a5a52;font-size:1rem;line-height:2;
    border-top:1px dashed var(--line);padding-top:8px}
  .chain-lbl{color:var(--accent);font-weight:700}
  .rawi-name{font-size:1.5rem;font-weight:700;color:#221d16;
    display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .rawi-cols{display:flex;gap:16px;flex-wrap:wrap}
  .rawi-col{flex:1;min-width:280px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;margin:14px 0;box-shadow:0 1px 4px rgba(80,60,20,.06)}
  .rawi-col h3{margin:0 0 12px;color:var(--accent2);font-size:1.15rem;
    border-bottom:2px solid var(--gold);padding-bottom:8px}
  .rawi-item{display:flex;justify-content:space-between;gap:10px;align-items:center;
    padding:8px 4px;border-bottom:1px solid var(--line);font-size:1.08rem}
  .rawi-pick{cursor:pointer;border-radius:8px;padding:8px 8px}
  .rawi-pick:hover{background:var(--bg)}
  /* a clickable narrator INSIDE a chain → opens his راوٍ card; a صحابي is shown in green */
  .rawi-link{cursor:pointer;border-bottom:1px dashed var(--gold);color:inherit}
  .rawi-link:hover{color:var(--accent2);border-bottom-style:solid}
  .rawi-link.sahabi{color:#15643f;font-weight:700;border-bottom-color:#9cc3ad}
  .rawi-link.sahabi:hover{color:#0e4f31}
  /* «🕸 الشبكة» button on a راوٍ card → open his graph */
  .net-jump{background:var(--card);color:var(--accent2);border:1px solid var(--line);border-radius:8px;
    padding:3px 11px;font-size:.85rem;cursor:pointer;font-family:inherit;margin-inline-start:8px;vertical-align:middle}
  .net-jump:hover{border-color:var(--accent);background:#f0f7f3;color:var(--accent2)}
  .rawi-summary{margin-top:10px;color:#3a3328;line-height:2.1;font-size:1.08rem}
  .var-row{border-bottom:1px solid var(--line)}
  .var-row .rawi-item{border-bottom:none}
  .var-matn{margin:0 4px 10px;font-size:1.15rem;line-height:2;color:#2b2620}
  .audit-head{cursor:pointer;transition:background .12s}
  .audit-head:hover{background:#f0f7f3}
  .case-box{display:none;margin:4px 2px 16px;border-inline-start:3px solid var(--gold);
    padding:8px 14px;background:#fcfaf4;border-radius:0 10px 10px 0}
  .case-box.show{display:block}
  .sources{margin:16px 2px;color:var(--muted);font-size:.92rem;line-height:1.9;
    border-top:1px dashed var(--line);padding-top:10px}
  .rulings{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    display:flex;flex-wrap:wrap;gap:6px;align-items:center;line-height:2}
  .r-lbl{color:var(--accent);font-weight:700;font-size:.92rem}
  .ruling{padding:3px 11px;border-radius:999px;font-size:.85rem}
  .r-era{opacity:.7;font-size:.78rem}
  .r-book{opacity:.85;font-size:.74rem;color:#7a6a3a}
  .r-basis{opacity:.65;font-size:.76rem}
  .r-diverge{color:#b5701a;font-weight:700;font-size:.85rem}
  .r-info{cursor:help;opacity:.85}
  /* ★ تمييز المهمل badges + the «② dubbio onesto» node — a genuinely ambiguous narrator the شيخ/التلميذ
     cannot split is documented (its few possible identities + each درجة), never guessed */
  .simbadge.sim-stop{color:#a6432f;font-weight:700}      /* يُتوقَّف — اختُلفت درجاتهم */
  .simbadge.sim-ok{color:#15643f}                         /* مُيِّز بالقرينة */
  .doubt-box{margin:2px 18px 8px;padding:7px 11px;border-inline-start:3px solid var(--gold);
    background:#fbf7ee;border-radius:0 8px 8px 0;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center}
  .doubt-lbl{flex-basis:100%;color:#7a6a48;font-size:.86rem;line-height:1.7}
  .doubt-cand{display:inline-flex;gap:7px;align-items:center;font-size:1rem}
  /* ★ save-to-notebook chip + the notebook cards */
  .save-btn{margin-inline-start:auto;background:transparent;border:1px solid var(--line);
    color:var(--gold);border-radius:9px;padding:3px 11px;font-size:1.1rem;cursor:pointer;line-height:1}
  .save-btn:hover{border-color:var(--gold);background:#fbf4e2}
  .save-btn.saved{color:var(--accent);border-color:var(--accent);background:#eaf5ef;cursor:default}
  .card.nb .cite{margin-top:0}
  .nb-kind{background:#eef6f1;color:var(--accent2);padding:3px 12px;border-radius:999px;
    font-size:.82rem;font-weight:700}
  .nb-title{color:var(--ink);font-weight:700}
  .nb-body{font-size:1.15rem;line-height:2.05;margin-top:8px;white-space:pre-wrap;color:#2b2620}
  .nb-row{display:flex;gap:8px;margin-top:12px;align-items:center}
  .nb-input{flex:1;background:#fcfaf4;color:var(--text);border:1px solid var(--line);
    border-radius:9px;padding:9px 13px;font-size:1rem;font-family:inherit}
  .nb-input:focus{outline:none;border-color:var(--accent)}
  .nb-save,.nb-del{background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:8px 15px;font-size:.9rem;cursor:pointer;white-space:nowrap;font-family:inherit}
  .nb-save:hover{border-color:var(--accent);color:var(--accent2);background:#f0f7f3}
  .nb-del{color:#b04a3a}.nb-del:hover{border-color:#e0b0a8;background:#fbeae6}
  /* isnad: transmission-mode chip on each narrator */
  .via{font-size:.78rem;padding:2px 10px;border-radius:999px;margin-inline-start:6px;font-weight:700}
  .via-sama{background:#dcefe1;color:#15643f}
  .via-anana{background:#f6eccf;color:#876413}
  /* methodology (المنهجية): the «where does each datum come from» page */
  .m-h{color:var(--accent2);font-size:1.3rem;margin:0 0 12px;font-weight:700;
    border-bottom:2px solid var(--gold);padding-bottom:8px}
  .m-p{line-height:2.1;color:#3a3328;margin:8px 0;font-size:1.08rem}
  /* the Technical page is written in English → render it left-to-right */
  .tech-en{direction:ltr;text-align:left}
  .tech-en .m-h{font-family:"Segoe UI",system-ui,sans-serif;font-size:1.2rem}
  .tech-en .m-p{font-family:"Segoe UI",system-ui,sans-serif;font-size:1rem;line-height:1.7}
  .m-row{display:flex;gap:10px;margin:9px 0;line-height:2;font-size:1.05rem;align-items:flex-start}
  .m-row span:last-child{flex:1;color:#3a3328}
  .m-lbl{flex:0 0 92px;font-weight:700;font-size:.92rem;padding-top:2px}
  .m-src{color:#2a5a8a}.m-how{color:var(--accent)}.m-pros{color:#2f7d4f}.m-cons{color:#b5701a}
  /* network (الشبكة): the interactive, navigable narrator-graph */
  .net-top{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin:8px 2px}
  .net-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:6px;margin:10px 0;box-shadow:0 1px 4px rgba(80,60,20,.06);overflow-x:auto}
  .net{display:block;border-radius:10px;
    background:radial-gradient(circle at 50% 45%, #fffdf8, #f6f1e6)}
  .net-node{cursor:pointer}
  .net-node circle{stroke:#fff;stroke-width:2;transition:stroke .12s,stroke-width .12s}
  .net-node:hover circle{stroke:var(--gold);stroke-width:3}
  .net-node.net-center circle{stroke:var(--accent2);stroke-width:3}
  .net-node.net-unnamed circle{stroke:var(--muted);stroke-dasharray:3 3}  /* unnamed ancestor */
  .net-unnamed .net-lbl{font-style:italic;fill:var(--muted)}
  .net-node.net-prophet circle{stroke:var(--gold);stroke-width:3}         /* the source ﷺ */
  .net-prophet .net-lbl{font-weight:700;fill:var(--accent2)}
  .net-lbl{font-family:inherit;font-size:13px;fill:#3a3328}
  .net-node:hover .net-lbl{fill:var(--accent2);font-weight:700}
  .net-center .net-lbl{font-weight:700;fill:#221d16}
  .net-edge{stroke:#cabd9f;opacity:.75;stroke-linecap:round}
  .net-row{font-family:inherit;font-size:14px;fill:var(--gold2);font-weight:700}
  .net-back,.bk-back,.gbl-back{background:var(--card);color:var(--accent);border:1px solid var(--accent);
    border-radius:9px;padding:7px 16px;font-size:.95rem;cursor:pointer;font-family:inherit}
  .net-back:hover,.bk-back:hover,.gbl-back:hover{background:var(--accent);color:#fff}
  .net-legend{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-size:.85rem;align-items:center}
  .net-legend span{display:flex;gap:5px;align-items:center}
  .net-legend i{width:12px;height:12px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<header>
  <h1>بحث وتحقيق الحديث</h1>
  <p>ابحث في كتب السنة، اسأل، وتتبّع التخريج — مع شروح العلماء، بالعربية الفصحى</p>
</header>

<div class="bar">
  <div class="modes">
    <button data-mode="search" class="active">بحث</button>
    <button data-mode="ask">سؤال</button>
    <button data-mode="takhrij">تخريج</button>
    <button data-mode="narrator">راوٍ</button>
    <button data-mode="browse">الرواة</button>
    <button data-mode="books">الكتب</button>
    <button data-mode="network">الشبكة</button>
    <button data-mode="isnad">الإسناد</button>
    <button data-mode="notebook">دفتري</button>
    <span class="bar-sep"></span>
    <button data-mode="audit" class="doc">التدقيق</button>
